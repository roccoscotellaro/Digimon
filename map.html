  @font-face {
    font-family: 'Pixel Digivolve';
    src: url('https://db.onlinewebfonts.com/t/e7a35327535403014c02a38c285b82cf.woff2') format('woff2'),
         url('https://db.onlinewebfonts.com/t/e7a35327535403014c02a38c285b82cf.woff') format('woff'),
         url('https://db.onlinewebfonts.com/t/e7a35327535403014c02a38c285b82cf.ttf') format('truetype');
    font-display: swap;
  }
  .pixel-title{ font-family:'Pixel Digivolve','Share Tech Mono',monospace; letter-spacing:0.03em; }
  :root{
    --bg: #080b10;
    --panel: #0e141b;
    --panel-2: #121a22;
    --line: #1c2a30;
    --cyan: #35e8c9;
    --cyan-dim: #1f6e63;
    --amber: #ff8a3d;
    --text: #dcece8;
    --text-mute: #6d8385;
    --danger: #ff5d5d;
    --radius: 2px;
    font-family: 'Manrope', sans-serif;
  }
  *{box-sizing:border-box;}
  body,#root-app{margin:0;padding:0;background:var(--bg);color:var(--text);}
  .mono{font-family:'Share Tech Mono', monospace; letter-spacing: 0.04em;}
  .app{min-height:100vh;background:
      radial-gradient(circle at 15% 10%, rgba(53,232,201,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,138,61,0.05), transparent 45%),
      var(--bg);
      padding:20px; position:relative; overflow-x:hidden;}
  .hud-frame{border:1px solid var(--line); background:var(--panel); border-radius:var(--radius); position:relative;}
  .hud-frame::before{content:"";position:absolute;top:-1px;left:-1px;width:14px;height:14px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
  .hud-frame::after{content:"";position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-dot{width:9px;height:9px;background:var(--cyan);box-shadow:0 0 8px var(--cyan);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .brand-title{font-family:'Pixel Digivolve','Share Tech Mono',monospace;font-size:15px;text-transform:uppercase;color:var(--cyan);letter-spacing:0.05em;}
  .brand-sub{font-size:11px;color:var(--text-mute);}

  .btn{font-family:'Share Tech Mono',monospace;background:transparent;border:1px solid var(--cyan-dim);color:var(--cyan);
    padding:8px 14px;cursor:pointer;text-transform:uppercase;font-size:12px;letter-spacing:0.05em;border-radius:var(--radius);transition:.15s;}
  .btn:hover{background:rgba(53,232,201,0.1);border-color:var(--cyan);}
  .btn.solid{background:var(--cyan);color:#04211c;border-color:var(--cyan);font-weight:700;}
  .btn.solid:hover{background:#4ffbe0;}
  .btn.ghost{border-color:var(--line);color:var(--text-mute);}
  .btn.small{padding:5px 10px;font-size:10px;}

  input[type=text], select{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 10px; font-family:'Manrope',sans-serif; font-size:13px; border-radius:var(--radius); width:100%;
  }
  input:focus, select:focus{outline:none;border-color:var(--cyan-dim);}
  label{font-size:10px;text-transform:uppercase;color:var(--text-mute);letter-spacing:0.06em;display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:12px;}
  .row > *{flex:1;}
  .section-title{font-size:12px;text-transform:uppercase;color:var(--cyan);letter-spacing:0.08em;margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .card{padding:16px;margin-bottom:16px;max-width:760px;margin-left:auto;margin-right:auto;}
  .muted{color:var(--text-mute);font-size:12px;}
  .sub{color:var(--text-mute);font-size:12px;}
  .tag{display:inline-block;border:1px solid var(--line);color:var(--text-mute);font-size:10px;padding:1px 6px;border-radius:10px;margin-left:4px;}
  .err{color:var(--danger);font-size:12px;min-height:14px;}

  .breadcrumb{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan);margin-bottom:14px;}
  .breadcrumb span{cursor:pointer;text-decoration:underline;}
  .breadcrumb span:hover{color:#4ffbe0;}

  .map-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:0;aspect-ratio:1/1;border:1px solid var(--line);}
  .map-cell{position:relative;border:1px solid transparent;background:var(--panel-2);overflow:hidden;cursor:default;display:flex;align-items:flex-end;min-height:0;}
  .map-cell.filled{cursor:pointer;}
  .map-cell.filled:hover{border-color:var(--cyan);z-index:3;}
  .map-cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s ease;}
  .map-cell.filled:hover img{transform:scale(1.12);}
  .map-cell .lbl{position:relative;z-index:1;width:100%;padding:6px 8px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text);}
  .map-cell.empty .lbl{color:var(--text-mute);font-size:10px;text-align:center;width:100%;padding:0;}
  .map-cell.empty{align-items:center;justify-content:center;border-color:var(--line);}
  .map-cell.current{border-color:var(--cyan);box-shadow:0 0 12px rgba(53,232,201,0.35) inset;}
  .map-cell.addable{cursor:pointer;border-style:dashed;border-color:var(--line);}
  .map-cell.addable:hover{border-color:var(--cyan);}
  .map-cell.addable .lbl{color:var(--cyan-dim);}
  .map-cell.mystery{align-items:center;justify-content:center;cursor:default;}
  .map-cell.mystery .q{font-size:22px;color:var(--text-mute);opacity:0.6;}
  .digimoji-mystery{font-family:'Digicode','Share Tech Mono',monospace;font-size:10px;color:var(--text-mute);opacity:0.7;margin-top:2px;}
  .map-cell-reveal{position:absolute;bottom:2px;right:2px;z-index:4;padding:2px 6px !important;font-size:10px !important;background:rgba(8,11,16,0.7) !important;}
  .map-cell-del{position:absolute;top:2px;right:2px;z-index:4;padding:2px 6px !important;font-size:10px !important;background:rgba(8,11,16,0.7) !important;}

  textarea{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 10px; font-family:'Manrope',sans-serif; font-size:13px; border-radius:var(--radius); width:100%; resize:vertical;
  }
  textarea:focus{outline:none;border-color:var(--cyan-dim);}

  .luogo-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
  .luogo-tile{width:110px;border:1px solid var(--line);background:var(--panel-2);cursor:pointer;overflow:hidden;}
  .luogo-tile:hover{border-color:var(--cyan);}
  .luogo-tile .img{height:70px;background:#05070a;position:relative;overflow:hidden;}
  .luogo-tile .img img{width:100%;height:100%;object-fit:cover;}
  .luogo-tile .nm{font-size:11px;padding:5px;font-family:'Share Tech Mono',monospace;}

  .detail-image{width:100%;max-height:260px;object-fit:cover;border:1px solid var(--line);margin-bottom:12px;background:#05070a;}
  .connections-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}

  .login-wrap{max-width:420px;margin:60px auto;padding:32px;}
  .login-wrap h1{font-family:'Pixel Digivolve','Share Tech Mono',monospace;color:var(--cyan);font-size:24px;letter-spacing:0.03em;text-align:center;text-shadow:0 0 16px rgba(53,232,201,0.5);margin-bottom:4px;}
  .role-pick{display:flex;gap:8px;}
  .role-pick .btn.active{background:var(--cyan);color:#04211c;border-color:var(--cyan);}
</style>
</head>
<body>
<div id="root-app" class="app"><div class="hud-frame card"><div class="muted">Caricamento…</div></div></div>

<script>
(function(){
  const SESSION_KEY = 'digivice_session_v1';
  const root = document.getElementById('root-app');
  let session = null;
  let cachedScene = null;
  let pollTimer = null;
  let lastApiError = null;
  let lastSaveAt = 0;
  // view state
  let view = 'sectors'; // 'sectors' | 'sector' | 'luogo'
  let selectedSectorId = null;
  let selectedLuogoId = null;
  let addingSectorPos = null; // grid position (0-8) currently being filled with a new sector, master only

  function escapeHTML(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ---------- DIGIMOJI: stessa conversione fonetica italiana -> Hiragana usata in index.html ----------
  const HIRA3 = {chi:'き',che:'け',ghi:'ぎ',ghe:'げ',sci:'し',tsu:'つ',shi:'し'};
  const HIRA2 = {
    ka:'か',ki:'き',ku:'く',ke:'け',ko:'こ',
    ca:'か',co:'こ',cu:'く',ci:'ち',
    sa:'さ',si:'し',su:'す',se:'せ',so:'そ',
    ta:'た',ti:'ち',te:'て',to:'と',tu:'つ',
    na:'な',ni:'に',nu:'ぬ',ne:'ね',no:'の',
    ha:'は',hi:'ひ',hu:'ふ',fu:'ふ',he:'へ',ho:'ほ',
    ma:'ま',mi:'み',mu:'む',me:'め',mo:'も',
    ya:'や',yu:'ゆ',yo:'よ',
    ra:'ら',ri:'り',ru:'る',re:'れ',ro:'ろ',
    wa:'わ',wo:'を',
    ga:'が',gu:'ぐ',go:'ご',gi:'じ',
    za:'ざ',zu:'ず',ze:'ぜ',zo:'ぞ',zi:'じ',
    da:'だ',de:'で',do:'ど',di:'ぢ',du:'づ',
    ba:'ば',bi:'び',bu:'ぶ',be:'べ',bo:'ぼ',
    pa:'ぱ',pi:'ぴ',pu:'ぷ',pe:'ぺ',po:'ぽ',
  };
  const HIRA1 = {a:'あ',i:'い',u:'う',e:'え',o:'お',n:'ん'};
  function italianToHiragana(text){
    let out = '';
    const lower = String(text||'').toLowerCase();
    let i = 0;
    while(i < lower.length){
      const c3 = lower.substr(i,3);
      const c2 = lower.substr(i,2);
      const c1 = lower.substr(i,1);
      if(c3.length===3 && HIRA3[c3]){ out += HIRA3[c3]; i+=3; continue; }
      if(c2.length===2 && HIRA2[c2]){ out += HIRA2[c2]; i+=2; continue; }
      if(HIRA1[c1]){ out += HIRA1[c1]; i+=1; continue; }
      out += text[i]; i+=1;
    }
    return out;
  }
  const MYSTERY_LABEL = italianToHiragana('sconosciuto');
  function escapeAttr(s){ return escapeHTML(s); }
  function sanitizeKeyPart(s){ return String(s||'').trim().toUpperCase().replace(/[^A-Z0-9_-]/g,''); }

  // ---------- IMAGE UPLOAD (hosted via Supabase Storage, no external URL needed) ----------
  function imageUploadRowHTML(textInputId){
    return `<input type="file" accept="image/*" id="upload-file-${textInputId}" style="display:none;" />
      <button type="button" class="btn ghost small" id="upload-btn-${textInputId}" style="white-space:nowrap;">📤 Carica</button>`;
  }
  function bindImageUpload(textInputId, statusElId){
    const fileInput = document.getElementById('upload-file-'+textInputId);
    const btn = document.getElementById('upload-btn-'+textInputId);
    if(!fileInput || !btn) return;
    btn.onclick = ()=> fileInput.click();
    fileInput.onchange = async ()=>{
      const file = fileInput.files[0];
      if(!file) return;
      const statusEl = statusElId ? document.getElementById(statusElId) : null;
      if(statusEl) statusEl.textContent = 'Caricamento in corso...';
      btn.disabled = true;
      try{
        const dataUrl = await new Promise((resolve, reject)=>{
          const reader = new FileReader();
          reader.onload = ()=> resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const res = await apiPost('/api/upload', { code: session.code, dataUrl });
        if(res && res.ok && res.url){
          const textInput = document.getElementById(textInputId);
          if(textInput){
            textInput.value = res.url;
            textInput.dispatchEvent(new Event('change'));
          }
          if(statusEl) statusEl.textContent = '';
        } else {
          if(statusEl) statusEl.textContent = '⚠ Caricamento fallito: ' + (lastApiError || 'errore sconosciuto');
        }
      }catch(e){
        if(statusEl) statusEl.textContent = '⚠ Errore durante il caricamento: ' + e.message;
      }
      btn.disabled = false;
      fileInput.value = '';
    };
  }

  function saveSession(s){ try{ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }catch(e){} }
  function loadSession(){ try{ const v = localStorage.getItem(SESSION_KEY); return v ? JSON.parse(v) : null; }catch(e){ return null; } }

  async function apiGet(path){
    try{
      const r = await fetch(path);
      const data = await r.json();
      if(!r.ok){ lastApiError = (data && data.error) || ('Errore di rete (' + r.status + ')'); return null; }
      lastApiError = null;
      return data;
    }catch(e){ lastApiError = 'Impossibile contattare il server.'; return null; }
  }
  async function apiPost(path, body){
    try{
      const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await r.json();
      if(!r.ok){ lastApiError = (data && data.error) || ('Errore di salvataggio (' + r.status + ')'); return null; }
      lastApiError = null;
      return data;
    }catch(e){ lastApiError = 'Impossibile contattare il server.'; return null; }
  }
  async function getScene(code){
    const d = await apiGet('/api/scene?code=' + encodeURIComponent(code));
    const s = d ? d.scene : { title:'', background:'', music:'', encounters:[] };
    if(!Array.isArray(s.macroScenes)) s.macroScenes = [];
    if(s.currentMacroSceneId===undefined) s.currentMacroSceneId = null;
    return s;
  }
  async function saveScene(code, scene){
    let d = await apiPost('/api/scene', { code, ...scene });
    if(!d){ d = await apiPost('/api/scene', { code, ...scene }); } // one retry, in case of a transient failure
    if(!d || !d.ok) return false;
    lastSaveAt = Date.now();
    // The API can report ok:true without actually persisting every field (e.g. if the backend
    // wasn't updated to store macroScenes). Re-fetch and do a light structural check to catch that —
    // NOT a strict deep-equal, since jsonb storage can reorder object keys on a round-trip.
    try{
      const verify = await apiGet('/api/scene?code=' + encodeURIComponent(code));
      const verifiedMacros = (verify && verify.scene && Array.isArray(verify.scene.macroScenes)) ? verify.scene.macroScenes : null;
      const sentMacros = Array.isArray(scene.macroScenes) ? scene.macroScenes : [];
      if(!verifiedMacros || verifiedMacros.length !== sentMacros.length){
        lastApiError = 'Il server ha accettato la richiesta ma le Macroscene non risultano salvate correttamente. È quasi certo un bug nel backend (api/scene) che non gestisce ancora il campo "macroScenes".';
        return false;
      }
      if(scene.currentMacroSceneId){
        const sentActive = sentMacros.find(m=>m.id===scene.currentMacroSceneId);
        const verifiedActive = verifiedMacros.find(m=>m.id===scene.currentMacroSceneId);
        if(sentActive && (!verifiedActive || (sentActive.sectors||[]).length !== (verifiedActive.sectors||[]).length)){
          lastApiError = 'Il server ha accettato la richiesta ma i Settori della Macroscena attiva non risultano salvati correttamente.';
          return false;
        }
      }
    }catch(e){ /* if verification itself fails, don't block on it — trust the ok response */ }
    return true;
  }

                ${master ? `<div class="row" style="gap:2px;padding:0 2px 2px;">
                  <button class="btn ghost small" data-quick-reveal-luogo="${s.id}:${lg.id}" style="flex:1;font-size:9px;padding:2px;">${revealed?'🙈':'👁️'}</button>
                  <button class="btn ghost small" data-quick-del-luogo="${lg.id}" style="flex:1;font-size:9px;padding:2px;">🗑</button>
                </div>` : ''}
              </div>
            `;
            }).join('')}
          </div>
        ` : '<div class="muted" style="margin-top:14px;">Nessun luogo specifico in questo settore.</div>'}
        ${master ? `
          <div class="row" style="margin-top:10px;">
            <input type="text" id="new-luogo-name" placeholder="Nuovo Luogo (es. Vecchia Quercia)" style="flex:2;" />
            <button class="btn small" id="btn-add-luogo" style="flex:1;">+ Luogo</button>
          </div>
        ` : ''}
        <div class="muted" style="margin-top:14px;">Settori collegati:</div>
        <div class="connections-row">
          ${(s.connections||[]).length===0 ? '<span class="muted">nessuno</span>' : (s.connections||[]).map(cid=>{
            const c = sectors.find(x=>x.id===cid); if(!c) return '';
            return `<button class="btn small" data-open-sector="${c.id}">${escapeHTML(c.name)}</button>`;
          }).join('')}
        </div>
        ${master && sectors.length>1 ? `
          <div class="muted" style="margin-top:10px;">Collega/scollega Settori:</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">
            ${sectors.filter(x=>x.id!==s.id).map(x=>`<label style="display:flex;align-items:center;gap:4px;font-size:11px;"><input type="checkbox" class="connect-toggle-chk" value="${x.id}" ${(s.connections||[]).includes(x.id)?'checked':''}/> ${escapeHTML(x.name)}</label>`).join('')}
          </div>
        ` : ''}
        <div class="row" style="margin-top:16px;">
          <button class="btn ghost small" data-nav-back-macro style="flex:1;">← Torna alla Mappa</button>
          ${master ? `<button class="btn ghost small" id="btn-delete-sector" style="flex:1;color:var(--danger);border-color:rgba(255,93,93,0.4);">🗑️ Elimina Settore</button>` : ''}
        </div>
        <div class="err" id="sector-edit-status"></div>
      `;
      bodyEl.querySelectorAll('[data-open-luogo]').forEach(el=>{
        el.onclick = (e)=>{
          if(e.target.closest('[data-quick-del-luogo]') || e.target.closest('[data-quick-reveal-luogo]')) return;
          selectedLuogoId = el.getAttribute('data-open-luogo'); view='luogo'; renderMapBody(activeMacro);
        };
      });
      bodyEl.querySelectorAll('[data-quick-reveal-luogo]').forEach(btn=>{
        btn.onclick = async (e)=>{
          e.stopPropagation();
          const [sectorId, luogoId] = btn.getAttribute('data-quick-reveal-luogo').split(':');
          const parentSector = sectors.find(x=>x.id===sectorId);
          const lg = parentSector ? (parentSector.luoghi||[]).find(x=>x.id===luogoId) : null;
          if(!lg) return;
          lg.revealed = !lg.revealed;
          await persist();
          renderMapBody(activeMacro);
        };
      });
      bodyEl.querySelectorAll('[data-open-sector]').forEach(el=>{
        el.onclick = ()=>{ selectedSectorId = el.getAttribute('data-open-sector'); view='sector'; renderMapBody(activeMacro); };
      });
      const navMacro = bodyEl.querySelector('[data-nav-macro]');
      if(navMacro) navMacro.onclick = ()=>{ view='sectors'; renderMapBody(activeMacro); };
      const navBack = bodyEl.querySelector('[data-nav-back-macro]');
      if(navBack) navBack.onclick = ()=>{ view='sectors'; renderMapBody(activeMacro); };
      if(master){
        bindImageUpload('edit-sector-image', 'edit-sector-image-status');
        const nameEl = document.getElementById('edit-sector-name');
        if(nameEl) nameEl.onchange = async ()=>{ s.name = nameEl.value.trim() || s.name; await persist(); renderMapBody(activeMacro); };
        const terrainEl = document.getElementById('edit-sector-terrain');
        if(terrainEl) terrainEl.onchange = async ()=>{ s.terrain = terrainEl.value; await persist(); renderMapBody(activeMacro); };
        const descEl = document.getElementById('edit-sector-desc');
        if(descEl) descEl.onchange = async ()=>{ s.description = descEl.value; await persist(); renderMapBody(activeMacro); };
        const imageEl = document.getElementById('edit-sector-image');
        if(imageEl) imageEl.onchange = async ()=>{ s.image = imageEl.value.trim(); await persist(); renderMapBody(activeMacro); };
        const gridEl = document.getElementById('edit-sector-gridpos');
        if(gridEl) gridEl.onchange = async ()=>{ s.gridPos = Number(gridEl.value); await persist(); renderMapBody(activeMacro); };
        const revealBtn = document.getElementById('btn-toggle-sector-reveal');
        if(revealBtn) revealBtn.onclick = async ()=>{ s.revealed = !s.revealed; await persist(); renderMapBody(activeMacro); };
        bodyEl.querySelectorAll('.connect-toggle-chk').forEach(chk=>{
          chk.onchange = async ()=>{
            const otherId = chk.value;
            const other = sectors.find(x=>x.id===otherId);
            if(!s.connections) s.connections = [];
            if(chk.checked){
              if(!s.connections.includes(otherId)) s.connections.push(otherId);
              if(other){ if(!other.connections) other.connections=[]; if(!other.connections.includes(s.id)) other.connections.push(s.id); }
            } else {
              s.connections = s.connections.filter(cid=>cid!==otherId);
              if(other) other.connections = (other.connections||[]).filter(cid=>cid!==s.id);
            }
            await persist();
            renderMapBody(activeMacro);
          };
        });
        const addLuogoBtn = document.getElementById('btn-add-luogo');
        if(addLuogoBtn) addLuogoBtn.onclick = async ()=>{
          const input = document.getElementById('new-luogo-name');
          const name = input.value.trim();
          if(!name) return;
          if(!s.luoghi) s.luoghi = [];
          s.luoghi.push({ id:'l'+Date.now()+Math.random().toString(36).slice(2,6), name, description:'', revealed:false });
          await persist();
          renderMapBody(activeMacro);
        };
        bodyEl.querySelectorAll('[data-quick-del-luogo]').forEach(btn=>{
          btn.onclick = async (e)=>{
            e.stopPropagation();
            const id = btn.getAttribute('data-quick-del-luogo');
            const lg = (s.luoghi||[]).find(x=>x.id===id);
            if(!window.confirm(`Eliminare il Luogo "${lg?lg.name:''}"?`)) return;
            s.luoghi = (s.luoghi||[]).filter(x=>x.id!==id);
            if(cachedScene.currentLuogoId===id) cachedScene.currentLuogoId=null;
            await persist();
            renderMapBody(activeMacro);
          };
        });
        const deleteSectorBtn = document.getElementById('btn-delete-sector');
        if(deleteSectorBtn) deleteSectorBtn.onclick = async ()=>{
          if(!window.confirm(`Eliminare il Settore "${s.name}" e tutti i suoi Luoghi?`)) return;
          activeMacro.sectors = (activeMacro.sectors||[]).filter(x=>x.id!==s.id);
          (activeMacro.sectors||[]).forEach(x=>{ x.connections = (x.connections||[]).filter(cid=>cid!==s.id); });
          if(cachedScene.currentSectorId===s.id){ cachedScene.currentSectorId=null; cachedScene.currentLuogoId=null; }
          view='sectors'; selectedSectorId=null;
          await persist();
          renderMapBody(activeMacro);
        };
      }
    } else if(view==='luogo'){
      const s = sectors.find(x=>x.id===selectedSectorId);
      const lg = s ? (s.luoghi||[]).find(x=>x.id===selectedLuogoId) : null;
      if(!s || !lg){ view='sectors'; renderMapBody(activeMacro); return; }
      bodyEl.innerHTML = `
        <div class="breadcrumb"><span data-nav-macro>📍 ${escapeHTML(activeMacro.name)}</span> → <span data-nav-sector>${escapeHTML(s.name)}</span> → ${escapeHTML(lg.name)}</div>
        ${master ? `
          <div class="hud-frame" style="padding:12px;margin-bottom:10px;">
            <div class="muted" style="margin-bottom:8px;">🛠️ Modifica Luogo (solo Master)</div>
            <div class="field"><label>Nome</label><input type="text" id="edit-luogo-name" value="${escapeAttr(lg.name)}" /></div>
            <div class="field"><label>Descrizione</label><textarea id="edit-luogo-desc" rows="3">${escapeHTML(lg.description||'')}</textarea></div>
            <div class="field"><label>URL Immagine</label>
              <div class="row" style="align-items:flex-start;">
                <input type="text" id="edit-luogo-image" value="${escapeAttr(lg.image||'')}" style="flex:2;" />
                <div style="flex:1;display:flex;align-items:center;">${imageUploadRowHTML('edit-luogo-image')}</div>
              </div>
              <div class="err" id="edit-luogo-image-status"></div>
            </div>
            <button class="btn ${lg.revealed?'ghost':''} small" id="btn-toggle-luogo-reveal">${lg.revealed?'🙈 Nascondi ai giocatori':'👁️ Rivela ai giocatori'}</button>
          </div>
        ` : `
          ${lg.image ? `<img class="detail-image" src="${escapeAttr(lg.image)}" onerror="this.style.display='none'" />` : ''}
          <div><b>${escapeHTML(lg.name)}</b></div>
          ${lg.description ? `<div class="sub" style="margin-top:6px;">${escapeHTML(lg.description)}</div>` : '<div class="muted" style="margin-top:6px;">Nessuna descrizione.</div>'}
        `}
        <div class="row" style="margin-top:16px;">
          <button class="btn ghost small" style="flex:1;" data-nav-back-sector>← Torna a "${escapeHTML(s.name)}"</button>
          ${master ? `<button class="btn ghost small" id="btn-delete-luogo" style="flex:1;color:var(--danger);border-color:rgba(255,93,93,0.4);">🗑️ Elimina Luogo</button>` : ''}
        </div>
      `;
      const navMacro = bodyEl.querySelector('[data-nav-macro]');
      if(navMacro) navMacro.onclick = ()=>{ view='sectors'; renderMapBody(activeMacro); };
      const navSector = bodyEl.querySelector('[data-nav-sector]');
      if(navSector) navSector.onclick = ()=>{ view='sector'; renderMapBody(activeMacro); };
      const navBack = bodyEl.querySelector('[data-nav-back-sector]');
      if(navBack) navBack.onclick = ()=>{ view='sector'; renderMapBody(activeMacro); };
      if(master){
        bindImageUpload('edit-luogo-image', 'edit-luogo-image-status');
        const nameEl = document.getElementById('edit-luogo-name');
        if(nameEl) nameEl.onchange = async ()=>{ lg.name = nameEl.value.trim() || lg.name; await persist(); renderMapBody(activeMacro); };
        const descEl = document.getElementById('edit-luogo-desc');
        if(descEl) descEl.onchange = async ()=>{ lg.description = descEl.value; await persist(); renderMapBody(activeMacro); };
        const imageEl = document.getElementById('edit-luogo-image');
        if(imageEl) imageEl.onchange = async ()=>{ lg.image = imageEl.value.trim(); await persist(); renderMapBody(activeMacro); };
        const luogoRevealBtn = document.getElementById('btn-toggle-luogo-reveal');
        if(luogoRevealBtn) luogoRevealBtn.onclick = async ()=>{ lg.revealed = !lg.revealed; await persist(); renderMapBody(activeMacro); };
        const deleteBtn = document.getElementById('btn-delete-luogo');
        if(deleteBtn) deleteBtn.onclick = async ()=>{
          if(!window.confirm(`Eliminare il Luogo "${lg.name}"?`)) return;
          s.luoghi = (s.luoghi||[]).filter(x=>x.id!==lg.id);
          if(cachedScene.currentLuogoId===lg.id) cachedScene.currentLuogoId=null;
          view='sector';
          await persist();
          renderMapBody(activeMacro);
        };
      }
    }
  }

  async function refresh(){
    if(!session) return;
    const fresh = await getScene(session.code);
    cachedScene = fresh;
    view = 'sectors'; selectedSectorId = null; selectedLuogoId = null; addingSectorPos = null;
    renderMap();
  }

  function isFieldFocused(){
    const el = document.activeElement;
    return !!(el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.tagName==='SELECT'));
  }

  // Automatic polling is OFF: with editing now happening directly on this page, a background
  // refresh could overwrite in-progress changes with stale data (e.g. from another open tab).
  // The Master (or a player) refreshes manually with the 🔄 Aggiorna button instead.
  function startPolling(){ /* intentionally disabled */ }

  async function boot(){
    session = loadSession();
    if(!session || !session.code || !session.username){
      renderLogin();
      return;
    }
    cachedScene = await getScene(session.code);
    view = 'sectors'; selectedSectorId = null; selectedLuogoId = null; addingSectorPos = null;
    renderMap();
  }

  boot();
})();
</script>
</body>
</html>
