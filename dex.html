<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digidex — Digimon: Digital Adventures 2E</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #080b10;
    --panel: #0e141b;
    --panel-2: #121a22;
    --line: #1c2a30;
    --cyan: #35e8c9;
    --cyan-dim: #1f6e63;
    --amber: #ff8a3d;
    --text: #dcece8;
    --text-mute: #6d8385;
    --danger: #ff5d5d;
    --radius: 2px;
    font-family: 'Manrope', sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;padding:0;background:var(--bg);color:var(--text);}
  .mono{font-family:'Share Tech Mono', monospace;}
  .app{min-height:100vh;background:
      radial-gradient(circle at 15% 10%, rgba(53,232,201,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,138,61,0.05), transparent 45%),
      var(--bg);
      padding:20px;}
  .hud-frame{border:1px solid var(--line); background:var(--panel); border-radius:var(--radius); position:relative;}
  .hud-frame::before{content:"";position:absolute;top:-1px;left:-1px;width:14px;height:14px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
  .hud-frame::after{content:"";position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
  .brand-title{font-size:15px;text-transform:uppercase;color:var(--cyan);}
  .brand-sub{font-size:11px;color:var(--text-mute);}
  .conn-ticker{font-size:11px;color:var(--text-mute);}
  .conn-ticker b{color:var(--cyan);}
  .btn{font-family:'Share Tech Mono',monospace;background:transparent;border:1px solid var(--cyan-dim);color:var(--cyan);
    padding:8px 14px;cursor:pointer;text-transform:uppercase;font-size:12px;letter-spacing:0.05em;border-radius:var(--radius);}
  .btn:hover{background:rgba(53,232,201,0.1);}
  .btn.solid{background:var(--cyan);color:#04211c;border-color:var(--cyan);font-weight:700;}
  .btn.solid:hover{background:#4ffbe0;}
  .btn.ghost{border-color:var(--line);color:var(--text-mute);}
  .btn.amber{border-color:var(--amber);color:var(--amber);}
  .btn.small{padding:5px 10px;font-size:10px;}
  input[type=text], input[type=number], textarea, select{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 10px; font-family:'Manrope',sans-serif; font-size:14px; border-radius:var(--radius); width:100%;
  }
  input[type=color]{padding:2px;height:38px;}
  label{font-size:10px;text-transform:uppercase;color:var(--text-mute);letter-spacing:0.06em;display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:12px;}
  .row > *{flex:1;}
  .section-title{font-size:13px;text-transform:uppercase;color:var(--cyan);letter-spacing:0.08em;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--line);}
  .card{padding:18px;margin-bottom:16px;}
  .tag{font-size:10px;padding:2px 8px;border:1px solid var(--line);color:var(--text-mute);border-radius:20px;text-transform:uppercase;}
  .muted{color:var(--text-mute);font-size:12px;}
  .err{color:var(--danger);font-size:12px;}
  .divider{height:1px;background:var(--line);margin:16px 0;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;}

  .login-wrap{max-width:420px;margin:60px auto;}
  .login-wrap h1{font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:20px;text-align:center;margin-bottom:4px;}
  .login-wrap .sub{text-align:center;color:var(--text-mute);font-size:12px;margin-bottom:24px;}

  .filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
  .filter-chip{cursor:pointer;}
  .filter-chip.active{background:rgba(53,232,201,0.15);border-color:var(--cyan);color:var(--cyan);}

  .dex-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));gap:14px;}
  .dex-card{cursor:pointer;padding:0;overflow:hidden;transition:transform .15s;}
  .dex-card:hover{transform:translateY(-3px);border-color:var(--cyan-dim);}
  .dex-card .thumb{width:100%;aspect-ratio:1;background:var(--panel-2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  .dex-card .thumb img{width:100%;height:100%;object-fit:cover;}
  .dex-card .thumb .placeholder{font-family:'Share Tech Mono',monospace;font-size:36px;color:var(--text-mute);}
  .dex-card .info{padding:10px;}
  .dex-card .name{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan);}
  .dex-card.unknown .name{color:var(--text-mute);}

  .modal-overlay{position:fixed;inset:0;background:rgba(5,7,10,0.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;overflow-y:auto;}
  .modal-box{max-width:560px;width:100%;max-height:90vh;overflow-y:auto;}
  .portrait-lg{width:100%;max-height:400px;object-fit:contain;background:var(--panel-2);border:1px solid var(--line);margin-bottom:12px;}
  .stat-box{text-align:center;padding:8px 4px;background:var(--panel-2);border:1px solid var(--line);}
  .stat-box .v{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--cyan);}
  .stat-box .l{font-size:9px;color:var(--text-mute);text-transform:uppercase;margin-top:2px;}
  .grid-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px;}
  .roster-item{padding:8px;border-bottom:1px solid var(--line);font-size:12px;}

  @media (max-width:760px){
    .app{padding:10px;}
    .dex-grid{grid-template-columns:repeat(auto-fill, minmax(120px,1fr));}
    .row{flex-wrap:wrap;}
    .row > *{flex:1 1 100%;}
    .grid-stats{grid-template-columns:repeat(3,1fr);}
  }
</style>
</head>
<body>
<div id="root-app" class="app"></div>

<script>
(function(){
  const root = document.getElementById('root-app');
  const SESSION_KEY = 'digivice_session_v1';
  let session = null;
  let cachedDex = [];
  let activeFilters = [];
  let activeAttrFilter = '';
  let searchQuery = '';
  let activeFamilyFilter = '';
  const ATTRIBUTES = ['Vaccine','Data','Virus','Free','Variable'];
  const FAMILIES = ['Dark Empire','Deep Savers',"Dragon's Roar",'Jungle Troopers','Metal Empire','Nature Spirits','Nightmare Soldiers','Unknown','Virus Busters','Wind Guardians'];
  let editEntry = null; // entry being edited/added in modal

  function loadSession(){ try{ const v = localStorage.getItem(SESSION_KEY); return v ? JSON.parse(v) : null; }catch(e){ return null; } }

  async function apiGet(path){
    try{ const r = await fetch(path); const data = await r.json(); if(!r.ok) return null; return data; }catch(e){ return null; }
  }
  async function apiPost(path, body){
    try{ const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }); const data = await r.json(); if(!r.ok) return null; return data; }catch(e){ return null; }
  }
  async function apiPut(path, body){
    try{ const r = await fetch(path, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }); const data = await r.json(); if(!r.ok) return null; return data; }catch(e){ return null; }
  }
  async function apiDelete(path){
    try{ const r = await fetch(path, { method:'DELETE' }); const data = await r.json(); if(!r.ok) return null; return data; }catch(e){ return null; }
  }

  async function getDex(code){ const d = await apiGet('/api/dex?code=' + encodeURIComponent(code)); return d ? (d.entries||[]) : []; }
  async function addDexEntry(code, entry){ return apiPost('/api/dex', { code, ...entry }); }
  async function updateDexEntry(code, id, fields){ return apiPut('/api/dex', { code, id, ...fields }); }
  async function deleteDexEntry(code, id){ return apiDelete('/api/dex?code=' + encodeURIComponent(code) + '&id=' + encodeURIComponent(id)); }

  function escapeHTML(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s){ return escapeHTML(s); }

  function computeDpSpent(qualities){ return (qualities||[]).reduce((s,q)=>s+(Number(q.cost)||0),0); }

  function evolutionsHTML(evolutions, label){
    if(!evolutions || !evolutions.length) return '';
    return `<div class="muted" style="margin:10px 0 4px;">${label||'Possibili Evoluzioni'}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${evolutions.map(ev=>{
          const live = ev.id ? cachedDex.find(e=>String(e.id)===String(ev.id)) : null;
          const img = live ? live.image_url : ev.imageUrl;
          const name = live ? live.name : ev.name;
          return `
          <div style="display:flex;flex-direction:column;align-items:center;width:56px;${ev.id?'cursor:pointer;':''}" ${ev.id?`data-nav-evo="${ev.id}"`:''}>
            ${img ? `<img src="${escapeAttr(img)}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:1px solid var(--cyan-dim);" onerror="this.style.visibility='hidden'"/>` : `<div style="width:40px;height:40px;border-radius:50%;background:var(--panel-2);border:1px solid var(--cyan-dim);"></div>`}
            <div class="muted" style="font-size:9px;text-align:center;margin-top:2px;${ev.id?'color:var(--cyan);':''}">${escapeHTML(name)}</div>
          </div>
        `;}).join('')}
      </div>`;
  }

  function qualitiesHTML(qualities, dpTotal){
    if(!qualities || !qualities.length) return '';
    return `<div class="flex-between" style="margin:10px 0 6px;">
        <span class="muted">Qualities</span>
        <span class="mono" style="color:${computeDpSpent(qualities)>Number(dpTotal||0)?'var(--danger)':'var(--cyan)'};">${computeDpSpent(qualities)} / ${dpTotal||0} DP</span>
      </div>
      ${qualities.map(q=>`
        <div class="roster-item">
          <div class="flex-between"><b>${escapeHTML(q.name)}</b><span class="mono">${q.cost} DP</span></div>
          ${q.description?`<div class="muted" style="margin-top:2px;">${escapeHTML(q.description)}</div>`:''}
        </div>
      `).join('')}`;
  }

  function render(){
    if(!session){ renderLogin(); }
    else { renderDexPage(); }
  }

  function renderLogin(){
    root.innerHTML = `
      <div class="login-wrap hud-frame" style="padding:32px;">
        <h1 class="mono">DIGIDEX // ACCESSO</h1>
        <div class="sub">Inserisci lo stesso codice campagna e nome utente usati nel tavolo testuale.</div>
        <div class="field"><label>Codice Campagna</label><input type="text" id="in-code" placeholder="es. FRONTIER01" /></div>
        <div class="field"><label>Nome Utente</label><input type="text" id="in-user" placeholder="il tuo nome" /></div>
        <div class="field"><label>Ruolo</label>
          <select id="in-role"><option value="player">Giocatore</option><option value="master">Master</option></select>
        </div>
        <button class="btn solid" id="btn-enter" style="width:100%;padding:12px;">Entra nel Dex</button>
        <div class="err" id="login-err" style="margin-top:8px;"></div>
        <div class="muted" style="text-align:center;margin-top:16px;"><a href="index.html" style="color:var(--cyan);">← Torna al Tavolo Testuale</a></div>
      </div>
    `;
    document.getElementById('btn-enter').onclick = ()=>{
      const code = document.getElementById('in-code').value.trim().toUpperCase().replace(/[^A-Z0-9_-]/g,'');
      const username = document.getElementById('in-user').value.trim();
      const role = document.getElementById('in-role').value;
      const errEl = document.getElementById('login-err');
      if(!code || !username){ errEl.textContent = 'Inserisci codice campagna e nome utente.'; return; }
      session = { code, username, role };
      render();
    };
  }

  function topbar(){
    return `
    <div class="hud-frame topbar">
      <div>
        <div class="brand-title mono">DIGIDEX</div>
        <div class="brand-sub">Digimon: Digital Adventures — Compendio Campagna ${escapeHTML(session.code)}</div>
      </div>
      <div class="conn-ticker mono">
        UTENTE <b>${escapeHTML(session.username)}</b> (${session.role==='master'?'Master':'Giocatore'})
        &nbsp;<a href="index.html" class="btn ghost small" style="margin-left:8px;text-decoration:none;">← Tavolo</a>
        &nbsp;<button class="btn ghost small" id="btn-logout">Esci</button>
      </div>
    </div>`;
  }

  async function renderDexPage(){
    cachedDex = await getDex(session.code);
    const isMaster = session.role==='master';
    root.innerHTML = `
      ${topbar()}
      <div class="hud-frame card">
        <div class="flex-between" style="margin-bottom:10px;">
          <div class="section-title" style="margin:0;border:none;padding:0;">Digimon Registrati (${cachedDex.length})</div>
          ${isMaster ? `<span><button class="btn ghost small" id="btn-import-seed2" style="margin-right:6px;color:var(--cyan);">🎴 Importa/Correggi Famosi</button><button class="btn ghost small" id="btn-bulk-images" style="margin-right:6px;">🖼️ Incolla Immagini</button><button class="btn solid" id="btn-new-entry">+ Nuovo Digimon</button></span>` : ''}
        </div>
        <input type="text" id="dex-search" placeholder="🔍 Cerca per nome..." style="margin-bottom:14px;" />
        <div id="filter-bar" class="filter-bar"></div>
        <div id="dex-grid" class="dex-grid"></div>
      </div>
    `;
    document.getElementById('btn-logout').onclick = ()=>{ session=null; render(); };
    const newBtn = document.getElementById('btn-new-entry');
    if(newBtn) newBtn.onclick = ()=> openEditModal(null);
    const bulkImagesBtn = document.getElementById('btn-bulk-images');
    if(bulkImagesBtn) bulkImagesBtn.onclick = ()=> openBulkImageModal();
    const importSeed2Btn = document.getElementById('btn-import-seed2');
    if(importSeed2Btn) importSeed2Btn.onclick = ()=> openImportModal(SPECIES_SEED.concat(SPECIES_SEED_VILLAINS, SPECIES_SEED_2, SPECIES_SEED_3), 'Importa/Correggi Digimon Famosi');
    const searchInput = document.getElementById('dex-search');
    if(searchInput){
      searchInput.value = searchQuery;
      searchInput.oninput = ()=>{ searchQuery = searchInput.value; renderGrid(); };
    }
    renderFilterBar();
    renderGrid();
  }

  function openBulkImageModal(){
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modal-overlay';
    overlay.innerHTML = `
      <div class="hud-frame modal-box card">
        <div class="flex-between" style="margin-bottom:10px;">
          <div class="section-title" style="margin:0;border:none;padding:0;">🖼️ Incolla Immagini in Blocco</div>
          <button class="btn ghost small" id="btn-close-modal">✕</button>
        </div>
        <div class="muted" style="margin-bottom:10px;">Incolla una riga per Digimon, nel formato <code>Nome: URL</code>. Il nome deve corrispondere (senza distinguere maiuscole) a una voce già presente nel Dex.</div>
        <textarea id="bulk-image-text" rows="12" style="width:100%;font-family:monospace;font-size:12px;" placeholder="Agumon: https://...
Greymon: https://...
Devimon: https://..."></textarea>
        <button class="btn solid" id="btn-bulk-images-apply" style="width:100%;margin-top:10px;">Applica</button>
        <div class="muted" id="bulk-image-status" style="margin-top:8px;max-height:150px;overflow-y:auto;"></div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };
    document.getElementById('btn-close-modal').onclick = closeModal;
    document.getElementById('btn-bulk-images-apply').onclick = async ()=>{
      const statusEl = document.getElementById('bulk-image-status');
      const raw = document.getElementById('bulk-image-text').value;
      const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
      const byNameLower = {};
      cachedDex.forEach(e=>{ byNameLower[e.name.trim().toLowerCase()] = e; });
      let updated = 0, notFound = [], malformed = [];
      statusEl.innerHTML = 'Applicazione in corso...';
      for(const line of lines){
        const idx = line.indexOf(':');
        if(idx<0){ malformed.push(line); continue; }
        const name = line.slice(0, idx).trim();
        const url = line.slice(idx+1).trim();
        if(!name || !url){ malformed.push(line); continue; }
        const entry = byNameLower[name.toLowerCase()];
        if(!entry){ notFound.push(name); continue; }
        await updateDexEntry(session.code, entry.id, {
          name: entry.name, stage: entry.stage, description: entry.description, imageUrl: url,
          baseStats: entry.base_stats, categories: entry.categories, qualities: entry.qualities,
          dpTotal: entry.dp_total, discovered: entry.discovered, evolutions: entry.evolutions,
          evolvesFrom: entry.evolvesFrom || entry.evolves_from, attribute: entry.attribute, family: entry.family
        });
        entry.image_url = url;
        updated++;
      }
      let msg = `<b style="color:var(--cyan);">${updated} immagini aggiornate.</b>`;
      if(notFound.length) msg += `<br/>Non trovati nel Dex: ${notFound.map(escapeHTML).join(', ')}`;
      if(malformed.length) msg += `<br/>Righe non valide (manca ":"): ${malformed.map(escapeHTML).join(' | ')}`;
      statusEl.innerHTML = msg;
      renderGrid();
    };
  }

  function renderFilterBar(){
    const bar = document.getElementById('filter-bar');
    if(!bar) return;
    const usedAttrs = new Set(cachedDex.map(e=>e.attribute).filter(Boolean));
    const usedFamilies = new Set(cachedDex.map(e=>e.family).filter(Boolean));
    const allCats = new Set();
    cachedDex.forEach(e=>(e.categories||[]).forEach(c=>allCats.add(c)));

    let html = '';
    if(usedAttrs.size>0){
      html += `<div class="muted" style="width:100%;margin-bottom:2px;font-size:10px;">Attributo</div>`;
      html += Array.from(usedAttrs).sort().map(a=>`<span class="tag filter-chip ${activeAttrFilter===a?'active':''}" data-attr-filter="${escapeAttr(a)}">${escapeHTML(a)}</span>`).join('');
      if(activeAttrFilter) html += `<span class="tag filter-chip" style="color:var(--danger);border-color:var(--danger);" data-attr-filter="__clear__">×</span>`;
      html += `<div style="width:100%;height:6px;"></div>`;
    }
    if(usedFamilies.size>0){
      html += `<div class="muted" style="width:100%;margin-bottom:2px;font-size:10px;">Famiglia</div>`;
      html += Array.from(usedFamilies).sort().map(f=>`<span class="tag filter-chip ${activeFamilyFilter===f?'active':''}" data-family-filter="${escapeAttr(f)}">${escapeHTML(f)}</span>`).join('');
      if(activeFamilyFilter) html += `<span class="tag filter-chip" style="color:var(--danger);border-color:var(--danger);" data-family-filter="__clear__">×</span>`;
      html += `<div style="width:100%;height:6px;"></div>`;
    }
    if(allCats.size>0){
      html += `<div class="muted" style="width:100%;margin-bottom:2px;font-size:10px;">Categoria</div>`;
      html += Array.from(allCats).sort().map(c=>`<span class="tag filter-chip ${activeFilters.includes(c)?'active':''}" data-filter="${escapeAttr(c)}">${escapeHTML(c)}</span>`).join('');
      if(activeFilters.length) html += `<span class="tag filter-chip" style="color:var(--danger);border-color:var(--danger);" data-filter="__clear__">× azzera</span>`;
    }
    bar.innerHTML = html;

    bar.querySelectorAll('[data-attr-filter]').forEach(chip=>{
      chip.onclick = ()=>{
        const val = chip.getAttribute('data-attr-filter');
        activeAttrFilter = (val==='__clear__' || activeAttrFilter===val) ? '' : val;
        renderFilterBar(); renderGrid();
      };
    });
    bar.querySelectorAll('[data-family-filter]').forEach(chip=>{
      chip.onclick = ()=>{
        const val = chip.getAttribute('data-family-filter');
        activeFamilyFilter = (val==='__clear__' || activeFamilyFilter===val) ? '' : val;
        renderFilterBar(); renderGrid();
      };
    });
    bar.querySelectorAll('[data-filter]').forEach(chip=>{
      chip.onclick = ()=>{
        const val = chip.getAttribute('data-filter');
        if(val==='__clear__') activeFilters = [];
        else {
          const idx = activeFilters.indexOf(val);
          if(idx>=0) activeFilters.splice(idx,1); else activeFilters.push(val);
        }
        renderFilterBar();
        renderGrid();
      };
    });
  }

  const STAGE_ORDER = ['Fresh','Baby','Rookie','Champion','Ultimate','Mega'];

  function renderGrid(){
    const grid = document.getElementById('dex-grid');
    if(!grid) return;
    const isMaster = session.role==='master';
    let filtered = cachedDex;
    if(activeFilters.length>0) filtered = filtered.filter(e=>(e.categories||[]).some(c=>activeFilters.includes(c)));
    if(activeAttrFilter) filtered = filtered.filter(e=>e.attribute===activeAttrFilter);
    if(activeFamilyFilter) filtered = filtered.filter(e=>e.family===activeFamilyFilter);
    if(searchQuery.trim()) filtered = filtered.filter(e=>e.name.toLowerCase().includes(searchQuery.trim().toLowerCase()));
    if(filtered.length===0){ grid.innerHTML = '<div class="muted">Nessun Digimon trovato.</div>'; return; }

    function cardHTML(e){
      const hidden = !isMaster && !e.discovered;
      if(hidden){
        return `<div class="hud-frame dex-card unknown" data-id="${e.id}">
          <div class="thumb"><span class="placeholder">?</span></div>
          <div class="info"><div class="name">???</div></div>
        </div>`;
      }
      return `<div class="hud-frame dex-card" data-id="${e.id}">
        <div class="thumb">${e.image_url ? `<img src="${escapeAttr(e.image_url)}" onerror="this.parentNode.innerHTML='<span class=&quot;placeholder&quot;>${escapeHTML((e.name||'?').charAt(0))}</span>'" />` : `<span class="placeholder">${escapeHTML((e.name||'?').charAt(0))}</span>`}
          ${e.origin_type==='armor' ? `<span style="position:absolute;top:4px;right:4px;font-size:14px;" title="Armor">🛡️</span>` : ''}
          ${e.origin_type==='jogress' ? `<span style="position:absolute;top:4px;right:4px;font-size:14px;" title="Jogress/Fusione">🤝</span>` : ''}
        </div>
        <div class="info">
          <div class="name">${escapeHTML(e.name)}</div>
          <div class="muted" style="font-size:10px;">${e.origin_type==='armor'?'Armor':(e.origin_type==='jogress'?'Jogress/Fusione':escapeHTML(e.stage))}${e.attribute?` · ${escapeHTML(e.attribute)}`:''}${isMaster?(e.discovered?' · scoperto':' · nascosto'):''}</div>
        </div>
      </div>`;
    }

    const groups = {};
    filtered.forEach(e=>{
      let st;
      if(e.origin_type==='armor') st = '🛡️ Armor';
      else if(e.origin_type==='jogress') st = '🤝 Jogress/Fusione';
      else st = STAGE_ORDER.includes(e.stage) ? e.stage : 'Altro';
      if(!groups[st]) groups[st] = [];
      groups[st].push(e);
    });
    const stagesToShow = STAGE_ORDER.filter(s=>groups[s]).concat(groups['🛡️ Armor'] ? ['🛡️ Armor'] : []).concat(groups['🤝 Jogress/Fusione'] ? ['🤝 Jogress/Fusione'] : []).concat(groups['Altro'] ? ['Altro'] : []);

    grid.innerHTML = stagesToShow.map(stage=>{
      const entries = groups[stage].slice().sort((a,b)=>a.name.localeCompare(b.name, 'it', {sensitivity:'base'}));
      return `
        <div style="grid-column:1/-1;margin-top:10px;">
          <div class="section-title" style="margin-bottom:8px;font-size:12px;">${escapeHTML(stage)} (${entries.length})</div>
        </div>
        ${entries.map(cardHTML).join('')}
      `;
    }).join('');

    grid.querySelectorAll('[data-id]').forEach(card=>{
      card.onclick = ()=>{
        const entry = cachedDex.find(e=>String(e.id)===card.getAttribute('data-id'));
        if(!entry) return;
        if(!isMaster && !entry.discovered) return;
        openDetailModal(entry);
      };
    });
  }

  function closeModal(){

  function openDetailModal(entry){
    const isMaster = session.role==='master';
    const bs = entry.base_stats || {};

        ${hasStats ? `<div class="grid-stats">

        </div>` : ''}
        ${evolutionsHTML(entry.evolvesFrom || entry.evolves_from, 'Pre-Evoluzioni (da cosa evolve)')}

      </div>
    `;
    document.body.appendChild(overlay);
    overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };

        const lightbox = document.createElement('div');
        lightbox.className = 'modal-overlay';
        lightbox.style.zIndex = '200';
        lightbox.innerHTML = `<img src="${escapeAttr(src)}" style="max-width:95vw;max-height:95vh;object-fit:contain;cursor:zoom-out;" />`;

    });

    if(editBtn) editBtn.onclick = ()=>{ closeModal(); openEditModal(entry); };

  function openImportModal(seedList, title){
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modal-overlay';
    overlay.innerHTML = `
      <div class="hud-frame modal-box card">
        <div class="flex-between" style="margin-bottom:10px;">
          <div class="section-title" style="margin:0;border:none;padding:0;">${escapeHTML(title)}</div>
          <button class="btn ghost small" id="btn-close-modal">✕</button>
        </div>
        <div class="muted" style="margin-bottom:12px;">Tutte le linee (Eroi, Cattivi, Altri Famosi). Le voci già presenti sono deselezionate e non verranno duplicate — ma i loro collegamenti Pre-Evoluzioni/Evoluzioni verranno comunque aggiornati secondo questa lista, quindi se li avevi modificati a mano da "Modifica" potrebbero tornare a questi valori di base.</div>
        <div id="import-lines"></div>
        <div class="divider"></div>
        <div class="row">
          <button class="btn ghost" id="btn-cancel-import">Annulla</button>
          <button class="btn solid" id="btn-do-import">Importa Selezionati</button>
        </div>
        <div class="muted" id="import-status" style="margin-top:6px;"></div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };
    document.getElementById('btn-close-modal').onclick = closeModal;
    document.getElementById('btn-cancel-import').onclick = closeModal;

    const linesEl = document.getElementById('import-lines');
    linesEl.innerHTML = seedList.map((line,li)=>`
      <div class="roster-item" style="margin-bottom:8px;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" data-line-check="${li}" checked /> <b>${escapeHTML(line.line)}</b> <span class="muted">${line.attribute||''} ${line.family?'· '+line.family:''}</span>
        </label>
        <div style="margin-left:20px;margin-top:4px;display:flex;flex-wrap:wrap;gap:8px;">
          ${line.chain.map((sp,si)=>{
            const already = cachedDex.some(e=>e.name.trim().toLowerCase()===sp.name.trim().toLowerCase());
            return `<label style="display:flex;align-items:center;gap:4px;font-size:11px;${already?'opacity:0.5;':''}">
              <input type="checkbox" data-species-check="${li}-${si}" ${already?'disabled':'checked'} />
              ${escapeHTML(sp.name)} <span class="muted">(${sp.stage})</span>${already?' <span class="muted">già presente</span>':''}
            </label>`;
          }).join('')}
        </div>
      </div>
    `).join('');

    linesEl.querySelectorAll('[data-line-check]').forEach(cb=>{
      cb.onchange = ()=>{
        const li = cb.getAttribute('data-line-check');
        linesEl.querySelectorAll(`[data-species-check^="${li}-"]`).forEach(sc=>{ if(!sc.disabled) sc.checked = cb.checked; });
      };
    });

    document.getElementById('btn-do-import').onclick = async ()=>{
      const statusEl = document.getElementById('import-status');
      statusEl.textContent = 'Importazione in corso...';
      const toImport = [];
      seedList.forEach((line,li)=>{
        line.chain.forEach((sp,si)=>{
          const cb = linesEl.querySelector(`[data-species-check="${li}-${si}"]`);
          if(cb && cb.checked && !cb.disabled) toImport.push({ ...sp, attribute: sp.attribute || line.attribute || '', family: sp.family || line.family || '', categories: sp.categories || line.categories || [] });
        });
      });
      if(toImport.length===0){ statusEl.textContent='Nessun Digimon selezionato.'; return; }
      const insertedByName = {};
      for(const sp of toImport){
        const result = await addDexEntry(session.code, {
          name: sp.name, stage: sp.stage, description: sp.desc, imageUrl: '',
          addedBy: session.username, discovered: false, categories: sp.categories || [], baseStats: sp.stats || {}, evolutions: [], evolvesFrom: [],
          attribute: sp.attribute, family: sp.family, originType: sp.originType || ''
        });
        if(result && result.entry) insertedByName[sp.name] = result.entry;
      }
      cachedDex = await getDex(session.code);
      const byName = {};
      cachedDex.forEach(e=>{ byName[e.name.trim().toLowerCase()] = e; });
      for(const line of seedList){
        for(let si=0; si<line.chain.length; si++){
          const sp = line.chain[si];
          const current = byName[sp.name.trim().toLowerCase()];
          if(!current) continue;
          let evolvesFrom, evolutions;
          if(sp.evolvesFromNames){
            evolvesFrom = sp.evolvesFromNames.map(n=>byName[n.trim().toLowerCase()]).filter(Boolean)
              .map(e=>({ id: e.id, name: e.name, imageUrl: e.image_url||'' }));
          } else {
            const prev = si>0 ? byName[line.chain[si-1].name.trim().toLowerCase()] : null;
            evolvesFrom = prev ? [{ id: prev.id, name: prev.name, imageUrl: prev.image_url||'' }] : [];
          }
          if(sp.evolvesToNames){
            evolutions = sp.evolvesToNames.map(n=>byName[n.trim().toLowerCase()]).filter(Boolean)
              .map(e=>({ id: e.id, name: e.name, imageUrl: e.image_url||'' }));
          } else {
            const next = si<line.chain.length-1 ? byName[line.chain[si+1].name.trim().toLowerCase()] : null;
            evolutions = next ? [{ id: next.id, name: next.name, imageUrl: next.image_url||'' }] : [];
          }
          await updateDexEntry(session.code, current.id, {
            name: current.name, stage: current.stage, description: current.description, imageUrl: current.image_url,
            baseStats: current.base_stats, categories: (sp.categories || line.categories || current.categories), qualities: current.qualities,
            dpTotal: current.dp_total, discovered: current.discovered, evolutions, evolvesFrom,
            attribute: sp.attribute || current.attribute, family: sp.family || current.family, originType: sp.originType || current.origin_type || ''
          });
        }
      }
      statusEl.style.color = 'var(--cyan)';
      statusEl.textContent = `Importati ${Object.keys(insertedByName).length} Digimon, con evoluzioni collegate.`;
      setTimeout(()=>{ closeModal(); renderDexPage(); }, 1200);
    };
  }

        <label style="font-size:11px;display:flex;align-items:center;gap:6px;margin:6px 0;"><input type="checkbox" id="ed-discovered" ${draft.discovered?'checked':''} /> Scoperto dai giocatori</label>
        <div class="divider"></div>
        <div class="muted" style="margin-bottom:6px;">Stat Base (Combattimento)</div>
        <div class="row">
          <div class="field"><label>Accuracy</label><input type="number" id="ed-acc" value="${bs.baseAccuracy||0}" min="0" /></div>
          <div class="field"><label>Damage</label><input type="number" id="ed-dmg" value="${bs.baseDamage||0}" min="0" /></div>
        </div>
        <div class="row">
          <div class="field"><label>Dodge</label><input type="number" id="ed-dodge" value="${bs.baseDodge||0}" min="0" /></div>
          <div class="field"><label>Armor</label><input type="number" id="ed-arm" value="${bs.baseArmor||0}" min="0" /></div>
        </div>
        <div class="field"><label>Health</label><input type="number" id="ed-hp" value="${bs.baseHealth||0}" min="0" /></div>
        <div class="divider"></div>
        <datalist id="dex-species-list">
          ${cachedDex.filter(e=>isNew || e.id!==entry.id).map(e=>`<option value="${escapeAttr(e.name)}">`).join('')}
        </datalist>
        <div class="muted" style="margin-bottom:6px;">Pre-Evoluzioni (da cosa evolve)</div>
        <div id="ed-preevolist"></div>
        <div class="row">
          <input type="text" id="ed-preevo-name" list="dex-species-list" placeholder="Cerca un Digimon già nel Dex..." style="flex:2;" />
          <input type="text" id="ed-preevo-img" placeholder="URL immagine (se non nel Dex)" style="flex:2;" />
          <button class="btn small" id="btn-preevo-add" style="flex:1;">Aggiungi</button>
        </div>
        <div class="divider"></div>
        <div class="muted" style="margin-bottom:6px;">Possibili Evoluzioni (in cosa evolve)</div>
        <div id="ed-evolist"></div>
        <div class="row">
          <input type="text" id="ed-evo-name" list="dex-species-list" placeholder="Cerca un Digimon già nel Dex..." style="flex:2;" />
          <input type="text" id="ed-evo-img" placeholder="URL immagine (se non nel Dex)" style="flex:2;" />
          <button class="btn small" id="btn-evo-add" style="flex:1;">Aggiungi</button>
        </div>
        <div class="divider"></div>
        <div class="field"><label>DP Totali</label><input type="number" id="ed-dptotal" value="${draft.dp_total||0}" min="0" /></div>
        <div class="muted" style="margin-bottom:6px;">Qualities</div>
        <div id="ed-quallist"></div>
        <div class="row">
          <input type="text" id="ed-qual-name" placeholder="Nome Quality" style="flex:2;" />
          <input type="number" id="ed-qual-cost" placeholder="DP" value="1" style="flex:1;" />
        </div>
        <div class="row" style="margin-top:6px;">
          <input type="text" id="ed-qual-cat" placeholder="Categoria (opz.)" style="flex:1;" />
          <input type="text" id="ed-qual-desc" placeholder="Descrizione (opz.)" style="flex:2;" />
          <button class="btn small" id="btn-qual-add" style="flex:1;">Aggiungi</button>
        </div>
        <div class="divider"></div>
        <div class="row">
          <button class="btn ghost" id="btn-cancel-edit">Annulla</button>
          ${!isNew ? `<button class="btn ghost" id="btn-delete-entry" style="color:var(--danger);border-color:rgba(255,93,93,0.4);">🗑 Elimina</button>` : ''}
          <button class="btn solid" id="btn-save-edit">Salva</button>
        </div>
        <div class="muted" id="ed-status" style="margin-top:6px;"></div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.onclick = (e)=>{ if(e.target===overlay) closeModal(); };
    document.getElementById('btn-close-modal').onclick = closeModal;
    document.getElementById('btn-cancel-edit').onclick = closeModal;
    const deleteBtn = document.getElementById('btn-delete-entry');
    if(deleteBtn){
      deleteBtn.onclick = async ()=>{
        if(!window.confirm(`Eliminare definitivamente "${entry.name}" dal Dex? Non si può annullare.`)) return;
        await deleteDexEntry(session.code, entry.id);
        closeModal();
        renderDexPage();
      };
    }
    function renderEvoList(){
      document.getElementById('ed-evolist').innerHTML = draft.evolutions.length===0
        ? '<div class="muted" style="margin-bottom:6px;">Nessuna evoluzione.</div>'
        : draft.evolutions.map((ev,i)=>`<div class="flex-between" style="margin-bottom:4px;"><span>${escapeHTML(ev.name)}${ev.id?' <span class="muted">(collegato)</span>':''}</span><button class="btn ghost small" data-rmevo="${i}">Rimuovi</button></div>`).join('');
      document.querySelectorAll('[data-rmevo]').forEach(b=>{
        b.onclick = ()=>{ draft.evolutions.splice(Number(b.getAttribute('data-rmevo')),1); renderEvoList(); };
      });
    }
    function renderPreEvoList(){
      document.getElementById('ed-preevolist').innerHTML = draft.evolvesFrom.length===0
        ? '<div class="muted" style="margin-bottom:6px;">Nessuna Pre-Evoluzione.</div>'
        : draft.evolvesFrom.map((ev,i)=>`<div class="flex-between" style="margin-bottom:4px;"><span>${escapeHTML(ev.name)}${ev.id?' <span class="muted">(collegato)</span>':''}</span><button class="btn ghost small" data-rmpreevo="${i}">Rimuovi</button></div>`).join('');
      document.querySelectorAll('[data-rmpreevo]').forEach(b=>{
        b.onclick = ()=>{ draft.evolvesFrom.splice(Number(b.getAttribute('data-rmpreevo')),1); renderPreEvoList(); };
      });
    }
    function renderQualList(){
      document.getElementById('ed-quallist').innerHTML = draft.qualities.length===0
        ? '<div class="muted" style="margin-bottom:6px;">Nessuna Quality.</div>'
        : draft.qualities.map((q,i)=>`<div class="flex-between" style="margin-bottom:4px;"><span>${escapeHTML(q.name)} <span class="muted">(${q.cost} DP)</span></span><button class="btn ghost small" data-rmqual="${i}">Rimuovi</button></div>`).join('');
      document.querySelectorAll('[data-rmqual]').forEach(b=>{
        b.onclick = ()=>{ draft.qualities.splice(Number(b.getAttribute('data-rmqual')),1); renderQualList(); };
      });
    }
    renderEvoList();
    renderPreEvoList();
    renderQualList();

    function resolveSpeciesLink(name, manualImg){
      const match = cachedDex.find(e=>e.name.trim().toLowerCase()===name.trim().toLowerCase());
      if(match) return { id: match.id, name: match.name, imageUrl: match.image_url||'' };
      return { name, imageUrl: manualImg||'' };
    }
    document.getElementById('btn-evo-add').onclick = ()=>{
      const n = document.getElementById('ed-evo-name').value.trim();
      if(!n) return;
      draft.evolutions.push(resolveSpeciesLink(n, document.getElementById('ed-evo-img').value.trim()));
      document.getElementById('ed-evo-name').value=''; document.getElementById('ed-evo-img').value='';
      renderEvoList();
    };
    document.getElementById('btn-preevo-add').onclick = ()=>{
      const n = document.getElementById('ed-preevo-name').value.trim();
      if(!n) return;
      draft.evolvesFrom.push(resolveSpeciesLink(n, document.getElementById('ed-preevo-img').value.trim()));
      document.getElementById('ed-preevo-name').value=''; document.getElementById('ed-preevo-img').value='';
      renderPreEvoList();
    };
    document.getElementById('btn-qual-add').onclick = ()=>{
      const n = document.getElementById('ed-qual-name').value.trim();
      if(!n) return;
      draft.qualities.push({ name:n, cost:Number(document.getElementById('ed-qual-cost').value)||0, category:document.getElementById('ed-qual-cat').value.trim(), description:document.getElementById('ed-qual-desc').value.trim() });
      document.getElementById('ed-qual-name').value=''; document.getElementById('ed-qual-cost').value='1';
      document.getElementById('ed-qual-cat').value=''; document.getElementById('ed-qual-desc').value='';
      renderQualList();
    };

    document.getElementById('btn-save-edit').onclick = async ()=>{
      const name = document.getElementById('ed-name').value.trim();
      const statusEl = document.getElementById('ed-status');
      if(!name){ statusEl.style.color='var(--danger)'; statusEl.textContent='Serve un nome.'; return; }
      const payload = {
        name,
        stage: document.getElementById('ed-stage').value,
        description: document.getElementById('ed-desc').value.trim(),
        imageUrl: document.getElementById('ed-img').value.trim(),
        categories: document.getElementById('ed-categories').value.split(',').map(s=>s.trim()).filter(Boolean),
        attribute: document.getElementById('ed-attribute').value,
        family: document.getElementById('ed-family').value,
        originType: document.getElementById('ed-origin').value,
        discovered: document.getElementById('ed-discovered').checked,
        baseStats: {
          baseAccuracy: Number(document.getElementById('ed-acc').value)||0,
          baseDamage: Number(document.getElementById('ed-dmg').value)||0,
          baseDodge: Number(document.getElementById('ed-dodge').value)||0,
          baseArmor: Number(document.getElementById('ed-arm').value)||0,
          baseHealth: Number(document.getElementById('ed-hp').value)||0
        },
        evolutions: draft.evolutions,
        evolvesFrom: draft.evolvesFrom,
        qualities: draft.qualities,
        dpTotal: Number(document.getElementById('ed-dptotal').value)||0,
        addedBy: session.username
      };
      let result;
      if(isNew) result = await addDexEntry(session.code, payload);
      else result = await updateDexEntry(session.code, entry.id, payload);
      if(result){
        statusEl.style.color='var(--text-mute)'; statusEl.textContent='Salvato.';
        closeModal();
        renderDexPage();
      } else {
        statusEl.style.color='var(--danger)'; statusEl.textContent='Errore nel salvataggio.';
      }
    };
  }

  session = loadSession();
  render();
})();
</script>
</body>
</html>
