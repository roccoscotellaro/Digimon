  @font-face {
    font-family: 'Pixel Digivolve';
    src: url('https://db.onlinewebfonts.com/t/e7a35327535403014c02a38c285b82cf.woff2') format('woff2'),
         url('https://db.onlinewebfonts.com/t/e7a35327535403014c02a38c285b82cf.woff') format('woff'),
         url('https://db.onlinewebfonts.com/t/e7a35327535403014c02a38c285b82cf.ttf') format('truetype');
    font-display: swap;
  }
  .digimoji-text{ font-family:'Digicode','Share Tech Mono',monospace; letter-spacing:0.08em; font-size:20px; cursor:help; }
  .pixel-title{ font-family:'Pixel Digivolve','Share Tech Mono',monospace; letter-spacing:0.03em; }
  :root{
    --bg: #080b10;
    --panel: #0e141b;
    --panel-2: #121a22;
    --line: #1c2a30;
    --cyan: #35e8c9;
    --cyan-dim: #1f6e63;
    --amber: #ff8a3d;
    --text: #dcece8;
    --text-mute: #6d8385;
    --danger: #ff5d5d;
    --radius: 2px;
    font-family: 'Manrope', sans-serif;
  }
  *{box-sizing:border-box;}
  body,#root-app{margin:0;padding:0;background:var(--bg);color:var(--text);}
  .mono{font-family:'Share Tech Mono', monospace; letter-spacing: 0.04em;}
  .app{min-height:100vh;background:
      radial-gradient(circle at 15% 10%, rgba(53,232,201,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,138,61,0.05), transparent 45%),
      var(--bg);
      padding:20px; position:relative; overflow-x:hidden;}
  .scanline{position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:overlay;}
  .hud-frame{border:1px solid var(--line); background:var(--panel); border-radius:var(--radius); position:relative;}
  .hud-frame::before{content:"";position:absolute;top:-1px;left:-1px;width:14px;height:14px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
  .hud-frame::after{content:"";position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;margin-bottom:18px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-dot{width:9px;height:9px;background:var(--cyan);box-shadow:0 0 8px var(--cyan);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .brand-title{font-family:'Pixel Digivolve','Share Tech Mono',monospace;font-size:15px;text-transform:uppercase;color:var(--cyan);letter-spacing:0.05em;}
  .brand-sub{font-size:11px;color:var(--text-mute);}
  .conn-ticker{font-size:11px;color:var(--text-mute);}
  .conn-ticker b{color:var(--cyan);}

  .btn{font-family:'Share Tech Mono',monospace;background:transparent;border:1px solid var(--cyan-dim);color:var(--cyan);
    padding:8px 14px;cursor:pointer;text-transform:uppercase;font-size:12px;letter-spacing:0.05em;border-radius:var(--radius);transition:.15s;}
  .btn:hover{background:rgba(53,232,201,0.1);border-color:var(--cyan);}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  .btn.solid{background:var(--cyan);color:#04211c;border-color:var(--cyan);font-weight:700;}
  .btn.solid:hover{background:#4ffbe0;}
  .btn.amber{border-color:var(--amber);color:var(--amber);}
  .btn.amber:hover{background:rgba(255,138,61,0.12);}
  .btn.ghost{border-color:var(--line);color:var(--text-mute);}
  .btn.small{padding:5px 10px;font-size:10px;}

  input[type=text], input[type=number], textarea, select{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 10px; font-family:'Manrope',sans-serif; font-size:13px; border-radius:var(--radius); width:100%;
  }
  input:focus, textarea:focus, select:focus{outline:none;border-color:var(--cyan-dim);}
  label{font-size:10px;text-transform:uppercase;color:var(--text-mute);letter-spacing:0.06em;display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:12px;}
  .row > *{flex:1;}
  .section-title{font-size:12px;text-transform:uppercase;color:var(--cyan);letter-spacing:0.08em;margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .section-title::before{ font-family:'Digicode',monospace; content:'ABC '; opacity:0.35; margin-right:4px; font-size:13px; letter-spacing:0.1em; }
  .card{padding:16px;margin-bottom:16px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .stat-box{text-align:center;padding:8px 4px;background:var(--panel-2);border:1px solid var(--line);}
  .stat-box .v{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--cyan);}
  .stat-box .l{font-size:9px;color:var(--text-mute);text-transform:uppercase;margin-top:2px;}
  .stat-box input{text-align:center;padding:4px;margin-top:4px;}

  .scene-box{position:relative; height:220px; border:1px solid var(--line); overflow:hidden; background:#05070a; margin-bottom:10px;}
  .scene-box[data-scene-img-expand]{cursor:zoom-in;}
  .scene-expand-hint{position:absolute;top:8px;right:10px;font-size:16px;opacity:0.65;text-shadow:0 0 6px rgba(0,0,0,0.9);z-index:2;pointer-events:none;}
  .scene-box img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.55;}
  .scene-box .overlay{position:absolute;inset:0;background:linear-gradient(180deg, rgba(8,11,16,0) 40%, rgba(8,11,16,0.9) 100%);}
  .scene-box .title{position:absolute;bottom:10px;left:14px;font-family:'Pixel Digivolve','Share Tech Mono',monospace;color:var(--cyan);font-size:22px;letter-spacing:0.04em;text-shadow:0 0 12px rgba(53,232,201,0.6);}
  .scene-box .portraits{position:absolute;bottom:10px;right:14px;display:flex;gap:6px;}
  .scene-box .portraits img{width:44px;height:44px;object-fit:cover;border:1px solid var(--cyan-dim);border-radius:50%;background:#000;}
  .scene-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-mute);font-size:12px;}
  .enc-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow-y:auto;}
  .enc-modal-card{position:relative;max-width:460px;width:100%;padding:20px;background:var(--panel);border:1px solid var(--line);max-height:90vh;overflow-y:auto;}
  .enc-modal-img-wrap{width:100%;height:300px;background:#12181f;border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .enc-modal-img{max-width:100%;max-height:100%;object-fit:contain;}

  .log{height:280px;overflow-y:auto;padding:10px;background:var(--panel-2);border:1px solid var(--line);font-size:13px;}
  .log-entry{margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.03);}
  .log-entry .who{font-family:'Share Tech Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;}
  .log-entry.player .who{color:var(--cyan);}
  .log-entry.gm .who{color:var(--amber);}
  .log-entry.digimon .who{color:#c896ff;}
  .log-entry.roll .who{color:#7ee787;}
  .log-entry.roll{background:rgba(126,231,135,0.05);border-radius:4px;padding:8px;border-bottom:1px solid rgba(126,231,135,0.15);}
  .log-entry.request .who{color:var(--amber);}
  .log-entry.request{background:rgba(255,138,61,0.06);border-radius:4px;padding:8px;border-bottom:1px solid rgba(255,138,61,0.2);}
  .log-entry.enemy .who{color:var(--danger);}
  .log-entry.enemy{background:rgba(255,93,93,0.06);border-radius:4px;padding:8px;border-bottom:1px solid rgba(255,93,93,0.2);}
  .who-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;border:1px solid var(--line);}
  .log-entry .txt{color:var(--text);margin-top:2px;line-height:1.4;}
  .log-entry .meta{font-size:10px;color:var(--text-mute);margin-left:8px;}

  .dice-perspective{perspective:400px;display:inline-flex;gap:6px;vertical-align:middle;}
  .die3d{display:inline-block;font-size:26px;line-height:1;color:var(--cyan);animation:diceroll 0.7s cubic-bezier(.3,1.4,.6,1);}
  @keyframes diceroll{
    0%{ transform: rotateX(0deg) rotateY(0deg) scale(0.5); opacity:0.2; }
    55%{ transform: rotateX(340deg) rotateY(160deg) scale(1.2); opacity:1; }
    100%{ transform: rotateX(720deg) rotateY(360deg) scale(1); }
  }
  .roll-btn{background:transparent;border:1px solid var(--cyan-dim);color:var(--cyan);cursor:pointer;font-size:13px;padding:1px 6px;border-radius:3px;line-height:1.4;}
  .roll-btn:hover{background:rgba(53,232,201,0.1);}
  .roll-total{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--cyan);margin-left:8px;}
  .roll-verdict{font-family:'Share Tech Mono',monospace;font-size:12px;text-transform:uppercase;margin-left:8px;padding:2px 8px;border-radius:12px;}
  .roll-verdict.crit-success{background:rgba(53,232,201,0.18);color:var(--cyan);}
  .roll-verdict.success{background:rgba(126,231,135,0.15);color:#7ee787;}
  .roll-verdict.fail{background:rgba(255,93,93,0.12);color:var(--danger);}
  .roll-verdict.crit-fail{background:rgba(255,93,93,0.25);color:var(--danger);}

  .moves-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .move-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:10px;text-align:left;cursor:pointer;border-radius:var(--radius);}
  .move-btn:hover{border-color:var(--cyan-dim);}
  .move-btn .name{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--cyan);}
  .move-btn .desc{font-size:11px;color:var(--text-mute);margin-top:3px;}

  .login-wrap{max-width:420px;margin:60px auto;}
  .login-wrap h1{font-family:'Pixel Digivolve','Share Tech Mono',monospace;color:var(--cyan);font-size:28px;letter-spacing:0.03em;text-align:center;text-shadow:0 0 16px rgba(53,232,201,0.5);margin-bottom:4px;}
  .login-wrap .sub{text-align:center;color:var(--text-mute);font-size:12px;margin-bottom:28px;}
  .role-pick{display:flex;gap:10px;margin-bottom:16px;}
  .role-pick .btn{flex:1;}
  .role-pick .btn.active{background:rgba(53,232,201,0.12);border-color:var(--cyan);color:var(--cyan);}
  #tab-scheda.active, #tab-inventario.active, #tab-dex.active{background:rgba(53,232,201,0.12);border-color:var(--cyan);color:var(--cyan);}
  #chatmode-public.active, #chatmode-private.active{background:rgba(53,232,201,0.12);border-color:var(--cyan);color:var(--cyan);}

  .roster-item{padding:10px;border-bottom:1px solid var(--line);font-size:12px;}
  .roster-item:last-child{border-bottom:none;}
  .roster-item .name{color:var(--cyan);font-family:'Share Tech Mono',monospace;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--cyan-dim);}

  @media (max-width: 760px){
    .app{padding:8px;}
    .topbar{flex-direction:column;align-items:flex-start;gap:8px;padding:10px;}
    .conn-ticker{font-size:10px;}

    .stat-box .v{font-size:16px;}
    .moves-grid{grid-template-columns:1fr;}
    .role-pick{flex-direction:column;}
    .login-wrap{margin:24px auto;max-width:100%;padding:20px !important;}
    .scene-box{height:160px;}
    .sheet-head{flex-wrap:wrap;}
    .die3d, .die3d-static{font-size:20px !important;}
    .roster-item .sub{font-size:11px;}
    input[type=text], input[type=number], textarea, select{font-size:16px;}
    .btn{font-size:11px;padding:8px 10px;}
    .btn.small{padding:6px 8px;font-size:10px;}
    #sidebar-content, .hud-frame.card{width:100%;}
    div[style*="display:flex;gap:14px"]{flex-direction:column;}
    div[style*="display:grid;grid-template-columns:1fr 1fr;gap:14px"]{grid-template-columns:1fr;}
  }

  .portrait{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--cyan-dim);background:#05070a;flex-shrink:0;}
  .portrait-sm{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--cyan-dim);background:#05070a;flex-shrink:0;}
  .sheet-head{display:flex;gap:12px;align-items:center;margin-bottom:14px;}
  .sheet-head .info{flex:1;}
  .sheet-head .nm{font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:15px;}
  .sheet-head .tg{font-size:11px;color:var(--text-mute);}

  .bar-row{margin-bottom:10px;}
  .bar-label{display:flex;justify-content:space-between;font-size:10px;text-transform:uppercase;color:var(--text-mute);margin-bottom:3px;letter-spacing:0.05em;}
  .bar-label .val{font-family:'Share Tech Mono',monospace;color:var(--text);}
  .bar-track{height:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:20px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:20px;transition:width .3s;}
  .bar-fill.hp{background:linear-gradient(90deg, var(--cyan-dim), var(--cyan));}
  .bar-fill.mp{background:linear-gradient(90deg, #6b3fa0, #c896ff);}
  .bar-fill.low{background:linear-gradient(90deg, #8a2f2f, var(--danger));}
  .bar-controls{display:flex;gap:6px;align-items:center;margin-top:4px;}
  .bar-controls button{width:22px;height:22px;line-height:1;border:1px solid var(--line);background:var(--panel-2);color:var(--cyan);cursor:pointer;border-radius:3px;font-size:14px;}
  .bar-controls button:hover{border-color:var(--cyan-dim);}

  .view-mode .field-static{margin-bottom:10px;}
  .field-static label{margin-bottom:2px;}
  .field-static .v{font-size:13px;color:var(--text);}
  .toggle-edit-btn{width:100%;margin-top:4px;}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="root-app" class="app"></div>
<script>
(function(){
  const root = document.getElementById('root-app');
  let session = null;
  let pollTimer = null;
  let lastApiError = null;
  const ONLINE_WINDOW_MS = 9000;
  const SESSION_KEY = 'digivice_session_v1';

  let editingTamer = false;
  let editingDigimon = false;
  let editingScene = false;
  let sidebarTab = 'scheda';
  let playerChatMode = 'public';
  let cachedRoster = [];
  let cachedScene = { title:'', background:'', music:'' };
  let cachedLog = [];
  let cachedDex = [];
  let dexActiveFilters = [];
  let dexAddEvolutions = [];
  let dexCanEditGlobal = false;
  let sectorMapSelectedId = null; // which Settore is expanded in the compact Mappa panel
  let encounterDraft = null; // pending Digimon (from Dex or homebrew) being reviewed before adding to the scene
  let cachedMe = null;
  let animatedLogIds = new Set();
  let cachedCombat = null;
  let cachedProgression = null;

  async function getProgression(code){
    const d = await apiGet('/api/progression?code=' + encodeURIComponent(code));
    const p = d ? d.progression : { milestone:0, xp:0, inspiration:0, campaign_level:'Standard' };
    return { milestone: p.milestone||0, xp: p.xp||0, inspiration: p.inspiration||0, campaignLevel: p.campaign_level || 'Standard', attributeAdvantage: p.attributeAdvantage || p.attribute_advantage || '', naturalCriticalResults: !!(p.naturalCriticalResults || p.natural_critical_results), blastEvolutionEnabled: !!(p.blastEvolutionEnabled || p.blast_evolution_enabled), slideEvolutionEnabled: !!(p.slideEvolutionEnabled || p.slide_evolution_enabled), darkEvolutionEnabled: !!(p.darkEvolutionEnabled || p.dark_evolution_enabled) };
  }
  async function saveProgression(code, data){ return apiPost('/api/progression', { code, ...data }); }

  async function getCombat(code){ const d = await apiGet('/api/combat?code=' + encodeURIComponent(code)); return d ? d.combat : null; }
  async function saveCombat(code, data){ return apiPost('/api/combat', { code, data }); }

  function buildInitiativeOrder(participants){
    const sideA = participants.filter(p=>p.side==='ally').slice().sort((a,b)=>b.initiative-a.initiative);
    const sideB = participants.filter(p=>p.side==='enemy').slice().sort((a,b)=>b.initiative-a.initiative);
    const order = [];
    let qA = sideA.slice(), qB = sideB.slice();
    let currentSide = (qA[0] ? qA[0].initiative : -Infinity) >= (qB[0] ? qB[0].initiative : -Infinity) ? 'A' : 'B';
    while(qA.length || qB.length){
      if(currentSide==='A'){
        if(qA.length){ order.push(qA.shift()); currentSide = 'B'; }
        else { order.push(qB.shift()); }
      } else {
        if(qB.length){ order.push(qB.shift()); currentSide = 'A'; }
        else { order.push(qA.shift()); }
      }
    }
    return order.map(p=>p.id);
  }

  const ACTION_DEFS = [
    { key:'move', label:'Muovi', cost:1 },
    { key:'attack', label:'Attacca', cost:1, oncePerRound:true },
    { key:'difficult_move', label:'Movimento Difficile', cost:2 },
    { key:'holdback', label:'Trattieni Colpo', cost:1 },
    { key:'skill_tamer', label:'Skill Check (Tamer)', cost:1 },
    { key:'skill_digimon', label:'Skill Check (Digimon)', cost:2 },
    { key:'stance', label:'Cambio Stance', cost:1 },
    { key:'clash', label:'Clash', cost:1 },
    { key:'bolster', label:'Bolster', cost:1 },
    { key:'aid', label:'Aid', cost:1 },
    { key:'other1', label:'Altro (1 Azione)', cost:1 },
    { key:'other2', label:'Altro (2 Azioni)', cost:2 }
  ];

  function trySpendAction(participant, actionKey){
    const def = ACTION_DEFS.find(a=>a.key===actionKey);
    if(!def) return { ok:false, msg:'Azione non valida' };
    if(actionKey==='move' && (participant.effects||[]).some(e=>e.key==='root')){
      return { ok:false, msg:'È sotto [ROOT]: non può usare Muovi finché l\'Effetto non termina.' };
    }
    if(def.oncePerRound && participant.attackedThisRound){
      let hasAmmo = false;
      if(participant.isPC){
        const member = cachedRoster.find(m=>m.username===participant.username);
        if(member){
          const qMech = computeQualityMechanics(member.digimon.qualities);
          if(qMech.ammoRank>0){
            if(participant.ammoUsesLeft===undefined) participant.ammoUsesLeft = stageIndex(member.digimon.stage)+1;
            if(participant.ammoUsesLeft>0) hasAmmo = true;
          }
        }
      }
      if(!hasAmmo) return { ok:false, msg:'Ha già usato Attacca questo round.' };
    }
    if((participant.actions===undefined?2:participant.actions) < def.cost) return { ok:false, msg:'Azioni insufficienti.' };
    if(participant.actions===undefined) participant.actions = 2;
    participant.actions -= def.cost;
    if(def.oncePerRound){
      if(participant.attackedThisRound && participant.ammoUsesLeft>0){
        participant.ammoUsesLeft -= 1;
      } else {
        participant.attackedThisRound = true;
      }
    }
    return { ok:true, def };
  }

  function defaultCombat(){
    return { active:false, round:1, currentIndex:0, participants:[], order:[] };
  }

  function recalcCombatOrder(combat){
    combat.order = buildInitiativeOrder(combat.participants);
    combat.currentIndex = 0;
    combat.round = 1;
    combat.participants.forEach(p=>{
      const pMember = p.isPC ? cachedRoster.find(m=>m.username===p.username) : null;
      p.actions = (pMember && pMember.digimon.hybridMode) ? 3 : 2;
      p.attackedThisRound = false;
    });
  }

  function combatSelfActionHTML(combat, username){
    if(!combat || !combat.active) return '';
    const p = (combat.participants||[]).find(x=>x.username===username);
    if(!p) return '';
    const acts = p.actions===undefined?2:p.actions;
    return `
      <div class="divider"></div>
      <div class="muted" style="margin-bottom:6px;">Le tue Azioni: <span class="mono" style="color:var(--cyan);">${acts}/2</span></div>
      <div class="row">
        <select id="self-action-select" style="flex:2;">${ACTION_DEFS.map(a=>`<option value="${a.key}">${escapeHTML(a.label)} (${a.cost})</option>`).join('')}</select>
        <button class="btn small" id="btn-self-action-use" style="flex:1;">Usa</button>
      </div>
      <div class="muted" id="self-action-status" style="margin-top:4px;"></div>
    `;
  }

  function bindCombatSelfActions(code, username){
    const btn = document.getElementById('btn-self-action-use');
    if(!btn) return;
    btn.onclick = async ()=>{
      if(!cachedCombat || !cachedCombat.active) return;
      const p = cachedCombat.participants.find(x=>x.username===username);
      if(!p) return;
      const sel = document.getElementById('self-action-select');
      const result = trySpendAction(p, sel.value);
      const statusEl = document.getElementById('self-action-status');
      if(!result.ok){
        statusEl.style.color = 'var(--danger)';
        statusEl.textContent = result.msg;
        return;
      }
      await saveCombat(code, cachedCombat);
      await pushLog(code, { who: p.name, role:'player', text: `${p.name} usa ${result.def.label} (${result.def.cost} Azione/i) — restano ${p.actions}/2 Azioni.` });
      refreshLiveParts();
    };
  }

  let mountingTNState = { modifier: 0, step: 0, log: [] };

  function renderMountingTN(){
    const cardEl = document.getElementById('mounting-tn-card');
    if(!cardEl) return;
    const st = mountingTNState;
    cardEl.innerHTML = `
      <div class="section-title">🪜 Mounting TN</div>
      <div class="muted" style="margin-bottom:8px;">Per sequenze di Check concatenati (8.03c). Ogni TN sale di uno scaglione rispetto alla precedente — decidilo tu passo per passo. Il modificatore qui sotto si somma al PROSSIMO tiro del giocatore.</div>
      <div class="flex-between" style="margin-bottom:8px;">
        <span class="muted">Passo attuale</span><span class="mono">${st.step}</span>
      </div>
      <div class="flex-between" style="margin-bottom:10px;">
        <span class="muted">Modificatore per il prossimo tiro</span>
        <span class="mono" style="font-size:18px;color:${st.modifier>=0?'var(--cyan)':'var(--danger)'};">${st.modifier>=0?'+':''}${st.modifier}</span>
      </div>
      <div class="muted" style="margin-bottom:6px;">Registra l'esito del tiro appena fatto:</div>
      <div class="row">
        <button class="btn small" id="mtn-crit-success" style="flex:1;">Succ. Critico (+5)</button>
        <button class="btn small" id="mtn-success" style="flex:1;">Successo (+1)</button>
      </div>
      <div class="row" style="margin-top:6px;">
        <button class="btn ghost small" id="mtn-fail" style="flex:1;">Fallimento (-1)</button>
        <button class="btn ghost small" id="mtn-crit-fail" style="flex:1;">Fall. Critico (-5)</button>
      </div>
      <button class="btn ghost" id="mtn-reset" style="width:100%;margin-top:8px;">↺ Nuova Sequenza</button>
      <div class="muted" style="margin-top:8px;max-height:80px;overflow-y:auto;">${st.log.map(l=>`<div>${l}</div>`).join('')}</div>
    `;
    const record = (label, delta)=>{
      st.step += 1;
      st.log.push(`Passo ${st.step}: ${label} → modificatore prossimo tiro: ${st.modifier+delta>=0?'+':''}${st.modifier+delta}`);
      st.modifier += delta;
      renderMountingTN();
    };
    document.getElementById('mtn-crit-success').onclick = ()=>record('Successo Critico', 5);
    document.getElementById('mtn-success').onclick = ()=>record('Successo', 1);
    document.getElementById('mtn-fail').onclick = ()=>record('Fallimento', -1);
    document.getElementById('mtn-crit-fail').onclick = ()=>record('Fallimento Critico', -5);
    document.getElementById('mtn-reset').onclick = ()=>{ mountingTNState = { modifier:0, step:0, log:[] }; renderMountingTN(); };
  }

  function renderGMReference(){
    const el = document.getElementById('gm-reference-card');
    if(!el) return;
    el.innerHTML = `
      <div class="section-title">📚 Compendio Master (Cap. 1.04-1.06)</div>
      <details style="margin-bottom:8px;">
        <summary style="cursor:pointer;color:var(--cyan);">🔧 Digivice Design (1.04)</summary>
        <div class="muted" style="margin-top:6px;">Spunti per personalizzare i Digivice del party (non esaustivo, inventane pure altri):</div>
        <ul class="muted" style="margin:6px 0 0 18px;padding:0;">
          <li><b>Reader (Booster/Card)</b>: legge Card/Chip che danno bonus temporanei.</li>
          <li><b>Data Scanner</b>: scansiona e archivia dati sui Digimon incontrati.</li>
          <li><b>Mappa Digitale</b>: mostra una mappa dell'area (raggio da definire).</li>
          <li><b>Comunicatore</b>: voce o video tra Digivice (distanza da definire).</li>
          <li><b>Evolution Pause</b>: blocca temporaneamente l'Evoluzione di un Digimon, facendolo regredire di uno Stage per una Durata a scelta del Master.</li>
          <li><b>Digi-Gate</b>: apre un varco tra Mondo Reale e Digitale.</li>
        </ul>
      </details>
      <details style="margin-bottom:8px;">
        <summary style="cursor:pointer;color:var(--cyan);">⚖️ Opposed Rolls (1.06)</summary>
        <div class="muted" style="margin-top:6px;">Quando due personaggi si contrappongono fuori dal Combattimento standard, scegli una coppia "Attaccante" e una "Difensore" in base alla scena — chi tira più alto vince. Esempi guida:</div>
        <ul class="muted" style="margin:6px 0 0 18px;padding:0;">
          <li><b>Confronto di forza pura</b> (sollevare, afferrare): stessa Skill per entrambi (es. Feats of Strength, o CPU per i Digimon).</li>
          <li><b>Furtività vs Percezione</b>: Agilità+Stealth (RAM) contro Volontà+Awareness (BIT).</li>
          <li><b>Distrarre e intrufolarsi</b>: 2 tiri — Carisma+Perform (RAM) vs Volontà+Decipher Intent (BIT), poi Agilità+Stealth (RAM) vs Volontà+Awareness (BIT).</li>
          <li><b>Persuadere onestamente</b>: Carisma+Persuasion (BIT) vs Volontà pura (BIT).</li>
          <li><b>Manipolare/ingannare</b>: Carisma+Manipulate (BIT) vs Volontà+Decipher Intent (BIT).</li>
        </ul>
        <div class="muted" style="margin-top:6px;">Non esistono coppie fisse per ogni caso: valuta sempre la scena. In generale c'è un lato "Attaccante" e uno "Difensore".</div>
      </details>
      <details>
        <summary style="cursor:pointer;color:var(--cyan);">🏷️ Families, Attributes, Types (1.05)</summary>
        <div class="muted" style="margin-top:6px;"><b>Attributi</b>: Vaccine, Data, Virus, Free, Variable (usati da Attribute Advantage, Variant 2.05c — vedi sotto).</div>
        <div class="muted" style="margin-top:4px;"><b>Famiglie</b> (field): Nature Spirits, Deep Savers, Wind Guardians, Metal Empire, Virus Busters, Nightmare Soldiers, Dragon's Roar, Jungle Troopers, Dark Area, Unknown.</div>
        <div class="muted" style="margin-top:4px;"><b>Tipi</b>: categorie narrative libere (Drago, Bestia, Demone, Angelo, Insetto, Rettile, ecc.) usate soprattutto da Slayer e Naturewalk per il flavor.</div>
        <div class="muted" style="margin-top:4px;">Puoi taggare queste categorie su ogni Digimon nel Digidex, campo "Categorie" (es. "Deva, Angelo, Vaccine").</div>
      </details>
    `;
  }

  function renderEncounterBalance(){
    const cardEl = document.getElementById('encounter-balance-card');
    if(!cardEl) return;
    const milestone = cachedProgression ? Number(cachedProgression.milestone||0) : 0;
    const partySize = cachedRoster.filter(m=>m.role==='player').length || 1;
    cardEl.innerHTML = `
      <div class="section-title">Bilanciamento Incontro</div>
      <div class="muted" style="margin-bottom:8px;">Formula del manuale (Game Master's Index 3.0): (DP Base Default Range + Milestone×4 + Bonus Difficoltà) × N. Giocatori.</div>
      <div class="row">
        <div class="field"><label>DP Base Default Range</label><input type="number" id="eb-basedp" value="10" min="0" /></div>
        <div class="field"><label>Difficoltà</label>
          <select id="eb-difficulty">
            <option value="0">Easy (+0)</option>
            <option value="5" selected>Normal (+5)</option>
            <option value="10">Hard (+10)</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field"><label>Milestone Party</label><input type="number" id="eb-milestone" value="${milestone}" min="0" /></div>
        <div class="field"><label>N. Giocatori</label><input type="number" id="eb-partysize" value="${partySize}" min="1" /></div>
      </div>
      <div class="muted" style="margin:8px 0;">Budget Incontro: <span class="mono" id="eb-budget" style="color:var(--cyan);font-size:16px;">0</span> DP</div>
      <div class="divider"></div>
      <div class="muted" style="margin-bottom:6px;">Distribuzione tra Nemici</div>
      <div class="row">
        <div class="field"><label>N. Nemici</label><input type="number" id="eb-enemies" value="3" min="1" /></div>
        <div class="field"><label>Stage sopra Default Range (ognuno)</label><input type="number" id="eb-stagesabove" value="0" min="0" /></div>
      </div>
      <div class="muted" id="eb-result" style="margin-top:6px;"></div>
      <div class="divider"></div>
      <div class="section-title" style="font-size:13px;">Tipo di Boss (GM Index 3.03)</div>
      <div class="field"><label>Struttura</label>
        <select id="eb-bosstype">
          <option value="">Incontro normale (nessuna struttura Boss)</option>
          <option value="pool">Opzione 1: Big Scary DP Pool</option>
          <option value="template">Opzione 2: Boss Template</option>
          <option value="tagteam">Opzione 3: Tag Team Boss</option>
          <option value="raid">Opzione 4: Raid Boss</option>
          <option value="multistage">Opzione 5: Multi-Stage Boss</option>
        </select>
      </div>
      <div class="muted" id="eb-bosstype-desc" style="margin-top:6px;"></div>
      <div class="divider"></div>
      <div class="section-title" style="font-size:13px;">⚠️ Qualities da usare con cautela sui Nemici (GM Index 3.02)</div>
      <div class="muted" style="margin-top:4px;">
        <b>Second Wind</b>: non darlo a Nemici con tanti Wound Boxes (li trasforma in mini-Boss "a fasi"); meglio su Digimon con Health basso.<br/>
        <b>Brave Heart</b>: solo su UN Nemico alla volta, e solo se il suo Armor di base è basso (mai come Stat più alta).<br/>
        <b>Combat Monster</b>: tieni il Damage del Nemico basso/dumpato (mai come Stat più alta), specie con i Wound Boxes più alti tipici dei Nemici.<br/>
        <b>Resistant</b>: solo se il Nemico è in inferiorità numerica; evitalo su ruoli da tank/protettore.<br/>
        <b>Huge Power</b>: solo se l'Accuracy non è la Stat più alta; evita di sommarci Weapon.<br/>
        <b>Zoner: Bombardment</b>: SOLO se il Nemico ha Alleati in combattimento, altrimenti è Danno gratuito senza rischio.
      </div>
    `;
    const bossDescs = {
      '': '',
      pool: 'Nemico molto resistente con DP Pool tra il 10% e il 100% in più della media dei giocatori, investito soprattutto in Wound Boxes/Armor. Colpisce piano ma dura a lungo. Attenzione a non esagerare: un singolo nemico verrà comunque sopraffatto dal numero di Azioni del gruppo.',
      template: 'Un solo Nemico ma con un Turno e un Pool di Ferite separato per ogni giocatore (es. Giocatore 1 ↔ Pool 1): ogni giocatore lo affronta "per conto suo" finché il suo Pool non è esaurito. Il lato debole è che il Boss può occupare un solo spazio alla volta e deve scegliere se restare Ranged, concentrarsi su un bersaglio, o spendere Azioni per spostarsi.',
      tagteam: 'Crea un numero di Digimon nemici pari ai giocatori, tutti considerati "Boss": qualsiasi giocatore può attaccare chiunque di loro (diversamente dal Boss Template). Più lungo da preparare, ma molto efficace per rallentare o fermare l\'intero gruppo.',
      raid: 'Mix dei tre precedenti: +50% DP rispetto alla media giocatori, investito soprattutto in Health; dagli Resistenza (non Immunità) a molti Effetti negativi. Ha una Raid Action a inizio Iniziativa che impiega un round intero per attivarsi: i giocatori possono fare un Check Decipher Intent (Azione Interrupt, TN 10+Stage Boss+Milestone Party) per capirne gli effetti e adattarsi prima che scatti.',
      multistage: 'Il Boss attraversa più Fasi (di solito via Evoluzione o Mode Change), ognuna trattata come un nuovo Combattimento: Recovery Check rapido a ogni cambio fase, si azzerano gli usi "per Combattimento" ma NON si ottengono i benefici di un Riposo. Rendi le prime Fasi più facili delle successive.'
    };
    const bossSel = document.getElementById('eb-bosstype');
    bossSel.addEventListener('change', ()=>{ document.getElementById('eb-bosstype-desc').textContent = bossDescs[bossSel.value] || ''; });
    const recalc = ()=>{
      const baseDp = Number(document.getElementById('eb-basedp').value)||0;
      const diff = Number(document.getElementById('eb-difficulty').value)||0;
      const ms = Number(document.getElementById('eb-milestone').value)||0;
      const ps = Number(document.getElementById('eb-partysize').value)||1;
      const budget = (baseDp + ms*4 + diff) * ps;
      document.getElementById('eb-budget').textContent = budget;
      const enemies = Number(document.getElementById('eb-enemies').value)||1;
      const stagesAbove = Number(document.getElementById('eb-stagesabove').value)||0;
      const spentOnEntry = enemies*10 + enemies*stagesAbove*20;
      const remaining = budget - spentOnEntry;
      const perEnemy = Math.floor(remaining / enemies);
      const resEl = document.getElementById('eb-result');
      resEl.style.color = remaining<0 ? 'var(--danger)' : 'var(--text-mute)';
      resEl.innerHTML = `Costo ingresso Nemici: ${spentOnEntry} DP (10/nemico + 20/Stage sopra il range).<br/>DP Bonus rimanenti da distribuire: <b>${remaining}</b> (~${perEnemy} DP a testa, min. 3 in Health ciascuno).`;
    };
    cardEl.querySelectorAll('input, select').forEach(el=> el.addEventListener('input', recalc));
    recalc();
  }

  const DIE_FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];

  function rollD6(){ return 1 + Math.floor(Math.random()*6); }

  function rollSkillCheck(attrVal, skillVal, extraDice){
    const n = 3 + Math.max(0, Number(extraDice)||0);
    const allDice = [];
    for(let i=0;i<n;i++) allDice.push(rollD6());
    const dice = allDice.slice().sort((a,b)=>b-a).slice(0,3);
    const sum = dice.reduce((a,b)=>a+b,0);
    const total = sum + Number(attrVal||0) + Number(skillVal||0);
    return { dice, total, allDice };
  }

  function rollAttributeOnly(attrVal){
    const dice = [rollD6(), rollD6(), rollD6()];
    const sum = dice.reduce((a,b)=>a+b,0);
    const total = sum + Number(attrVal||0) - 1;
    return { dice, total };
  }

  function rollPool(n, countFours){
    const count = Math.max(0, Number(n)||0);
    const dice = [];
    for(let i=0;i<count;i++) dice.push(rollD6());
    const successes = dice.filter(d=>d>= (countFours?4:5)).length;
    return { dice, successes };
  }

  function evaluateVsTN(total, tn, dice){
    if(tn===null || tn===undefined || tn==='') return null;
    if(cachedProgression && cachedProgression.naturalCriticalResults && Array.isArray(dice) && dice.length===3){
      if(dice.every(d=>d===6)) return { label:'Successo Critico', cls:'crit-success' };
      if(dice.every(d=>d===1)) return { label:'Fallimento Critico', cls:'crit-fail' };
    }
    const shift = campaignConfig().tnShift;
    const diff = total - (Number(tn) - shift);
    if(diff>=5) return { label:'Successo Critico', cls:'crit-success' };
    if(diff>=0) return { label:'Successo', cls:'success' };
    if(diff<=-5) return { label:'Fallimento Critico', cls:'crit-fail' };
    return { label:'Fallimento', cls:'fail' };
  }

  function rollTormentCheck(boxes){
    const dice = [rollD6(), rollD6(), rollD6()];
    const total = dice.reduce((a,b)=>a+b,0);
    const tn = 8 + Number(boxes||0);
    const diff = total - tn;
    let outcome;
    if(cachedProgression && cachedProgression.naturalCriticalResults && dice.every(d=>d===6)) outcome = 'crit-success';
    else if(cachedProgression && cachedProgression.naturalCriticalResults && dice.every(d=>d===1)) outcome = 'crit-fail';
    else if(diff>=5) outcome = 'crit-success';
    else if(diff>=0) outcome = 'success';
    else if(diff<=-10) outcome = 'deep-crit-fail';
    else if(diff<=-5) outcome = 'crit-fail';
    else outcome = 'fail';
    return { dice, total, tn, outcome };
  }

    const attacksCard = document.getElementById('attacks-card');

    const combatSelf = document.getElementById('combat-self-actions');
    if(combatSelf && session.role==='player'){
      combatSelf.innerHTML = combatSelfActionHTML(cachedCombat, session.username);
      bindCombatSelfActions(session.code, session.username);
    }
    const privateLogLiveMaster = document.getElementById('private-log-live-master');
    if(privateLogLiveMaster && session.role==='master' && masterPrivateThread){
      const plog = await getPrivateLog(session.code, masterPrivateThread);
      const wasAtBottom = privateLogLiveMaster.scrollHeight - privateLogLiveMaster.scrollTop <= privateLogLiveMaster.clientHeight + 40;
      privateLogLiveMaster.innerHTML = logHTML(plog, false);
      if(wasAtBottom) privateLogLiveMaster.scrollTop = privateLogLiveMaster.scrollHeight;
    }
    const errBanner = document.getElementById('api-err-banner');
    if(errBanner) errBanner.outerHTML = lastApiError ? `<div id="api-err-banner" class="hud-frame" style="border-color:var(--danger);padding:8px 14px;margin-bottom:16px;color:var(--danger);font-size:12px;">⚠ ${escapeHTML(lastApiError)}</div>` : '<div id="api-err-banner"></div>';

  function bindRosterSuggestButtons(players){
    players.forEach((p,i)=>{
      const btn = document.getElementById('btn-suggest-'+i);
      if(btn && !btn.dataset.bound){
        btn.dataset.bound = '1';
        btn.onclick = async ()=>{
          btn.disabled = true; btn.textContent = 'Generando...';
          const contesto = cachedLog.slice(-6).map(l=>`${l.who}: ${l.text}`).join('\n');
          const lines = await suggerisciBattute(p.digimon.name || 'Digimon', p.digimon.personality, contesto);
          rosterSuggestLines[p.username] = lines;
          const box = document.getElementById('suggest-box-'+i);
          if(box){
            box.innerHTML = lines.map(l=>`<div class="suggest-line" data-line="${escapeAttr(l)}">${escapeHTML(l)}</div>`).join('');
            box.style.display = 'block';
            bindSuggestLineClicks(box, p);
          }
          btn.disabled = false; btn.textContent = 'Suggerisci Battuta';
        };
      }
      const existingBox = document.getElementById('suggest-box-'+i);
      if(existingBox && (rosterSuggestLines[p.username]||[]).length){
        bindSuggestLineClicks(existingBox, p);
      }
    });
  }

  function bindSuggestLineClicks(box, p){
    box.querySelectorAll('.suggest-line').forEach(el=>{
      el.onclick = async ()=>{
        await pushLog(session.code, { who: p.digimon.name || 'Digimon', role:'digimon', text: el.getAttribute('data-line'), meta: p.digimon.chatColor ? { color: p.digimon.chatColor, avatar: p.digimon.imageUrl } : null });
        delete rosterSuggestLines[p.username];
        box.innerHTML = '';
        box.style.display = 'none';
        refreshLiveParts();
      };
    });
  }

  // ---------- bars ----------
  function barHTML(label, current, max, kind, onMinusId, onPlusId){
    const pct = max>0 ? Math.max(0, Math.min(100, (current/max)*100)) : 0;
    const low = pct <= 25;
    return `
      <div class="bar-row">
        <div class="bar-label"><span>${label}</span><span class="val">${current} / ${max}</span></div>
        <div class="bar-track"><div class="bar-fill ${low?'low':kind}" style="width:${pct}%;"></div></div>
        <div class="bar-controls">
          <button id="${onMinusId}">−</button>
          <button id="${onPlusId}">+</button>
        </div>
      </div>
    `;
  }

  function portraitHTML(imageUrl, name, size){
    const cls = size==='sm' ? 'portrait-sm' : 'portrait';
    if(imageUrl){
      return `<img class="${cls}" src="${escapeAttr(imageUrl)}" onerror="this.style.visibility='hidden'" />`;
    }
    const initial = (name||'?').trim().charAt(0).toUpperCase() || '?';
    return `<div class="${cls}" style="display:flex;align-items:center;justify-content:center;color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:${size==='sm'?'14px':'20px'};">${initial}</div>`;
  }

  function dexFilterBarHTML(entries){
    const allCats = new Set();
    (entries||[]).forEach(e=>(e.categories||[]).forEach(c=>allCats.add(c)));
    if(allCats.size===0) return '';
    return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
      ${Array.from(allCats).sort().map(c=>`
        <span class="tag" data-filter-cat="${escapeAttr(c)}" style="cursor:pointer;${dexActiveFilters.includes(c)?'background:rgba(53,232,201,0.15);border-color:var(--cyan);color:var(--cyan);':''}">${escapeHTML(c)}</span>
      `).join('')}
      ${dexActiveFilters.length>0 ? `<span class="tag" data-filter-cat="__clear__" style="cursor:pointer;color:var(--danger);border-color:var(--danger);">× azzera filtri</span>` : ''}
    </div>`;
  }

  function dexListHTML(entries, canEdit){
    dexCanEditGlobal = canEdit;
    if(!entries || entries.length===0) return '<div class="muted">Nessun Digimon ancora registrato nel Dex.</div>';
    const filterBar = dexFilterBarHTML(entries);
    const filtered = dexActiveFilters.length===0 ? entries : entries.filter(e=>(e.categories||[]).some(c=>dexActiveFilters.includes(c)));
    if(filtered.length===0) return filterBar + '<div class="muted">Nessun Digimon corrisponde ai filtri selezionati.</div>';
    return filterBar + filtered.slice().reverse().map(e=>{
      const bs = e.base_stats || {};
      const hasStats = bs.baseAccuracy || bs.baseDamage || bs.baseDodge || bs.baseArmor || bs.baseHealth;
      if(!canEdit && !e.discovered){
        return `
        <div class="roster-item" id="dex-item-${e.id}">
          <div style="display:flex;gap:10px;align-items:center;">
            <div class="portrait-sm" style="display:flex;align-items:center;justify-content:center;color:var(--text-mute);font-family:'Share Tech Mono',monospace;">?</div>
            <div><span class="name" style="color:var(--text-mute);">???</span><div class="muted" style="font-size:10px;">Non ancora incontrato</div></div>
          </div>
        </div>`;
      }
      return `
      <div class="roster-item" id="dex-item-${e.id}">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          ${portraitHTML(e.image_url, e.name, 'sm')}
          <div style="flex:1;">
            <div class="flex-between">
              <div><span class="name">${escapeHTML(e.name)}</span><span class="tag" style="margin-left:6px;">${escapeHTML(e.stage)}</span>${canEdit ? `<span class="tag" style="margin-left:4px;color:${e.discovered?'var(--cyan)':'var(--text-mute)'};border-color:${e.discovered?'var(--cyan-dim)':'var(--line)'};">${e.discovered?'scoperto':'nascosto'}</span>` : ''}</div>
              ${canEdit ? `<button class="btn ghost small" data-dex-edit="${e.id}">Modifica</button>` : ''}
            </div>
            ${e.description ? `<div class="sub" style="margin-top:3px;">${escapeHTML(e.description)}</div>` : ''}
            ${hasStats ? `<div class="muted" style="margin-top:4px;font-size:10px;">ACC ${bs.baseAccuracy||0} · DMG ${bs.baseDamage||0} · DODGE ${bs.baseDodge||0} · ARM ${bs.baseArmor||0} · HP ${bs.baseHealth||0}</div>` : ''}
            ${e.categories && e.categories.length ? `<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;">${attributeBadgeHTML(splitCategoriesAttribute(e.categories).attribute)}${splitCategoriesAttribute(e.categories).family.map(c=>`<span class="tag" style="font-size:9px;">${escapeHTML(c)}</span>`).join('')}</div>` : ''}
            ${e.evolutions && e.evolutions.length ? evolutionsReadonlyHTML(e.evolutions) : ''}
            ${e.qualities && e.qualities.length ? `<div class="muted" style="margin-top:4px;">Qualities: ${computeDpSpent(e.qualities)}/${e.dp_total||0} DP (${e.qualities.length})</div>` : ''}
            ${e.added_by ? `<div class="muted" style="margin-top:2px;">aggiunto da ${escapeHTML(e.added_by)}</div>` : ''}
          </div>
        </div>
        <div id="dex-edit-form-${e.id}"></div>
      </div>
    `;
    }).join('');
  }

        description: document.getElementById('dex-e-desc-'+entry.id).value.trim(),

      const st = document.getElementById('dex-e-status-'+entry.id);
      if(ok){
        Object.assign(entry, { name:fields.name, stage:fields.stage, description:fields.description, image_url:fields.imageUrl, base_stats:fields.baseStats, evolutions:fields.evolutions, categories:fields.categories, qualities:fields.qualities, dp_total:fields.dpTotal, discovered:fields.discovered });

        st.style.color='var(--danger)'; st.textContent = 'Errore: ' + (lastApiError||'');

  function bindDexForm(code, username){
    const btn = document.getElementById('btn-dex-add');
    if(!btn) return;

    const bindAddEvoRemove = ()=>{
      const listEl = document.getElementById('dex-add-evolist');
      if(!listEl) return;
      listEl.querySelectorAll('[data-rmevo]').forEach(b=>{
        b.onclick = ()=>{
          dexAddEvolutions.splice(Number(b.getAttribute('data-rmevo')),1);
          listEl.innerHTML = evolutionsEditableHTML(dexAddEvolutions);
          bindAddEvoRemove();
        };
      });
    };
    bindAddEvoRemove();
    const evoAddBtn = document.getElementById('btn-dex-evo-add');
    if(evoAddBtn){
      evoAddBtn.onclick = ()=>{
        const n = document.getElementById('dex-evo-name').value.trim();
        if(!n) return;
        dexAddEvolutions.push({ name:n, imageUrl: document.getElementById('dex-evo-img').value.trim() });
        document.getElementById('dex-evo-name').value='';
        document.getElementById('dex-evo-img').value='';
        document.getElementById('dex-add-evolist').innerHTML = evolutionsEditableHTML(dexAddEvolutions);
        bindAddEvoRemove();
      };
    }

    btn.onclick = async ()=>{
      const name = document.getElementById('dex-name').value.trim();
      const stage = document.getElementById('dex-stage').value;
      const description = document.getElementById('dex-desc').value.trim();
      const imageUrl = document.getElementById('dex-img').value.trim();
      const attributeSel = document.getElementById('dex-attribute');
      const attribute = attributeSel ? attributeSel.value : '';
      const familyInput = document.getElementById('dex-family');
      const family = familyInput ? familyInput.value.split(',').map(s=>s.trim()).filter(Boolean) : [];
      const categories = [attribute, ...family].filter(Boolean);
      const statusEl = document.getElementById('dex-status');
      if(!name){ statusEl.style.color='var(--danger)'; statusEl.textContent = 'Serve almeno un nome.'; return; }
      const baseStats = {
        baseAccuracy: Number((document.getElementById('dex-acc')||{}).value)||0,
        baseDamage: Number((document.getElementById('dex-dmg')||{}).value)||0,
        baseDodge: Number((document.getElementById('dex-dodge')||{}).value)||0,
        baseArmor: Number((document.getElementById('dex-arm')||{}).value)||0,
        baseHealth: Number((document.getElementById('dex-hp')||{}).value)||0
      };
      const discoveredCheckbox = document.getElementById('dex-discovered');
      const discovered = discoveredCheckbox ? discoveredCheckbox.checked : false;
      const d = await addDexEntry(code, { name, stage, description, imageUrl, addedBy: username, categories, baseStats, evolutions: dexAddEvolutions, discovered });
      if(d && d.entry){
        statusEl.style.color = 'var(--text-mute)';
        statusEl.textContent = 'Aggiunto al Dex.';
        document.getElementById('dex-name').value='';
        document.getElementById('dex-desc').value='';
        document.getElementById('dex-img').value='';
        if(attributeSel) attributeSel.value='';
        if(familyInput) familyInput.value='';
        ['dex-acc','dex-dmg','dex-dodge','dex-arm','dex-hp'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value='0'; });
        dexAddEvolutions = [];
        if(discoveredCheckbox) discoveredCheckbox.checked = false;
        const evoListEl = document.getElementById('dex-add-evolist');
        if(evoListEl){ evoListEl.innerHTML = evolutionsEditableHTML(dexAddEvolutions); bindAddEvoRemove(); }
        cachedDex.push(d.entry);
        const dexLive = document.getElementById('dex-live');
        if(dexLive){ dexLive.innerHTML = dexListHTML(cachedDex, true); bindDexEditButtons(code); }
      } else {
        statusEl.style.color = 'var(--danger)';
        statusEl.textContent = 'Errore: ' + (lastApiError || 'sconosciuto');
      }
    };
  }

      document.getElementById('btn-cancel-skills').onclick = ()=>{ editingSkills = false; renderSkillsCard(me); };
      document.getElementById('btn-save-skills').onclick = async ()=>{
        SKILL_DEFS.forEach(def=>{

          let val = Number(el.value)||0;
          if(val > max) val = max;
          if(val < 0) val = 0;
          me.tamer.skills[def.key] = val;
        });
        const newMaxWounds = 3+Number(me.tamer.skills.endurance||0);
        if(me.tamer.currentWounds > newMaxWounds) me.tamer.currentWounds = newMaxWounds;
        const ok = await saveMember(session.code, me);
        const st = document.getElementById('save-status-skills');

  function computeUnlockedTalents(tamer){
    const cfg = campaignConfig();
    const stdIdx = { 3:0, 5:1, 6:2, 7:3 };
    return TALENT_DEFS.filter(t => {
      const idx = stdIdx[t.threshold];
      const effectiveThreshold = idx!==undefined ? cfg.thresholds[idx] : t.threshold;
      return Number(tamer[t.attr]||0) >= effectiveThreshold;
    });
  }

  const STAGE_CREATION = {
    Fresh:    { dp:2,  startStat:1 },
    Baby:     { dp:5,  startStat:1 },
    Rookie:   { dp:10, startStat:2 },
    Champion: { dp:20, startStat:3 },
    Ultimate: { dp:30, startStat:4 },
    Mega:     { dp:40, startStat:5 }
  };
  let creationDraft = null;

  function applyStageStatScaling(digimon, oldStage, newStage){
    if(!oldStage || !newStage || oldStage===newStage) return;
    const oldCfg = STAGE_CREATION[oldStage] || STAGE_CREATION.Rookie;
    const newCfg = STAGE_CREATION[newStage] || STAGE_CREATION.Rookie;
    const delta = newCfg.startStat - oldCfg.startStat;
    if(delta !== 0){
      ['baseAccuracy','baseDamage','baseDodge','baseArmor','baseHealth'].forEach(k=>{
        digimon[k] = Math.max(0, Number(digimon[k]||0) + delta);
      });
    }
    const oldMax = Number(digimon.maxWounds) || (stageIndex(oldStage) + Number(digimon.baseHealth||0)*2);
    const missing = Math.max(0, oldMax - Number(digimon.currentWounds||0));
    const newMax = stageIndex(newStage) + Number(digimon.baseHealth||0)*2;
    digimon.maxWounds = newMax;
    digimon.currentWounds = Math.max(0, Math.min(newMax, newMax - missing));
  }

  function openCreationWizard(me, hostId){
    if(!window.confirm('La Creazione Guidata azzera Attributi, Skill e Stat Base del Digimon per ricostruirli da zero rispettando i vincoli del manuale. Continuare?')) return;
    creationDraft = {
      hostId: hostId || 'sidebar-content',
      tamer: { agility:1, body:1, charisma:1, intelligence:1, willpower:1, skills: defaultSkills(), digiviceImageUrl: me.tamer.digiviceImageUrl||'' },
      digimon: { stage:'Rookie', size:'Medium', name: me.digimon.name||'', imageUrl: me.digimon.imageUrl||'', personality: me.digimon.personality||'', attribute: me.digimon.attribute||'Free',
        baseAccuracy: STAGE_CREATION.Rookie.startStat, baseDamage: STAGE_CREATION.Rookie.startStat, baseDodge: STAGE_CREATION.Rookie.startStat, baseArmor: STAGE_CREATION.Rookie.startStat, baseHealth: STAGE_CREATION.Rookie.startStat },
      step: 1
    };
    if(creationDraft.hostId==='sidebar-content') sidebarTab = 'wizard';
    renderCreationWizard(me);
  }

  function renderCreationWizard(me){
    const content = document.getElementById(creationDraft.hostId);
    if(!content) return;
    if(creationDraft.step===1) renderWizardTamerStep(content, me);
    else renderWizardDigimonStep(content, me);
  }

  function renderWizardTamerStep(content, me){
    const draft = creationDraft.tamer;
    const cfg = campaignConfig();
    const cap = cfg.cap;
    const attrs = ['agility','body','charisma','intelligence','willpower'];
    const apSpent = attrs.reduce((s,a)=>s+(draft[a]-1),0);
    const apRemaining = cfg.ap - apSpent;
    const spSpent = SKILL_DEFS.reduce((s,def)=>s+Number(draft.skills[def.key]||0),0);
    const spRemaining = cfg.sp - spSpent;
    const attrAtCap = attrs.filter(a=>draft[a]===cap).length;
    const skillsAtCap = SKILL_DEFS.filter(def=>Number(draft.skills[def.key]||0)===cap).length;
    const errors = [];
    if(apRemaining!==0) errors.push(`Punti Attributo da spendere: ${apRemaining} (devono arrivare esattamente a 0)`);
    if(spRemaining!==0) errors.push(`Punti Skill da spendere: ${spRemaining} (devono arrivare esattamente a 0)`);
    if(attrAtCap>1) errors.push(`Solo un Attributo può arrivare al tetto di ${cap} in creazione.`);
    if(skillsAtCap>1) errors.push(`Solo una Skill può arrivare al tetto di ${cap} in creazione.`);

    content.innerHTML = `

        <div class="section-title">🧙 Creazione Guidata — Passo 1: Tamer</div>

        <div class="grid-stats">
          ${attrs.map(a=>`
            <div class="stat-box">
              <div class="l">${ATTR_ABBR[a]}</div>
              <input type="number" data-wiz-attr="${a}" min="1" max="${cap}" value="${draft[a]}" />
            </div>
          `).join('')}
        </div>
        <div class="divider"></div>
        <div class="flex-between" style="margin-bottom:6px;"><span class="muted">Punti Skill rimasti</span><span class="mono" style="color:${spRemaining===0?'var(--cyan)':'var(--amber)'};">${spRemaining}</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
          ${SKILL_DEFS.map(def=>{
            const max = Math.min(cap, skillMax(draft, def));
            return `<div class="stat-box" style="text-align:left;padding:6px 8px;">
              <div class="l">${escapeHTML(def.label)} <span class="muted" style="font-size:9px;">(max ${max})</span></div>
              <input type="number" data-wiz-skill="${def.key}" min="0" max="${max}" value="${draft.skills[def.key]||0}" />
            </div>`;
          }).join('')}
        </div>
        <div class="divider"></div>
        <div class="field"><label>URL Immagine Digivice (opzionale)</label><input type="text" id="wiz-t-digivice-img" value="${escapeAttr(draft.digiviceImageUrl)}" placeholder="https://..." /></div>
        ${errors.length ? `<div class="err">${errors.map(e=>escapeHTML(e)).join('<br/>')}</div>` : '<div class="muted" style="color:var(--cyan);">Tutto valido, puoi proseguire.</div>'}
        <div class="row" style="margin-top:10px;">
          <button class="btn ghost" id="btn-wiz-cancel">Annulla</button>
          <button class="btn solid" id="btn-wiz-next" ${errors.length?'disabled':''}>Avanti: Digimon →</button>
        </div>
      </div>
    `;
    content.querySelectorAll('[data-wiz-attr]').forEach(inp=>{
      inp.onchange = ()=>{
        draft[inp.getAttribute('data-wiz-attr')] = Math.max(1, Math.min(cap, Number(inp.value)||1));
        renderWizardTamerStep(content, me);
      };
    });
    content.querySelectorAll('[data-wiz-skill]').forEach(inp=>{
      inp.onchange = ()=>{
        const key = inp.getAttribute('data-wiz-skill');
        const def = SKILL_DEFS.find(d=>d.key===key);
        const max = Math.min(cap, skillMax(draft, def));
        draft.skills[key] = Math.max(0, Math.min(max, Number(inp.value)||0));
        renderWizardTamerStep(content, me);
      };
    });
    const digiviceImgInp = document.getElementById('wiz-t-digivice-img');
    if(digiviceImgInp) digiviceImgInp.onchange = (e)=>{ draft.digiviceImageUrl = e.target.value; };
    document.getElementById('btn-wiz-cancel').onclick = ()=>{
      const wasPlayerHost = creationDraft.hostId==='sidebar-content';
      creationDraft=null;
      if(wasPlayerHost){ sidebarTab='scheda'; renderSidebar(me); }
      else { content.innerHTML = '<div class="muted">Creazione annullata. Chiudi e riapri "Gestisci Scheda" per tornare alla vista normale.</div>'; }
    };
    const nextBtn = document.getElementById('btn-wiz-next');
    if(nextBtn) nextBtn.onclick = ()=>{ creationDraft.step = 2; renderCreationWizard(me); };
  }

        <div class="muted" style="margin-top:6px;">DP non spesi in Stat verranno riservati come budget Qualities (${Math.max(0,dpRemaining)} DP).</div>
        <div class="field" style="margin-top:8px;"><label>Personalità</label><textarea id="wiz-d-personality" rows="2">${escapeHTML(draft.personality)}</textarea></div>
        <div class="field"><label>URL Immagine (opz.)</label><input type="text" id="wiz-d-img" value="${escapeAttr(draft.imageUrl)}" /></div>
        <div class="field"><label>Attributo (Variant Rule 2.05c)</label>
          <select id="wiz-d-attribute">
            ${['Vaccine','Data','Virus','Free','Variable'].map(a=>`<option ${draft.attribute===a?'selected':''}>${a}</option>`).join('')}
          </select>
        </div>
        <div class="divider"></div>
        ${errors.length ? `<div class="err">${errors.map(e=>escapeHTML(e)).join('<br/>')}</div>` : '<div class="muted" style="color:var(--cyan);">Tutto valido.</div>'}
        <div class="row" style="margin-top:10px;">
          <button class="btn ghost" id="btn-wiz-back">← Indietro</button>
          <button class="btn solid" id="btn-wiz-finish" ${errors.length?'disabled':''}>✅ Applica e Salva</button>
        </div>
        <div class="muted" id="wiz-status" style="margin-top:6px;"></div>
      </div>
    `;
    document.getElementById('wiz-d-name').onchange = (e)=>{ draft.name = e.target.value; };
    document.getElementById('wiz-d-personality').onchange = (e)=>{ draft.personality = e.target.value; };
    document.getElementById('wiz-d-img').onchange = (e)=>{ draft.imageUrl = e.target.value; };
    document.getElementById('wiz-d-attribute').onchange = (e)=>{ draft.attribute = e.target.value; };
    document.getElementById('wiz-d-stage').onchange = (e)=>{
      draft.stage = e.target.value;
      const newCfg = STAGE_CREATION[draft.stage];
      statKeys.forEach(k=>{ draft[k] = newCfg.startStat; });
      draft.size = allowedSizes(draft.stage)[0] || 'Medium';
      renderWizardDigimonStep(content, me);
    };
    document.getElementById('wiz-d-size').onchange = (e)=>{ draft.size = e.target.value; };
    content.querySelectorAll('[data-wiz-stat]').forEach(inp=>{
      inp.onchange = ()=>{
        draft[inp.getAttribute('data-wiz-stat')] = Math.max(cfg.startStat, Number(inp.value)||cfg.startStat);
        renderWizardDigimonStep(content, me);
      };
    });
    document.getElementById('btn-wiz-back').onclick = ()=>{ creationDraft.step = 1; renderCreationWizard(me); };
    const finishBtn = document.getElementById('btn-wiz-finish');
    if(finishBtn){
      finishBtn.onclick = async ()=>{
        const t = creationDraft.tamer;
        ['agility','body','charisma','intelligence','willpower'].forEach(a=>{ me.tamer[a] = t[a]; });
        me.tamer.skills = t.skills;
        me.tamer.unspentGrowthPoints = 0;
        me.tamer.currentWounds = 3 + Number(t.skills.endurance||0);
        me.tamer.digiviceImageUrl = t.digiviceImageUrl || '';

        me.digimon.name = draft.name;
        me.digimon.stage = draft.stage;
        me.digimon.defaultStage = draft.stage;
        me.digimon.size = draft.size;
        me.digimon.personality = draft.personality;
        me.digimon.imageUrl = draft.imageUrl;
        me.digimon.attribute = draft.attribute || 'Free';
        statKeys.forEach(k=>{ me.digimon[k] = draft[k]; });
        me.digimon.maxWounds = stageIndex(draft.stage) + Number(draft.baseHealth)*2;
        me.digimon.currentWounds = me.digimon.maxWounds;
        me.digimon.dpTotal = Math.max(0, dpRemaining);
        me.digimon.qualities = [];
        me.digimon.evolutionPoints = 0;
        me.digimon.defaultRange = 2;

        const ok = await saveMember(session.code, me);
        const st = document.getElementById('wiz-status');
        if(ok){
          const wasPlayerHost = creationDraft.hostId==='sidebar-content';
          st.style.color='var(--text-mute)';
          st.textContent = wasPlayerHost ? 'Personaggio creato! Torno alla scheda...' : 'Personaggio creato! Chiudi e riapri "Gestisci Scheda" per vedere gli aggiornamenti.';
          creationDraft = null;
          await pushLog(session.code, { who: (session.role==='master'?'Master':session.username), role: (session.role==='master'?'gm':'player'), text: `${me.username} ha completato la creazione del personaggio con ${me.digimon.name||'il proprio Digimon'}.` });
          if(wasPlayerHost){ sidebarTab = 'scheda'; setTimeout(()=>{ renderSidebar(me); refreshLiveParts(); }, 600); }
          else { refreshLiveParts(); }
        } else {
          st.style.color='var(--danger)'; st.textContent = 'Errore: ' + (lastApiError||'sconosciuto');
        }
      };
    }
  }

  function renderTamerCard(me, containerId){

        <div class="muted" style="margin-bottom:6px;">Aspects — tratti di personalità che danno bonus o penalità ai Check, a scelta del giocatore</div>
        <div class="roster-item" style="padding:8px;margin-bottom:6px;">
          <div class="flex-between"><b>Major</b><span class="mono">${t.majorAspect.usesLeft||0} usi</span></div>
          <div class="muted" style="font-size:10px;margin-top:2px;">Un tratto prominente della personalità (es. "Track Star: atletico ma competitivo") — dà +4 a un Check pertinente, o -4 se ti giochi il lato negativo.</div>
          <div class="sub" style="margin:4px 0;">${escapeHTML(t.majorAspect.text)||'(non impostato — scrivilo in "Modifica")'}</div>
          ${(t.majorAspect.usesLeft||0)>0 ? `<button class="btn small" id="btn-aspect-major-use">Usa (+4 / −4)</button>` : ''}
        </div>
        <div class="roster-item" style="padding:8px;margin-bottom:6px;">
          <div class="flex-between"><b>Minor</b><span class="mono">${t.minorAspect.usesLeft||0} usi</span></div>
          <div class="muted" style="font-size:10px;margin-top:2px;">Un tratto più sottile, meno evidente del Major — dà +2 a un Check pertinente, o -2 se ti giochi il lato negativo.</div>
          <div class="sub" style="margin:4px 0;">${escapeHTML(t.minorAspect.text)||'(non impostato — scrivilo in "Modifica")'}</div>
          ${(t.minorAspect.usesLeft||0)>0 ? `<button class="btn small" id="btn-aspect-minor-use">Usa (+2 / −2)</button>` : ''}
        </div>
        <div class="divider"></div>
        <div class="flex-between" style="margin-bottom:6px;"><span class="muted">Torments</span><button class="btn ghost small" id="btn-add-torment">+ Nuovo</button></div>

        <div class="hud-frame" style="padding:10px;border-color:var(--cyan-dim);">

            <summary class="mono" style="cursor:pointer;color:var(--cyan);font-size:12px;text-transform:uppercase;letter-spacing:0.05em;">⭐ Tamer Talents sbloccati — ${computeUnlockedTalents(t).length}</summary>
            <div style="margin-top:8px;">
              ${(()=>{ const unlocked = computeUnlockedTalents(t); return unlocked.length===0
                ? '<div class="muted">Nessun Talent ancora sbloccato (servono almeno 3 punti in un Attributo).</div>'

      `;
      document.getElementById('btn-edit-tamer').onclick = ()=>{ editingTamer = true; renderTamerCard(me); };
      document.getElementById('btn-open-wizard').onclick = ()=>{

        if(containerId && containerId.indexOf('m-tamer-')===0){ hostId = 'manage-panel-'+containerId.slice('m-tamer-'.length); }
        openCreationWizard(me, hostId);
      };
      document.getElementById('tamer-w-minus').onclick = async ()=>{ me.tamer.currentWounds = Math.max(0, me.tamer.currentWounds-1); await saveMember(session.code, me); renderTamerCard(me); };
      document.getElementById('tamer-w-plus').onclick = async ()=>{ me.tamer.currentWounds = Math.min(maxW, me.tamer.currentWounds+1); await saveMember(session.code, me); renderTamerCard(me); };
      document.getElementById('ip-minus').onclick = async ()=>{ me.tamer.inspirationPoints = Math.max(0, (me.tamer.inspirationPoints||0)-1); await saveMember(session.code, me); renderTamerCard(me); };
      document.getElementById('ip-plus').onclick = async ()=>{ me.tamer.inspirationPoints = (me.tamer.inspirationPoints||0)+1; await saveMember(session.code, me); renderTamerCard(me); };
      const majorBtn = document.getElementById('btn-aspect-major-use');
      if(majorBtn) majorBtn.onclick = async ()=>{
        const asPenalty = window.confirm('OK = usa come bonus (+4, consuma 1 uso). Annulla = invoca la penalità (-4, ripristina l\'uso e guadagni 1 IP).');
        if(asPenalty){
          me.tamer.majorAspect.usesLeft = Math.max(0,(me.tamer.majorAspect.usesLeft||0)-1);
          await pushLog(session.code, { who: session.username, role:'player', text: `Usa il Major Aspect "${me.tamer.majorAspect.text}" (+4 al prossimo Check).` });
        } else {
          me.tamer.majorAspect.usesLeft = 1;
          me.tamer.inspirationPoints = (me.tamer.inspirationPoints||0)+1;
          await pushLog(session.code, { who: session.username, role:'player', text: `Invoca la penalità del Major Aspect "${me.tamer.majorAspect.text}" (-4), ripristina l'uso e guadagna 1 IP.` });
        }
        await saveMember(session.code, me);
        renderTamerCard(me);
        refreshLiveParts();
      };
      const minorBtn = document.getElementById('btn-aspect-minor-use');
      if(minorBtn) minorBtn.onclick = async ()=>{
        const asPenalty = window.confirm('OK = usa come bonus (+2, consuma 1 uso). Annulla = invoca la penalità (-2, ripristina entrambi gli usi).');
        if(asPenalty){
          me.tamer.minorAspect.usesLeft = Math.max(0,(me.tamer.minorAspect.usesLeft||0)-1);
          await pushLog(session.code, { who: session.username, role:'player', text: `Usa il Minor Aspect "${me.tamer.minorAspect.text}" (+2 al prossimo Check).` });
        } else {
          me.tamer.minorAspect.usesLeft = 2;
          await pushLog(session.code, { who: session.username, role:'player', text: `Invoca la penalità del Minor Aspect "${me.tamer.minorAspect.text}" (-2), ripristina entrambi gli usi.` });
        }
        await saveMember(session.code, me);
        renderTamerCard(me);
        refreshLiveParts();

      document.getElementById('btn-add-torment').onclick = async ()=>{

        const boxes = Math.max(0, Math.min(10, Number(boxesStr)||0));
        if(!me.tamer.torments) me.tamer.torments = [];
        me.tamer.torments.push({ name, boxes, usedThisRest:false });
        await saveMember(session.code, me);
        renderTamerCard(me);
      };

          await saveMember(session.code, me);
          renderTamerCard(me);
        };
      });
      cardEl.querySelectorAll('[data-torment-check]').forEach(btn=>{
        btn.onclick = async ()=>{
          const idx = Number(btn.getAttribute('data-torment-check'));
          const tor = me.tamer.torments[idx];
          if(!tor || tor.usedThisRest) return;
          const result = rollTormentCheck(tor.boxes);
          let outcomeText;
          if(result.outcome==='crit-success'){
            tor.boxes = Math.max(0, tor.boxes-1);
            me.tamer.inspirationPoints = (me.tamer.inspirationPoints||0)+1;
            tor.usedThisRest = true;
            outcomeText = 'Successo Critico! Cancella 1 Casella Torment e guadagna 1 IP.';
          } else if(result.outcome==='success'){
            me.tamer.inspirationPoints = (me.tamer.inspirationPoints||0)+1;
            tor.usedThisRest = true;
            outcomeText = 'Successo! Guadagna 1 IP.';
          } else if(result.outcome==='deep-crit-fail'){
            tor.boxes = Math.min(10, tor.boxes+1);
            me.tamer.tormentPenalty = -5;
            tor.usedThisRest = true;
            outcomeText = 'Fallimento Critico Profondo! +1 Casella Torment, penalità -5 fino al Rest.';
          } else if(result.outcome==='crit-fail'){
            me.tamer.tormentPenalty = -2;
            tor.usedThisRest = true;
            outcomeText = 'Fallimento Critico! Penalità -2 fino al Rest.';
          } else {
            outcomeText = 'Fallimento. Nessun effetto, si può ritentare più tardi.';
          }
          await saveMember(session.code, me);
          const resEl = document.getElementById('torment-result-'+idx);
          if(resEl) resEl.innerHTML = `${diceRowHTML(result.dice)} <b>${result.total}</b> vs TN ${result.tn} — ${outcomeText}`;
          await pushLog(session.code, { who: session.username, role:'roll', text: `Torment Check su "${tor.name}": 3d6[${result.dice.join(',')}]=${result.total} vs TN ${result.tn} → ${outcomeText}`, meta:{dice: result.dice} });
          if(tor.usedThisRest){ btn.disabled = true; btn.textContent = 'Già tentato (Rest)'; }
          refreshLiveParts();
        };
      });
    } else {
      cardEl.innerHTML = `
        <div class="section-title">Scheda Tamer — Modifica</div>
        <div class="field"><label>URL Immagine (opzionale)</label><input type="text" id="e-t-img" value="${escapeAttr(t.imageUrl)}" placeholder="https://..." /></div>
        <div class="field"><label>URL Immagine Digivice (opzionale)</label><input type="text" id="e-t-digivice-img" value="${escapeAttr(t.digiviceImageUrl)}" placeholder="https://..." /></div>
        <div class="grid-stats">
          ${statBox('AGI','e-t-agility',t.agility)}
          ${statBox('BODY','e-t-body',t.body)}
          ${statBox('CAR','e-t-charisma',t.charisma)}
          ${statBox('INT','e-t-intelligence',t.intelligence)}
          ${statBox('WILL','e-t-willpower',t.willpower)}
        </div>
        <div class="muted" style="margin-top:8px;">Endurance e le altre Skill si gestiscono nella card "Skill" qui sotto.</div>
        <div class="divider"></div>
        <div class="field"><label>Major Aspect</label><input type="text" id="e-t-aspect-major" value="${escapeAttr(t.majorAspect.text)}" placeholder="es. Track Star..." /></div>
        <div class="field"><label>Minor Aspect</label><input type="text" id="e-t-aspect-minor" value="${escapeAttr(t.minorAspect.text)}" placeholder="es. Smarter Than They Act..." /></div>
        <div class="row" style="margin-top:10px;">
          <button class="btn ghost" id="btn-cancel-tamer">Annulla</button>
          <button class="btn solid" id="btn-save-tamer">Salva</button>
        </div>
        <div class="muted" id="save-status-tamer" style="margin-top:6px;"></div>
      `;
      document.getElementById('btn-cancel-tamer').onclick = ()=>{ editingTamer = false; renderTamerCard(me); };
      document.getElementById('btn-save-tamer').onclick = async ()=>{
        ['agility','body','charisma','intelligence','willpower'].forEach(k=>{
          const el = document.getElementById('e-t-'+k);
          if(el) me.tamer[k] = Number(el.value)||0;
        });
        me.tamer.imageUrl = document.getElementById('e-t-img').value.trim();
        me.tamer.digiviceImageUrl = document.getElementById('e-t-digivice-img').value.trim();
        me.tamer.majorAspect.text = document.getElementById('e-t-aspect-major').value.trim();
        me.tamer.minorAspect.text = document.getElementById('e-t-aspect-minor').value.trim();
        SKILL_DEFS.forEach(def=>{
          const max = skillMax(me.tamer, def);
          const cur = Number(me.tamer.skills[def.key])||0;
          if(cur > max) me.tamer.skills[def.key] = max;
        });
        const newMax = 3+Number(me.tamer.skills.endurance||0);
        if(me.tamer.currentWounds > newMax) me.tamer.currentWounds = newMax;
        const ok = await saveMember(session.code, me);
        const st = document.getElementById('save-status-tamer');
        st.style.color = ok ? 'var(--text-mute)' : 'var(--danger)';
        st.textContent = ok ? 'Salvato.' : ('Errore: '+(lastApiError||''));
        if(ok){ editingTamer = false; renderTamerCard(me); renderSkillsCard(me); }
      };
    }
  }

          ${it.desc ? `<div class="sub" style="margin-top:3px;">${escapeHTML(it.desc)}</div>` : ''}

      `).join('')}

      <div class="row">
        <div class="field"><label>Oggetto</label><input type="text" id="inv-name" placeholder="es. Digivice" /></div>

        await saveMember(session.code, me);
        renderInventoryCard(me);
      };
    });
    document.getElementById('btn-inv-add').onclick = async ()=>{
      const name = document.getElementById('inv-name').value.trim();
      if(!name) return;
      const qty = Number(document.getElementById('inv-qty').value)||1;
      const desc = document.getElementById('inv-desc').value.trim();
      me.tamer.inventory.push({ name, qty, desc });
      await saveMember(session.code, me);
      renderInventoryCard(me);

  function renderSidebar(me){
    const content = document.getElementById('sidebar-content');
    if(!content) return;
    ['scheda','inventario'].forEach(t=>{
      const btn = document.getElementById('tab-'+t);
      if(btn) btn.classList.toggle('active', t===sidebarTab);
    });
    if(sidebarTab==='scheda'){
      content.innerHTML = `
        <div class="hud-frame card" id="tamer-card"></div>
        <div class="hud-frame card" id="skills-card"></div>
        <div class="hud-frame card" id="digimon-card"></div>
      `;
      renderTamerCard(me);
      renderSkillsCard(me);
      renderDigimonCard(me);
    } else if(sidebarTab==='inventario'){
      content.innerHTML = `<div class="hud-frame card" id="inventory-card"></div>`;
      renderInventoryCard(me);
    } else if(sidebarTab==='wizard' && creationDraft){
      renderCreationWizard(me);
    } else {
      sidebarTab = 'scheda';
      renderSidebar(me);
    }
  }

    const cardEl = document.getElementById('dex-panel-card');
    if(!cardEl) return;
    cardEl.innerHTML = `
      <div class="section-title">Digidex — Digimon Incontrati</div>
      <div id="dex-live">${dexListHTML(cachedDex, canEdit)}</div>
      ${canEdit ? `

        <div class="row">
          <div class="field"><label>Stage</label>

  const SIZES = ['Small','Medium','Large','Huge','Gigantic','Colossal'];
  const SIZE_DEFS = {
    Small:    { ram:2, cpu:-1, bit:1 },
    Medium:   { ram:1, bit:1 },
    Large:    { cpu:1, bit:1 },
    Huge:     { cpu:1, dos:1 },
    Gigantic: { ram:-1, cpu:2, dos:1 },
    Colossal: { ram:-1, cpu:2, dos:1 }
  };
  function maxSizeIndexForStage(stage){ return Math.min(SIZES.length-1, stageIndex(stage)+1); }
  function allowedSizes(stage){ return SIZES.slice(0, maxSizeIndexForStage(stage)+1); }

  function stanceModifiers(d){
    const sv = stageIndex(d.stage);
    if(d.stance==='Offensive') return { accuracy: sv, dodge: -sv, damage:0, armor:0 };
    if(d.stance==='Defensive') return { accuracy: -sv, dodge: sv, damage:0, armor:0 };
    if(d.stance==='Fierce') return { accuracy:0, dodge:0, damage: sv, armor:0 };
    if(d.stance==='Brave') return { accuracy:0, dodge:0, damage:0, armor: sv };
    return { accuracy:0, dodge:0, damage:0, armor:0 };
  }

  function computeDerivedStats(d){
    const sizeMod = SIZE_DEFS[d.size] || {};
    return {
      bit: Math.max(0, Math.floor(Number(d.baseAccuracy||0)/3) + (sizeMod.bit||0)),
      dos: Math.max(0, Math.floor(Number(d.baseDamage||0)/3) + (sizeMod.dos||0)),
      ram: Math.max(0, Math.floor(Number(d.baseDodge||0)/3) + (sizeMod.ram||0)),
      cpu: Math.max(0, Math.floor(Number(d.baseArmor||0)/3) + (sizeMod.cpu||0))
    };
  }

  function evolutionsReadonlyHTML(evolutions){
    if(!evolutions || evolutions.length===0) return '';
    return `
      <div class="muted" style="margin-top:10px;margin-bottom:4px;">Possibili Evoluzioni</div>

          <div style="display:flex;flex-direction:column;align-items:center;width:56px;">

          </div>
        `).join('')}
      </div>
    `;
  }

  function evolutionsEditableHTML(evolutions){
    if(!evolutions || evolutions.length===0) return '<div class="muted" style="margin-bottom:8px;">Nessuna evoluzione aggiunta.</div>';
    return evolutions.map((ev,i)=>`
