<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digivice OS — Digimon: Digital Adventures 2E</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #080b10;
    --panel: #0e141b;
    --panel-2: #121a22;
    --line: #1c2a30;
    --cyan: #35e8c9;
    --cyan-dim: #1f6e63;
    --amber: #ff8a3d;
    --text: #dcece8;
    --text-mute: #6d8385;
    --danger: #ff5d5d;
    --radius: 2px;
    font-family: 'Manrope', sans-serif;
  }
  *{box-sizing:border-box;}
  body,#root-app{margin:0;padding:0;background:var(--bg);color:var(--text);}
  .mono{font-family:'Share Tech Mono', monospace; letter-spacing: 0.04em;}
  .app{min-height:100vh;background:
      radial-gradient(circle at 15% 10%, rgba(53,232,201,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,138,61,0.05), transparent 45%),
      var(--bg);
      padding:20px; position:relative; overflow-x:hidden;}
  .scanline{position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:overlay;}
  .hud-frame{border:1px solid var(--line); background:var(--panel); border-radius:var(--radius); position:relative;}
  .hud-frame::before{content:"";position:absolute;top:-1px;left:-1px;width:14px;height:14px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
  .hud-frame::after{content:"";position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;margin-bottom:18px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-dot{width:9px;height:9px;background:var(--cyan);box-shadow:0 0 8px var(--cyan);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .brand-title{font-size:13px;text-transform:uppercase;color:var(--cyan);}
  .brand-sub{font-size:11px;color:var(--text-mute);}
  .conn-ticker{font-size:11px;color:var(--text-mute);}
  .conn-ticker b{color:var(--cyan);}

  .btn{font-family:'Share Tech Mono',monospace;background:transparent;border:1px solid var(--cyan-dim);color:var(--cyan);
    padding:8px 14px;cursor:pointer;text-transform:uppercase;font-size:12px;letter-spacing:0.05em;border-radius:var(--radius);transition:.15s;}
  .btn:hover{background:rgba(53,232,201,0.1);border-color:var(--cyan);}
  .btn:disabled{opacity:0.35;cursor:not-allowed;}
  .btn.solid{background:var(--cyan);color:#04211c;border-color:var(--cyan);font-weight:700;}
  .btn.solid:hover{background:#4ffbe0;}
  .btn.amber{border-color:var(--amber);color:var(--amber);}
  .btn.amber:hover{background:rgba(255,138,61,0.12);}
  .btn.ghost{border-color:var(--line);color:var(--text-mute);}
  .btn.small{padding:5px 10px;font-size:10px;}

  input[type=text], input[type=number], textarea, select{
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 10px; font-family:'Manrope',sans-serif; font-size:13px; border-radius:var(--radius); width:100%;
  }
  input:focus, textarea:focus, select:focus{outline:none;border-color:var(--cyan-dim);}
  label{font-size:10px;text-transform:uppercase;color:var(--text-mute);letter-spacing:0.06em;display:block;margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .row{display:flex;gap:12px;}
  .row > *{flex:1;}
  .section-title{font-size:12px;text-transform:uppercase;color:var(--cyan);letter-spacing:0.08em;margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .card{padding:16px;margin-bottom:16px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .stat-box{text-align:center;padding:8px 4px;background:var(--panel-2);border:1px solid var(--line);}
  .stat-box .v{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--cyan);}
  .stat-box .l{font-size:9px;color:var(--text-mute);text-transform:uppercase;margin-top:2px;}
  .stat-box input{text-align:center;padding:4px;margin-top:4px;}

  .scene-box{position:relative; height:220px; border:1px solid var(--line); overflow:hidden; background:#05070a; margin-bottom:10px;}
  .scene-box img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.55;}
  .scene-box .overlay{position:absolute;inset:0;background:linear-gradient(180deg, rgba(8,11,16,0) 40%, rgba(8,11,16,0.9) 100%);}
  .scene-box .title{position:absolute;bottom:10px;left:14px;font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:16px;text-shadow:0 0 12px rgba(53,232,201,0.6);}
  .scene-box .portraits{position:absolute;bottom:10px;right:14px;display:flex;gap:6px;}
  .scene-box .portraits img{width:44px;height:44px;object-fit:cover;border:1px solid var(--cyan-dim);border-radius:50%;background:#000;}
  .scene-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-mute);font-size:12px;}

  .log{height:280px;overflow-y:auto;padding:10px;background:var(--panel-2);border:1px solid var(--line);font-size:13px;}
  .log-entry{margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.03);}
  .log-entry .who{font-family:'Share Tech Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.04em;}
  .log-entry.player .who{color:var(--cyan);}
  .log-entry.gm .who{color:var(--amber);}
  .log-entry.digimon .who{color:#c896ff;}
  .log-entry .txt{color:var(--text);margin-top:2px;line-height:1.4;}
  .log-entry .meta{font-size:10px;color:var(--text-mute);margin-left:8px;}

  .moves-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .move-btn{background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:10px;text-align:left;cursor:pointer;border-radius:var(--radius);}
  .move-btn:hover{border-color:var(--cyan-dim);}
  .move-btn .name{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--cyan);}
  .move-btn .desc{font-size:11px;color:var(--text-mute);margin-top:3px;}

  .login-wrap{max-width:420px;margin:60px auto;}
  .login-wrap h1{font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:22px;text-align:center;text-shadow:0 0 16px rgba(53,232,201,0.5);margin-bottom:4px;}
  .login-wrap .sub{text-align:center;color:var(--text-mute);font-size:12px;margin-bottom:28px;}
  .role-pick{display:flex;gap:10px;margin-bottom:16px;}
  .role-pick .btn{flex:1;}
  .role-pick .btn.active{background:rgba(53,232,201,0.12);border-color:var(--cyan);color:var(--cyan);}
  #tab-scheda.active, #tab-inventario.active, #tab-dex.active{background:rgba(53,232,201,0.12);border-color:var(--cyan);color:var(--cyan);}

  .roster-item{padding:10px;border-bottom:1px solid var(--line);font-size:12px;}
  .roster-item:last-child{border-bottom:none;}
  .roster-item .name{color:var(--cyan);font-family:'Share Tech Mono',monospace;}
  .roster-item .sub{color:var(--text-mute);}

  .suggest-box{background:var(--panel-2);border:1px solid var(--cyan-dim);padding:10px;margin-top:8px;font-size:12px;}
  .suggest-line{padding:6px 8px;margin-bottom:4px;background:rgba(53,232,201,0.05);cursor:pointer;border-radius:var(--radius);}
  .suggest-line:hover{background:rgba(53,232,201,0.12);}

  .tag{font-size:10px;padding:2px 8px;border:1px solid var(--line);color:var(--text-mute);border-radius:20px;text-transform:uppercase;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;}
  .muted{color:var(--text-mute);font-size:11px;}
  .err{color:var(--danger);font-size:11px;margin-top:6px;}
  .divider{height:1px;background:var(--line);margin:16px 0;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--cyan-dim);}

  .portrait{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--cyan-dim);background:#05070a;flex-shrink:0;}
  .portrait-sm{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--cyan-dim);background:#05070a;flex-shrink:0;}
  .sheet-head{display:flex;gap:12px;align-items:center;margin-bottom:14px;}
  .sheet-head .info{flex:1;}
  .sheet-head .nm{font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:15px;}
  .sheet-head .tg{font-size:11px;color:var(--text-mute);}

  .bar-row{margin-bottom:10px;}
  .bar-label{display:flex;justify-content:space-between;font-size:10px;text-transform:uppercase;color:var(--text-mute);margin-bottom:3px;letter-spacing:0.05em;}
  .bar-label .val{font-family:'Share Tech Mono',monospace;color:var(--text);}
  .bar-track{height:10px;background:var(--panel-2);border:1px solid var(--line);border-radius:20px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:20px;transition:width .3s;}
  .bar-fill.hp{background:linear-gradient(90deg, var(--cyan-dim), var(--cyan));}
  .bar-fill.mp{background:linear-gradient(90deg, #6b3fa0, #c896ff);}
  .bar-fill.low{background:linear-gradient(90deg, #8a2f2f, var(--danger));}
  .bar-controls{display:flex;gap:6px;align-items:center;margin-top:4px;}
  .bar-controls button{width:22px;height:22px;line-height:1;border:1px solid var(--line);background:var(--panel-2);color:var(--cyan);cursor:pointer;border-radius:3px;font-size:14px;}
  .bar-controls button:hover{border-color:var(--cyan-dim);}

  .view-mode .field-static{margin-bottom:10px;}
  .field-static label{margin-bottom:2px;}
  .field-static .v{font-size:13px;color:var(--text);}
  .toggle-edit-btn{width:100%;margin-top:4px;}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="root-app" class="app"></div>
<script>
(function(){
  const root = document.getElementById('root-app');
  let session = null;
  let pollTimer = null;
  let lastApiError = null;
  const ONLINE_WINDOW_MS = 9000;
  const SESSION_KEY = 'digivice_session_v1';

  let editingTamer = false;
  let editingDigimon = false;
  let editingScene = false;
  let sidebarTab = 'scheda';
  let cachedRoster = [];
  let cachedScene = { title:'', background:'', music:'' };
  let cachedLog = [];
  let cachedDex = [];

  // ---------- session persistence ----------
  function saveSession(s){ try{ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }catch(e){} }
  function loadSession(){ try{ const v = localStorage.getItem(SESSION_KEY); return v ? JSON.parse(v) : null; }catch(e){ return null; } }
  function clearSession(){ try{ localStorage.removeItem(SESSION_KEY); }catch(e){} }

  // ---------- API helpers ----------
  async function apiGet(path){
    try{
      const r = await fetch(path);
      const data = await r.json();
      if(!r.ok){ lastApiError = data.error || ('Errore ' + r.status); return null; }
      lastApiError = null;
      return data;
    }catch(e){ lastApiError = 'Errore di rete: ' + e.message; return null; }
  }
  async function apiPost(path, body){
    try{
      const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await r.json();
      if(!r.ok){ lastApiError = data.error || ('Errore ' + r.status); return null; }
      lastApiError = null;
      return data;
    }catch(e){ lastApiError = 'Errore di rete: ' + e.message; return null; }
  }
  async function apiPut(path, body){
    try{
      const r = await fetch(path, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await r.json();
      if(!r.ok){ lastApiError = data.error || ('Errore ' + r.status); return null; }
      lastApiError = null;
      return data;
    }catch(e){ lastApiError = 'Errore di rete: ' + e.message; return null; }
  }
  async function apiDelete(path){
    try{
      const r = await fetch(path, { method:'DELETE' });
      const data = await r.json();
      if(!r.ok){ lastApiError = data.error || ('Errore ' + r.status); return null; }
      lastApiError = null;
      return data;
    }catch(e){ lastApiError = 'Errore di rete: ' + e.message; return null; }
  }

  async function getRoster(code){ const d = await apiGet('/api/roster?code=' + encodeURIComponent(code)); return d ? (d.members||[]) : []; }
  async function saveMember(code, member){ const d = await apiPost('/api/roster', { code, member }); return !!(d && d.ok); }
  async function getScene(code){ const d = await apiGet('/api/scene?code=' + encodeURIComponent(code)); const s = d ? d.scene : { title:'', background:'', music:'', encounters:[] }; if(!Array.isArray(s.encounters)) s.encounters = []; return s; }
  async function saveScene(code, scene){ const d = await apiPost('/api/scene', { code, ...scene }); return !!(d && d.ok); }
  async function getLog(code){ const d = await apiGet('/api/log?code=' + encodeURIComponent(code)); return d ? (d.log||[]) : []; }
  async function pushLog(code, entry){ return apiPost('/api/log', { code, ...entry }); }
  async function editLogEntry(code, id, text){ return apiPut('/api/log', { code, id, text }); }
  async function deleteLogEntry(code, id){ return apiDelete('/api/log?code=' + encodeURIComponent(code) + '&id=' + encodeURIComponent(id)); }
  async function heartbeat(code, username){ return apiPost('/api/heartbeat', { code, username }); }
  async function getDex(code){ const d = await apiGet('/api/dex?code=' + encodeURIComponent(code)); return d ? (d.entries||[]) : []; }
  async function addDexEntry(code, entry){ return apiPost('/api/dex', { code, ...entry }); }
  async function updateDexEntry(code, id, fields){ return apiPut('/api/dex', { code, id, ...fields }); }
  async function correggiItaliano(testo){ const d = await apiPost('/api/ai-correct', { text: testo }); return d && d.corrected ? d.corrected : testo; }
  async function suggerisciBattute(digimonName, personality, contesto){ const d = await apiPost('/api/ai-suggest', { digimonName, personality, context: contesto }); return d && d.lines ? d.lines : ['(errore nel generare suggerimenti, riprova)']; }

  function sanitizeKeyPart(s){ return String(s||'').trim().toUpperCase().replace(/[^A-Z0-9_-]/g, '').slice(0, 48); }

  const SKILL_DEFS = [
    { key:'evade', label:'Evade', attrs:['agility','willpower'] },
    { key:'precision', label:'Precision', attrs:['agility','intelligence'] },
    { key:'stealth', label:'Stealth', attrs:['agility','body'] },
    { key:'athletics', label:'Athletics', attrs:['body','agility'] },
    { key:'endurance', label:'Endurance', attrs:['body','willpower'] },
    { key:'featsOfStrength', label:'Feats of Strength', attrs:['body','charisma'] },
    { key:'manipulate', label:'Manipulate', attrs:['charisma','body'] },
    { key:'perform', label:'Perform', attrs:['charisma','agility'] },
    { key:'persuasion', label:'Persuasion', attrs:['charisma','intelligence'] },
    { key:'decipherIntent', label:'Decipher Intent', attrs:['intelligence','charisma'] },
    { key:'survival', label:'Survival', attrs:['intelligence','willpower'] },
    { key:'knowledge', label:'Knowledge', attrs:['intelligence'] },
    { key:'fortitude', label:'Fortitude', attrs:['willpower','intelligence'] },
    { key:'bravery', label:'Bravery', attrs:['willpower','body'] },
    { key:'awareness', label:'Awareness', attrs:['willpower','agility'] }
  ];

  function defaultSkills(){
    const s = {};
    SKILL_DEFS.forEach(sk=>{ s[sk.key] = 0; });
    return s;
  }
  function skillMax(t, def){
    return Math.max(...def.attrs.map(a=>Number(t[a])||0));
  }

  function defaultTamer(){
    return { agility:1, body:1, charisma:1, intelligence:1, willpower:1, imageUrl:'', currentWounds:null, inventory:[], skills: defaultSkills() };
  }
  function defaultDigimon(){
    return {
      name:'', stage:'Rookie', personality:'', imageUrl:'',
      maxWounds:5, currentWounds:5, maxMp:3, currentMp:3,
      baseAccuracy:1, baseDamage:1, baseDodge:1, baseArmor:1, baseHealth:1,
      evolutions:[],
      moves:[
        {name:'Attacco Base', desc:'Colpo fisico standard.'},
        {name:'Mossa Speciale', desc:'Consuma MP, usa Intelligenza.'},
        {name:'Difenditi', desc:'Postura difensiva, nessun costo.'},
        {name:'Muoviti', desc:'Riposiziona sul campo.'}
      ]
    };
  }
  function normalizeMember(m){
    m.tamer = Object.assign(defaultTamer(), m.tamer||{});
    if(!m.tamer.skills) m.tamer.skills = defaultSkills();
    m.tamer.skills = Object.assign(defaultSkills(), m.tamer.skills);
    if(m.tamer._legacyEndurance===undefined && m.tamer.endurance!==undefined && !m.tamer.skills.endurance){
      m.tamer.skills.endurance = Number(m.tamer.endurance)||0;
    }
    if(m.tamer.currentWounds===null || m.tamer.currentWounds===undefined) m.tamer.currentWounds = 3+Number(m.tamer.skills.endurance||0);
    if(!Array.isArray(m.tamer.inventory)) m.tamer.inventory = [];
    m.digimon = Object.assign(defaultDigimon(), m.digimon||{});
    if(!m.digimon.moves || !m.digimon.moves.length) m.digimon.moves = defaultDigimon().moves;
    return m;
  }

  function render(){
    if(!session){ renderLogin(); }
    else if(session.role==='master'){ renderMaster(); }
    else { renderPlayer(); }
  }

  function topbar(subtitle){
    return `
    <div class="hud-frame topbar">
      <div class="brand">
        <div class="brand-dot"></div>
        <div>
          <div class="brand-title mono">Digivice OS // ${subtitle}</div>
          <div class="brand-sub">Digimon: Digital Adventures — Tavolo Testuale</div>
        </div>
      </div>
      <div class="conn-ticker mono">
        CAMPAGNA <b>${session ? session.code : '---'}</b> &nbsp;|&nbsp; UTENTE <b>${session ? session.username : '---'}</b>
        ${session ? `&nbsp;<button class="btn ghost small" id="btn-logout" style="margin-left:10px;">Esci</button>` : ''}
      </div>
    </div>
    ${lastApiError ? `<div class="hud-frame" style="border-color:var(--danger);padding:8px 14px;margin-bottom:16px;color:var(--danger);font-size:12px;">⚠ ${escapeHTML(lastApiError)}</div>` : ''}`;
  }

  // ---------- LOGIN ----------
  function renderLogin(){
    root.innerHTML = `
      <div class="login-wrap hud-frame" style="padding:32px;">
        <h1 class="mono">DIGIVICE // ACCESSO</h1>
        <div class="sub">Tavolo testuale multi-utente — inserisci un codice campagna condiviso</div>
        <div class="field"><label>Codice Campagna</label><input type="text" id="in-code" placeholder="es. FRONTIER01" /></div>
        <div class="field"><label>Nome Utente</label><input type="text" id="in-user" placeholder="il tuo nome al tavolo" /></div>
        <div class="field">
          <label>Ruolo</label>
          <div class="role-pick">
            <button class="btn active" id="role-player" data-role="player">Giocatore</button>
            <button class="btn" id="role-master" data-role="master">Master</button>
          </div>
        </div>
        <button class="btn solid" id="btn-enter" style="width:100%;padding:12px;">Entra nel Digital World</button>
        <div class="err" id="login-err"></div>
      </div>
    `;
    let role = 'player';
    document.getElementById('role-player').onclick = ()=>{ role='player'; document.getElementById('role-player').classList.add('active'); document.getElementById('role-master').classList.remove('active'); };
    document.getElementById('role-master').onclick = ()=>{ role='master'; document.getElementById('role-master').classList.add('active'); document.getElementById('role-player').classList.remove('active'); };

    document.getElementById('btn-enter').onclick = async ()=>{
      const code = sanitizeKeyPart(document.getElementById('in-code').value);
      const username = document.getElementById('in-user').value.trim();
      const errEl = document.getElementById('login-err');
      if(!code || !username){ errEl.textContent = 'Inserisci sia il codice campagna che il nome utente.'; return; }

      const roster = await getRoster(code);
      const existing = roster.find(m=>m.username===username);
      const member = normalizeMember(existing || { username, role });
      member.role = role;

      const ok = await saveMember(code, member);
      if(!ok){ errEl.textContent = 'Impossibile collegarsi al server: ' + (lastApiError || 'errore sconosciuto'); return; }
      session = { code, username, role };
      saveSession(session);
      editingTamer = false; editingDigimon = false; editingScene = false;
      startPolling();
      render();
    };
  }

  function logout(){
    if(pollTimer) clearInterval(pollTimer);
    session = null;
    clearSession();
    render();
  }

  function startPolling(){
    if(pollTimer) clearInterval(pollTimer);
    heartbeat(session.code, session.username);
    refreshLiveParts();
    pollTimer = setInterval(async ()=>{
      if(session) await heartbeat(session.code, session.username);
      refreshLiveParts();
    }, 4000);
  }

  function onlineSummary(members){
    const online = (members||[]).filter(m=>m.last_seen && (Date.now()-new Date(m.last_seen).getTime())<ONLINE_WINDOW_MS);
    if(online.length===0) return 'nessun altro online';
    return online.map(m=>`${m.username}${m.role==='master'?' (Master)':''}`).join(', ') + ' online';
  }

  // ---------- LIVE PARTS (updated by polling, never touch forms) ----------
  async function refreshLiveParts(){
    if(!session) return;
    cachedRoster = (await getRoster(session.code)).map(normalizeMember);
    cachedScene = await getScene(session.code);
    cachedLog = await getLog(session.code);
    cachedDex = await getDex(session.code);

    const sceneLive = document.getElementById('scene-live');
    if(sceneLive){
      sceneLive.innerHTML = `<div class="muted mono" style="margin-bottom:8px;">${onlineSummary(cachedRoster)}</div>` + sceneHTML(cachedScene);
    }
    const logLive = document.getElementById('log-live');
    if(logLive){
      const wasAtBottom = logLive.scrollHeight - logLive.scrollTop <= logLive.clientHeight + 40;
      logLive.innerHTML = logHTML(cachedLog, session && session.role==='master');
      if(wasAtBottom) logLive.scrollTop = logLive.scrollHeight;
    }
    const rosterLive = document.getElementById('roster-live');
    if(rosterLive && session.role==='master' && openManageIdx===null){
      const players = cachedRoster.filter(m=>m.role==='player');
      rosterLive.innerHTML = players.length===0
        ? '<div class="muted">Nessun giocatore ha ancora effettuato l\'accesso a questa campagna.</div>'
        : players.map((p,i)=>rosterItemHTML(p,i)).join('');
      bindRosterSuggestButtons(players);
      bindRosterManageButtons(players);
    }
    const dexLive = document.getElementById('dex-live');
    if(dexLive){ dexLive.innerHTML = dexListHTML(cachedDex, session.role==='master'); if(session.role==='master') bindDexEditButtons(session.code); }
    const errBanner = document.getElementById('api-err-banner');
    if(errBanner) errBanner.outerHTML = lastApiError ? `<div id="api-err-banner" class="hud-frame" style="border-color:var(--danger);padding:8px 14px;margin-bottom:16px;color:var(--danger);font-size:12px;">⚠ ${escapeHTML(lastApiError)}</div>` : '<div id="api-err-banner"></div>';
  }

  function bindRosterSuggestButtons(players){
    players.forEach((p,i)=>{
      const btn = document.getElementById('btn-suggest-'+i);
      if(btn && !btn.dataset.bound){
        btn.dataset.bound = '1';
        btn.onclick = async ()=>{
          btn.disabled = true; btn.textContent = 'Generando...';
          const contesto = cachedLog.slice(-6).map(l=>`${l.who}: ${l.text}`).join('\n');
          const lines = await suggerisciBattute(p.digimon.name || 'Digimon', p.digimon.personality, contesto);
          const box = document.getElementById('suggest-box-'+i);
          if(box){
            box.innerHTML = lines.map(l=>`<div class="suggest-line" data-line="${escapeAttr(l)}">${escapeHTML(l)}</div>`).join('');
            box.style.display = 'block';
            box.querySelectorAll('.suggest-line').forEach(el=>{
              el.onclick = async ()=>{
                await pushLog(session.code, { who: p.digimon.name || 'Digimon', role:'digimon', text: el.getAttribute('data-line') });
                refreshLiveParts();
              };
            });
          }
          btn.disabled = false; btn.textContent = 'Suggerisci Battuta';
        };
      }
    });
  }

  // ---------- bars ----------
  function barHTML(label, current, max, kind, onMinusId, onPlusId){
    const pct = max>0 ? Math.max(0, Math.min(100, (current/max)*100)) : 0;
    const low = pct <= 25;
    return `
      <div class="bar-row">
        <div class="bar-label"><span>${label}</span><span class="val">${current} / ${max}</span></div>
        <div class="bar-track"><div class="bar-fill ${low?'low':kind}" style="width:${pct}%;"></div></div>
        <div class="bar-controls">
          <button id="${onMinusId}">−</button>
          <button id="${onPlusId}">+</button>
        </div>
      </div>
    `;
  }

  function portraitHTML(imageUrl, name, size){
    const cls = size==='sm' ? 'portrait-sm' : 'portrait';
    if(imageUrl){
      return `<img class="${cls}" src="${escapeAttr(imageUrl)}" onerror="this.style.visibility='hidden'" />`;
    }
    const initial = (name||'?').trim().charAt(0).toUpperCase() || '?';
    return `<div class="${cls}" style="display:flex;align-items:center;justify-content:center;color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:${size==='sm'?'14px':'20px'};">${initial}</div>`;
  }

  function dexListHTML(entries, canEdit){
    if(!entries || entries.length===0) return '<div class="muted">Nessun Digimon ancora registrato nel Dex.</div>';
    return entries.slice().reverse().map(e=>{
      const bs = e.base_stats || {};
      const hasStats = bs.baseAccuracy || bs.baseDamage || bs.baseDodge || bs.baseArmor || bs.baseHealth;
      return `
      <div class="roster-item" id="dex-item-${e.id}">
        <div style="display:flex;gap:10px;align-items:flex-start;">
          ${portraitHTML(e.image_url, e.name, 'sm')}
          <div style="flex:1;">
            <div class="flex-between">
              <div><span class="name">${escapeHTML(e.name)}</span><span class="tag" style="margin-left:6px;">${escapeHTML(e.stage)}</span></div>
              ${canEdit ? `<button class="btn ghost small" data-dex-edit="${e.id}">Modifica</button>` : ''}
            </div>
            ${e.description ? `<div class="sub" style="margin-top:3px;">${escapeHTML(e.description)}</div>` : ''}
            ${hasStats ? `<div class="muted" style="margin-top:4px;font-size:10px;">ACC ${bs.baseAccuracy||0} · DMG ${bs.baseDamage||0} · DODGE ${bs.baseDodge||0} · ARM ${bs.baseArmor||0} · HP ${bs.baseHealth||0}</div>` : ''}
            ${e.evolutions && e.evolutions.length ? evolutionsReadonlyHTML(e.evolutions) : ''}
            ${e.added_by ? `<div class="muted" style="margin-top:2px;">aggiunto da ${escapeHTML(e.added_by)}</div>` : ''}
          </div>
        </div>
        <div id="dex-edit-form-${e.id}"></div>
      </div>
    `;
    }).join('');
  }

      </div>
      <div class="muted" id="dex-e-status-${entry.id}" style="margin-top:6px;"></div>
    `;
    const bindEvo = ()=>{
      document.querySelectorAll(`#dex-e-evolist-${entry.id} [data-rmevo]`).forEach(btn=>{
        btn.onclick = ()=>{
          localEvo.splice(Number(btn.getAttribute('data-rmevo')),1);
          document.getElementById('dex-e-evolist-'+entry.id).innerHTML = evolutionsEditableHTML(localEvo);
          bindEvo();
        };
      });
    };
    bindEvo();
    document.getElementById('dex-e-evoadd-'+entry.id).onclick = ()=>{
      const n = document.getElementById('dex-e-evoname-'+entry.id).value.trim();
      if(!n) return;
      localEvo.push({ name:n, imageUrl: document.getElementById('dex-e-evoimg-'+entry.id).value.trim() });
      document.getElementById('dex-e-evoname-'+entry.id).value='';
      document.getElementById('dex-e-evoimg-'+entry.id).value='';
      document.getElementById('dex-e-evolist-'+entry.id).innerHTML = evolutionsEditableHTML(localEvo);
      bindEvo();
    };
    document.getElementById('dex-e-cancel-'+entry.id).onclick = ()=>{ el.innerHTML=''; };
    document.getElementById('dex-e-save-'+entry.id).onclick = async ()=>{
      const fields = {
        name: document.getElementById('dex-e-name-'+entry.id).value.trim(),
        stage: document.getElementById('dex-e-stage-'+entry.id).value,
        description: document.getElementById('dex-e-desc-'+entry.id).value.trim(),
        imageUrl: document.getElementById('dex-e-img-'+entry.id).value.trim(),
        baseStats: {
          baseAccuracy: Number(document.getElementById('dex-e-acc-'+entry.id).value)||0,
          baseDamage: Number(document.getElementById('dex-e-dmg-'+entry.id).value)||0,
          baseDodge: Number(document.getElementById('dex-e-dodge-'+entry.id).value)||0,
          baseArmor: Number(document.getElementById('dex-e-arm-'+entry.id).value)||0,
          baseHealth: Number(document.getElementById('dex-e-hp-'+entry.id).value)||0
        },
        evolutions: localEvo
      };
      const ok = await updateDexEntry(code, entry.id, fields);
      const st = document.getElementById('dex-e-status-'+entry.id);
      if(ok){
        Object.assign(entry, { name:fields.name, stage:fields.stage, description:fields.description, image_url:fields.imageUrl, base_stats:fields.baseStats, evolutions:fields.evolutions });
        el.innerHTML='';
        const dexLive = document.getElementById('dex-live');
        if(dexLive){ dexLive.innerHTML = dexListHTML(cachedDex, true); bindDexEditButtons(code); }
      } else {
        st.style.color='var(--danger)'; st.textContent = 'Errore: ' + (lastApiError||'');
      }
    };
  }

  function bindDexEditButtons(code){
    document.querySelectorAll('[data-dex-edit]').forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute('data-dex-edit');
        const entry = cachedDex.find(e=>String(e.id)===String(id));
        if(entry) renderDexEditForm(code, entry);

  function bindDexForm(code, username){
    const btn = document.getElementById('btn-dex-add');
    if(!btn) return;
    btn.onclick = async ()=>{
      const name = document.getElementById('dex-name').value.trim();
      const stage = document.getElementById('dex-stage').value;
      const description = document.getElementById('dex-desc').value.trim();
      const imageUrl = document.getElementById('dex-img').value.trim();
      const statusEl = document.getElementById('dex-status');
      if(!name){ statusEl.style.color='var(--danger)'; statusEl.textContent = 'Serve almeno un nome.'; return; }
      const d = await addDexEntry(code, { name, stage, description, imageUrl, addedBy: username });
      if(d && d.entry){
        statusEl.style.color = 'var(--text-mute)';
        statusEl.textContent = 'Aggiunto al Dex.';
        document.getElementById('dex-name').value='';
        document.getElementById('dex-desc').value='';
        document.getElementById('dex-img').value='';
        cachedDex.push(d.entry);
        const dexLive = document.getElementById('dex-live');

      } else {
        statusEl.style.color = 'var(--danger)';
        statusEl.textContent = 'Errore: ' + (lastApiError || 'sconosciuto');
      }
    };
  }

  const ATTR_ABBR = { agility:'AGI', body:'BODY', charisma:'CAR', intelligence:'INT', willpower:'WILL' };
  let editingSkills = false;

  function renderSkillsCard(me, containerId){
    containerId = containerId || 'skills-card';
    const cardEl = document.getElementById(containerId);
    if(!cardEl) return;
    const t = me.tamer;
    if(!editingSkills){
      cardEl.innerHTML = `
        <div class="flex-between"><div class="section-title" style="margin:0;border:none;padding:0;">Skill</div>
        <button class="btn small" id="btn-edit-skills">Modifica</button></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;">
          ${SKILL_DEFS.map(def=>`
            <div class="stat-box" style="text-align:left;padding:6px 8px;">
              <div class="l" style="margin-bottom:2px;">${escapeHTML(def.label)}</div>
              <div style="display:flex;justify-content:space-between;align-items:baseline;">
                <span class="v" style="font-size:15px;">${Number(t.skills[def.key])||0}</span>
                <span class="muted" style="font-size:9px;">${def.attrs.map(a=>ATTR_ABBR[a]).join('/')}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('btn-edit-skills').onclick = ()=>{ editingSkills = true; renderSkillsCard(me); };
    } else {
      cardEl.innerHTML = `
        <div class="section-title">Skill — Modifica</div>
        <div class="muted" style="margin-bottom:10px;">Una Skill non può superare il valore più alto tra i suoi Attributi collegati.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${SKILL_DEFS.map(def=>{
            const max = skillMax(t, def);
            return `
            <div class="field" style="margin-bottom:6px;">
              <label>${escapeHTML(def.label)} <span class="muted">(max ${max}, ${def.attrs.map(a=>ATTR_ABBR[a]).join('/')})</span></label>
              <input type="number" min="0" max="${max}" id="e-sk-${def.key}" value="${Number(t.skills[def.key])||0}" />
            </div>`;
          }).join('')}
        </div>
        <div class="row" style="margin-top:10px;">
          <button class="btn ghost" id="btn-cancel-skills">Annulla</button>
          <button class="btn solid" id="btn-save-skills">Salva</button>
        </div>
        <div class="muted" id="save-status-skills" style="margin-top:6px;"></div>
      `;
      document.getElementById('btn-cancel-skills').onclick = ()=>{ editingSkills = false; renderSkillsCard(me); };
      document.getElementById('btn-save-skills').onclick = async ()=>{
        SKILL_DEFS.forEach(def=>{
          const el = document.getElementById('e-sk-'+def.key);
          if(!el) return;
          const max = skillMax(t, def);
          let val = Number(el.value)||0;
          if(val > max) val = max;
          if(val < 0) val = 0;
          me.tamer.skills[def.key] = val;
        });
        const newMaxWounds = 3+Number(me.tamer.skills.endurance||0);
        if(me.tamer.currentWounds > newMaxWounds) me.tamer.currentWounds = newMaxWounds;
        const ok = await saveMember(session.code, me);
        const st = document.getElementById('save-status-skills');
        st.style.color = ok ? 'var(--text-mute)' : 'var(--danger)';
        st.textContent = ok ? 'Salvato.' : ('Errore: '+(lastApiError||''));
        if(ok){ editingSkills = false; renderSkillsCard(me); renderTamerCard(me); }
      };
    }
  }

        <div class="muted" id="save-status-tamer" style="margin-top:6px;"></div>
      `;
      document.getElementById('btn-cancel-tamer').onclick = ()=>{ editingTamer = false; renderTamerCard(me); };
      document.getElementById('btn-save-tamer').onclick = async ()=>{

          const el = document.getElementById('e-t-'+k);
          if(el) me.tamer[k] = Number(el.value)||0;
        });

        SKILL_DEFS.forEach(def=>{
          const max = skillMax(me.tamer, def);
          const cur = Number(me.tamer.skills[def.key])||0;
          if(cur > max) me.tamer.skills[def.key] = max;
        });
        const newMax = 3+Number(me.tamer.skills.endurance||0);
        if(me.tamer.currentWounds > newMax) me.tamer.currentWounds = newMax;
        const ok = await saveMember(session.code, me);
        const st = document.getElementById('save-status-tamer');
        st.style.color = ok ? 'var(--text-mute)' : 'var(--danger)';
        st.textContent = ok ? 'Salvato.' : ('Errore: '+(lastApiError||''));
        if(ok){ editingTamer = false; renderTamerCard(me); renderSkillsCard(me); }
      };
    }
  }

    `;

      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-remove-item'));

        await saveMember(session.code, me);
        renderInventoryCard(me);
      };
    });

      const name = document.getElementById('inv-name').value.trim();
      if(!name) return;
      const qty = Number(document.getElementById('inv-qty').value)||1;
      const desc = document.getElementById('inv-desc').value.trim();
      me.tamer.inventory.push({ name, qty, desc });
      await saveMember(session.code, me);

  function renderSidebar(me){
    const content = document.getElementById('sidebar-content');
    if(!content) return;
    ['scheda','inventario','dex'].forEach(t=>{
      const btn = document.getElementById('tab-'+t);
      if(btn) btn.classList.toggle('active', t===sidebarTab);
    });
    if(sidebarTab==='scheda'){
      content.innerHTML = `
        <div class="hud-frame card" id="tamer-card"></div>
        <div class="hud-frame card" id="skills-card"></div>
        <div class="hud-frame card" id="digimon-card"></div>
      `;
      renderTamerCard(me);
      renderSkillsCard(me);
      renderDigimonCard(me);
    } else if(sidebarTab==='inventario'){
      content.innerHTML = `<div class="hud-frame card" id="inventory-card"></div>`;
      renderInventoryCard(me);

      content.innerHTML = `<div class="hud-frame card" id="dex-panel-card"></div>`;

  function computeDerivedStats(d){
    return {
      bit: Math.max(0, Math.floor(Number(d.baseAccuracy||0)/3)),
      dos: Math.max(0, Math.floor(Number(d.baseDamage||0)/3)),
      ram: Math.max(0, Math.floor(Number(d.baseDodge||0)/3)),
      cpu: Math.max(0, Math.floor(Number(d.baseArmor||0)/3))
    };
  }

  function evolutionsReadonlyHTML(evolutions){
    if(!evolutions || evolutions.length===0) return '';
    return `
      <div class="muted" style="margin-top:10px;margin-bottom:4px;">Possibili Evoluzioni</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${evolutions.map(ev=>`
          <div style="display:flex;flex-direction:column;align-items:center;width:56px;">
            ${portraitHTML(ev.imageUrl, ev.name, 'sm')}
            <div class="muted" style="font-size:10px;text-align:center;margin-top:2px;">${escapeHTML(ev.name)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function evolutionsEditableHTML(evolutions){
    if(!evolutions || evolutions.length===0) return '<div class="muted" style="margin-bottom:8px;">Nessuna evoluzione aggiunta.</div>';
    return evolutions.map((ev,i)=>`
      <div class="flex-between" style="margin-bottom:4px;">
        <span>${escapeHTML(ev.name)}</span>
        <button class="btn ghost small" data-rmevo="${i}">Rimuovi</button>
      </div>
    `).join('');
  }

  function renderDigimonCard(me, containerId){

    const d = me.digimon;
    const der = computeDerivedStats(d);
    if(!editingDigimon){
      cardEl.innerHTML = `
        <div class="flex-between"><div class="section-title" style="margin:0;border:none;padding:0;">Scheda Digimon</div>
        <button class="btn small" id="btn-edit-digimon-${containerId}">Modifica</button></div>
        <div class="sheet-head" style="margin-top:12px;">
          ${portraitHTML(d.imageUrl, d.name)}
          <div class="info"><div class="nm">${escapeHTML(d.name||'(senza nome)')}</div><div class="tg">${escapeHTML(d.stage)}</div></div>
        </div>
        ${barHTML('Caselle Ferita', d.currentWounds, d.maxWounds, 'hp', 'dig-w-minus-'+containerId, 'dig-w-plus-'+containerId)}
        ${barHTML('MP', d.currentMp, d.maxMp, 'mp', 'dig-mp-minus-'+containerId, 'dig-mp-plus-'+containerId)}
        ${d.personality ? `<div class="muted" style="margin-top:8px;"><i>${escapeHTML(d.personality)}</i></div>` : ''}
        <div class="divider"></div>
        <div class="muted" style="margin-bottom:6px;">Stat Base (Combattimento)</div>
        <div class="grid-stats" style="grid-template-columns:repeat(5,1fr);">

          <div class="stat-box"><div class="v">${d.baseDamage}</div><div class="l">DMG</div></div>
          <div class="stat-box"><div class="v">${d.baseDodge}</div><div class="l">DODGE</div></div>
          <div class="stat-box"><div class="v">${d.baseArmor}</div><div class="l">ARM</div></div>
          <div class="stat-box"><div class="v">${d.baseHealth}</div><div class="l">HP</div></div>
        </div>
        <div class="muted" style="margin:8px 0 6px;">Stat Derivate (calcolate)</div>
        <div class="grid-stats" style="grid-template-columns:repeat(4,1fr);">
          <div class="stat-box"><div class="v">${der.bit}</div><div class="l">BIT</div></div>

          <div class="stat-box"><div class="v">${der.ram}</div><div class="l">RAM</div></div>

      document.getElementById('dig-w-minus-'+containerId).onclick = async ()=>{ me.digimon.currentWounds = Math.max(0, me.digimon.currentWounds-1); await saveMember(session.code, me); renderDigimonCard(me, containerId); };
      document.getElementById('dig-w-plus-'+containerId).onclick = async ()=>{ me.digimon.currentWounds = Math.min(me.digimon.maxWounds, me.digimon.currentWounds+1); await saveMember(session.code, me); renderDigimonCard(me, containerId); };
      document.getElementById('dig-mp-minus-'+containerId).onclick = async ()=>{ me.digimon.currentMp = Math.max(0, me.digimon.currentMp-1); await saveMember(session.code, me); renderDigimonCard(me, containerId); };
      document.getElementById('dig-mp-plus-'+containerId).onclick = async ()=>{ me.digimon.currentMp = Math.min(me.digimon.maxMp, me.digimon.currentMp+1); await saveMember(session.code, me); renderDigimonCard(me, containerId); };
    } else {
      cardEl.innerHTML = `
        <div class="section-title">Scheda Digimon — Modifica</div>
        <div class="field"><label>Nome</label><input type="text" id="e-d-name-${containerId}" value="${escapeAttr(d.name)}" /></div>
        <div class="field"><label>URL Immagine (opzionale)</label><input type="text" id="e-d-img-${containerId}" value="${escapeAttr(d.imageUrl)}" placeholder="https://..." /></div>
        <div class="field"><label>Stage</label>
          <select id="e-d-stage-${containerId}">${['Baby','Rookie','Champion','Ultimate','Mega'].map(s=>`<option ${d.stage===s?'selected':''}>${s}</option>`).join('')}</select>
        </div>
        <div class="row">
          <div class="field"><label>Ferite Massime</label><input type="number" id="e-d-maxw-${containerId}" value="${d.maxWounds}" /></div>
          <div class="field"><label>MP Massimi</label><input type="number" id="e-d-maxmp-${containerId}" value="${d.maxMp}" /></div>
        </div>
        <div class="field"><label>Personalità (usata dal Master per le battute)</label><textarea id="e-d-personality-${containerId}" rows="3">${escapeHTML(d.personality)}</textarea></div>
        <div class="divider"></div>
        <div class="muted" style="margin-bottom:6px;">Stat Base (Combattimento) — le Stat Derivate (BIT/DOS/RAM/CPU) si calcolano da sole</div>
        <div class="row">
          <div class="field"><label>Accuracy</label><input type="number" id="e-d-acc-${containerId}" value="${d.baseAccuracy}" min="0" /></div>

        <div id="evo-list-${containerId}">${evolutionsEditableHTML(d.evolutions)}</div>

          <input type="text" id="e-d-evo-name-${containerId}" placeholder="Nome evoluzione" style="flex:2;" />
          <input type="text" id="e-d-evo-img-${containerId}" placeholder="URL immagine (opz.)" style="flex:2;" />
          <button class="btn small" id="btn-add-evo-${containerId}" style="flex:1;">Aggiungi</button>
        </div>
        <div class="row" style="margin-top:10px;">
          <button class="btn ghost" id="btn-cancel-digimon-${containerId}">Annulla</button>
          <button class="btn solid" id="btn-save-digimon-${containerId}">Salva</button>
        </div>
        <div class="muted" id="save-status-digimon-${containerId}" style="margin-top:6px;"></div>
      `;
      const bindEvoRemove = ()=>{
        document.querySelectorAll(`#evo-list-${containerId} [data-rmevo]`).forEach(btn=>{
          btn.onclick = ()=>{
            const idx = Number(btn.getAttribute('data-rmevo'));
            d.evolutions.splice(idx,1);
            document.getElementById('evo-list-'+containerId).innerHTML = evolutionsEditableHTML(d.evolutions);
            bindEvoRemove();
          };
        });
      };
      bindEvoRemove();
      document.getElementById('btn-add-evo-'+containerId).onclick = ()=>{
        const nameEl = document.getElementById('e-d-evo-name-'+containerId);
        const imgEl = document.getElementById('e-d-evo-img-'+containerId);
        const name = nameEl.value.trim();
        if(!name) return;
        if(!d.evolutions) d.evolutions = [];
        d.evolutions.push({ name, imageUrl: imgEl.value.trim() });
        nameEl.value=''; imgEl.value='';
        document.getElementById('evo-list-'+containerId).innerHTML = evolutionsEditableHTML(d.evolutions);
        bindEvoRemove();
      };
      document.getElementById('btn-cancel-digimon-'+containerId).onclick = ()=>{ editingDigimon = false; renderDigimonCard(me, containerId); };
      document.getElementById('btn-save-digimon-'+containerId).onclick = async ()=>{
        me.digimon.name = document.getElementById('e-d-name-'+containerId).value;
        me.digimon.imageUrl = document.getElementById('e-d-img-'+containerId).value.trim();
        me.digimon.stage = document.getElementById('e-d-stage-'+containerId).value;
        me.digimon.maxWounds = Number(document.getElementById('e-d-maxw-'+containerId).value)||1;
        me.digimon.maxMp = Number(document.getElementById('e-d-maxmp-'+containerId).value)||0;
        me.digimon.personality = document.getElementById('e-d-personality-'+containerId).value;
        me.digimon.baseAccuracy = Number(document.getElementById('e-d-acc-'+containerId).value)||0;
        me.digimon.baseDamage = Number(document.getElementById('e-d-dmg-'+containerId).value)||0;
        me.digimon.baseDodge = Number(document.getElementById('e-d-dodge-'+containerId).value)||0;
        me.digimon.baseArmor = Number(document.getElementById('e-d-arm-'+containerId).value)||0;
        me.digimon.baseHealth = Number(document.getElementById('e-d-hp-'+containerId).value)||0;
        me.digimon.evolutions = d.evolutions || [];
        if(me.digimon.currentWounds > me.digimon.maxWounds) me.digimon.currentWounds = me.digimon.maxWounds;
        if(me.digimon.currentMp > me.digimon.maxMp) me.digimon.currentMp = me.digimon.maxMp;
        const ok = await saveMember(session.code, me);
        const st = document.getElementById('save-status-digimon-'+containerId);
        st.style.color = ok ? 'var(--text-mute)' : 'var(--danger)';
        st.textContent = ok ? 'Salvato.' : ('Errore: '+(lastApiError||''));
        if(ok){ editingDigimon = false; renderDigimonCard(me, containerId); }
      };
    }
  }

            <div class="row">
              <div class="field"><label>Stage</label>

  let openManageIdx = null;

  function bindRosterManageButtons(players){
    players.forEach((p,i)=>{
      const btn = document.getElementById('btn-manage-'+i);
      if(!btn) return;
      btn.onclick = ()=>{
        const panel = document.getElementById('manage-panel-'+i);
        if(!panel) return;
        if(openManageIdx === i){
          panel.style.display = 'none';
          panel.innerHTML = '';
          openManageIdx = null;
          btn.textContent = 'Gestisci Scheda';
          return;
        }
        if(openManageIdx !== null){
          const prevPanel = document.getElementById('manage-panel-'+openManageIdx);
          const prevBtn = document.getElementById('btn-manage-'+openManageIdx);
          if(prevPanel){ prevPanel.style.display='none'; prevPanel.innerHTML=''; }
          if(prevBtn) prevBtn.textContent = 'Gestisci Scheda';
        }
        editingTamer = false; editingSkills = false; editingDigimon = false;
        openManageIdx = i;
        btn.textContent = 'Chiudi Scheda';
        panel.style.display = 'block';
        panel.innerHTML = `
          <div class="hud-frame card" id="m-tamer-${i}"></div>
          <div class="hud-frame card" id="m-skills-${i}"></div>
          <div class="hud-frame card" id="m-inventory-${i}"></div>
          <div class="hud-frame card" id="m-digimon-${i}"></div>
        `;
        renderTamerCard(p, 'm-tamer-'+i);
        renderSkillsCard(p, 'm-skills-'+i);
        renderInventoryCard(p, 'm-inventory-'+i);
        renderDigimonCard(p, 'm-digimon-'+i);
      };
    });
  }

  }

  function sceneHTML(scene){
    if(!scene || (!scene.background && !scene.title)){
      return `<div class="scene-box"><div class="scene-empty">Nessuna scena impostata dal Master</div></div>` + encountersReadonlyHTML(scene);
    }
    return `
      <div class="scene-box">
        ${scene.background ? `<img class="bg" src="${escapeAttr(scene.background)}" onerror="this.style.display='none'" />` : ''}
        <div class="overlay"></div>
        ${scene.title ? `<div class="title">${escapeHTML(scene.title)}</div>` : ''}
      </div>
    ` + encountersReadonlyHTML(scene);
  }

  function encountersReadonlyHTML(scene){
    const enc = (scene && Array.isArray(scene.encounters)) ? scene.encounters : [];
    if(enc.length===0) return '';
    return `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">
      ${enc.map(name=>`<span class="tag">${escapeHTML(name)}</span>`).join('')}
    </div>`;
  }

  function isInDex(name){
    return cachedDex.some(e=>String(e.name).trim().toLowerCase()===String(name).trim().toLowerCase());
  }

  function encountersEditableHTML(list){
    if(!list || list.length===0) return '<div class="muted">Nessun Digimon ancora aggiunto a questa scena.</div>';
    return list.map((name,i)=>{
      const already = isInDex(name);
      return `
        <span class="tag" style="display:inline-flex;align-items:center;gap:6px;margin:2px 4px 2px 0;">
          ${escapeHTML(name)}
          ${already ? '' : `<button class="btn small" data-quickdex="${i}" style="padding:1px 6px;">+Dex</button>`}
          <button class="btn ghost small" data-rmenc="${i}" style="padding:1px 6px;">×</button>
        </span>
      `;
    }).join('');
  }

  function bindEncountersPanel(code, username){
    const addBtn = document.getElementById('btn-add-encounter');
    if(addBtn){
      addBtn.onclick = async ()=>{
        const input = document.getElementById('encounter-name');
        const name = input.value.trim();
        if(!name) return;
        cachedScene.encounters = cachedScene.encounters || [];
        cachedScene.encounters.push(name);
        await saveScene(code, cachedScene);
        input.value='';
        document.getElementById('encounters-live').innerHTML = encountersEditableHTML(cachedScene.encounters);
        bindEncountersInnerActions(code, username);
        refreshLiveParts();
      };
    }
    bindEncountersInnerActions(code, username);
  }

  function bindEncountersInnerActions(code, username){
    const live = document.getElementById('encounters-live');
    if(!live) return;
    live.querySelectorAll('[data-rmenc]').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-rmenc'));
        cachedScene.encounters.splice(idx,1);
        await saveScene(code, cachedScene);
        live.innerHTML = encountersEditableHTML(cachedScene.encounters);
        bindEncountersInnerActions(code, username);
        refreshLiveParts();
      };
    });
    live.querySelectorAll('[data-quickdex]').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-quickdex'));
        const name = cachedScene.encounters[idx];
        const d = await addDexEntry(code, { name, stage:'Rookie', description:'', imageUrl:'', addedBy: username });
        if(d && d.entry){
          cachedDex.push(d.entry);
          live.innerHTML = encountersEditableHTML(cachedScene.encounters);
          bindEncountersInnerActions(code, username);
          const dexLive = document.getElementById('dex-live');
          if(dexLive){ dexLive.innerHTML = dexListHTML(cachedDex, true); bindDexEditButtons(code); }
        }
      };
    });
  }

  function logHTML(log, canModerate){
    if(!log || log.length===0) return '<div class="muted">Il registro è vuoto. Le azioni appariranno qui.</div>';
    return log.map(l=>`
      <div class="log-entry ${l.role}">
        <div class="flex-between">
          <div><span class="who mono">${escapeHTML(l.who)}</span><span class="meta">${new Date(l.ts).toLocaleTimeString('it-IT')}</span></div>
          ${canModerate ? `<div><button class="btn ghost small" data-log-edit="${l.id}" style="padding:2px 6px;">✎</button><button class="btn ghost small" data-log-del="${l.id}" style="padding:2px 6px;">✕</button></div>` : ''}
        </div>
        <div class="txt">${escapeHTML(l.text)}</div>
      </div>
    `).join('');
  }

  function attachLogModeration(container, code){
    if(!container || container.dataset.modBound) return;
    container.dataset.modBound = '1';
    container.addEventListener('click', async (e)=>{
      const editBtn = e.target.closest('[data-log-edit]');
      const delBtn = e.target.closest('[data-log-del]');
      if(editBtn){
        const id = editBtn.getAttribute('data-log-edit');
        const entry = cachedLog.find(l=>String(l.id)===String(id));
        const newText = window.prompt('Modifica messaggio:', entry ? entry.text : '');
        if(newText !== null && newText.trim()){
          await editLogEntry(code, id, newText.trim());
          refreshLiveParts();
        }
      }
      if(delBtn){
        const id = delBtn.getAttribute('data-log-del');
        if(window.confirm('Eliminare questo messaggio dal registro?')){
          await deleteLogEntry(code, id);
          refreshLiveParts();
        }
      }
    });
  }

  function escapeHTML(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s){ return escapeHTML(s); }

  // ---------- boot ----------
  const restored = loadSession();
  if(restored && restored.code && restored.username){
    session = restored;
  }
  render();
})();
</script>
</body>
</html>
