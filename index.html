      <button class="btn" id="btn-combat-roll-all" style="width:100%;margin-bottom:8px;">🎲 Tira Iniziativa per Tutti</button>
      <button class="btn solid" id="btn-combat-calc-order" style="width:100%;margin-bottom:8px;">Calcola Ordine</button>
      <div class="row">
        <button class="btn amber" id="btn-combat-next-turn" style="flex:1;">Turno Successivo</button>
        <button class="btn ghost" id="btn-combat-end" style="flex:1;">Termina</button>
      </div>
      <div class="muted" id="combat-mgr-status" style="margin-top:6px;"></div>
    `;

    const persistAndRefresh = async ()=>{
      await saveCombat(code, cachedCombat);
      renderCombatManager(code, players);
      const combatLive = document.getElementById('combat-live');
      if(combatLive) combatLive.innerHTML = combatDisplayHTML(cachedCombat);
    };

    const attackBtn = document.getElementById('btn-combat-attack');
    if(attackBtn){
      attackBtn.onclick = async ()=>{
        const attackerId = document.getElementById('combat-attacker').value;
        const targetId = document.getElementById('combat-target').value;
        const attacker = combat.participants.find(p=>p.id===attackerId);
        const target = combat.participants.find(p=>p.id===targetId);
        const resEl = document.getElementById('combat-attack-result');
        if(!attacker || !target || attacker.id===target.id){
          if(resEl) resEl.innerHTML = '<div class="err">Scegli attaccante e bersaglio diversi.</div>';
          return;
        }
        const aStats = getParticipantCombatStats(attacker);
        const tStats = getParticipantCombatStats(target);
        const zDist = zoneDistance(attacker.zone||'Medio', target.zone||'Medio');
        const zPenalty = zonePenalty(zDist);
        const effAccuracy = Math.max(0, aStats.accuracy + zPenalty);
        const accRoll = rollPool(effAccuracy);
        const dodgeRoll = rollPool(tStats.dodge);
        let logText, dealt = 0;
        const zoneNote = zPenalty!==0 ? ` (${zPenalty} Accuracy per distanza: ${attacker.zone||'Medio'}→${target.zone||'Medio'})` : '';
        if(accRoll.successes <= dodgeRoll.successes){
          logText = `⚔ ${attacker.name} attacca ${target.name}: Accuracy ${effAccuracy}d6${zoneNote}[${accRoll.dice.join(',')}]=${accRoll.successes} succ. vs Dodge ${tStats.dodge}d6[${dodgeRoll.dice.join(',')}]=${dodgeRoll.successes} succ. → MANCATO`;
        } else {
          const excess = accRoll.successes - dodgeRoll.successes;
          const raw = excess + aStats.damage;
          dealt = Math.max(0, raw - tStats.armor);
          await applyDamageToParticipant(code, combat, target, dealt);
          const w = getParticipantWounds(target);
          logText = `⚔ ${attacker.name} attacca ${target.name}: Accuracy ${effAccuracy}d6${zoneNote}[${accRoll.dice.join(',')}]=${accRoll.successes} succ. vs Dodge ${tStats.dodge}d6[${dodgeRoll.dice.join(',')}]=${dodgeRoll.successes} succ. → COLPITO! (${excess}+DMG ${aStats.damage})-ARM ${tStats.armor} = ${dealt} danno → ${target.name} ${w.current}/${w.max} Ferite`;
        }
        if(resEl){
          resEl.innerHTML = `${diceRowHTML(accRoll.dice)}<span class="muted">vs</span>${diceRowHTML(dodgeRoll.dice)}${dealt>0?`<span class="roll-total">${dealt} danno</span>`:''}`;
        }
        await pushLog(code, { who:'Master', role:'roll', text: logText, meta:{ dice: accRoll.dice.concat(dodgeRoll.dice) } });
        renderCombatManager(code, players);
        refreshLiveParts();
      };
    }

    const clashStartBtn = document.getElementById('btn-combat-clash-start');
    if(clashStartBtn){
      clashStartBtn.onclick = async ()=>{
        const aId = document.getElementById('combat-attacker').value;
        const bId = document.getElementById('combat-target').value;
        const a = combat.participants.find(p=>p.id===aId);
        const b = combat.participants.find(p=>p.id===bId);
        const resEl = document.getElementById('combat-clash-result');
        if(!a || !b || a.id===b.id){
          if(resEl) resEl.innerHTML = '<div class="err">Scegli due partecipanti diversi.</div>';
          return;
        }
        const aStats = getParticipantClashStats(a);
        const bStats = getParticipantClashStats(b);
        const aRoll = rollSkillCheck(aStats.cpu, aStats.ram);
        const bRoll = rollSkillCheck(bStats.cpu, bStats.ram);
        let winner, loser;
        if(aRoll.total > bRoll.total){ winner=a; loser=b; }
        else if(bRoll.total > aRoll.total){ winner=b; loser=a; }
        else if(aStats.cpu !== bStats.cpu){ winner = aStats.cpu>bStats.cpu ? a : b; loser = winner===a?b:a; }
        else { winner = a; loser = b; }
        a.clashWith = b.id; b.clashWith = a.id;
        a.clashController = (winner.id===a.id); b.clashController = (winner.id===b.id);
        if(a.isPC){ const m=cachedRoster.find(x=>x.username===a.username); if(m){ m.digimon.stance='Neutral'; await saveMember(code, m); } }
        if(b.isPC){ const m=cachedRoster.find(x=>x.username===b.username); if(m){ m.digimon.stance='Neutral'; await saveMember(code, m); } }
        const logText = `🤼 Clash: ${a.name} (3d6+CPU${aStats.cpu}+RAM${aStats.ram}=${aRoll.total}) vs ${b.name} (3d6+CPU${bStats.cpu}+RAM${bStats.ram}=${bRoll.total}) → controlla ${winner.name}. Entrambi tornano in Stance Neutrale.`;
        await pushLog(code, { who:'Master', role:'gm', text: logText });
        if(resEl) resEl.innerHTML = `<div class="muted">Controlla il Clash: <b style="color:var(--cyan);">${escapeHTML(winner.name)}</b></div>`;
        await persistAndRefresh();
      };
    }
    const clashEndBtn = document.getElementById('btn-combat-clash-end');
    if(clashEndBtn){
      clashEndBtn.onclick = async ()=>{
        const aId = document.getElementById('combat-attacker').value;
        const bId = document.getElementById('combat-target').value;
        const a = combat.participants.find(p=>p.id===aId);
        const b = combat.participants.find(p=>p.id===bId);
        if(a){ a.clashWith=null; a.clashController=false; }
        if(b){ b.clashWith=null; b.clashController=false; }
        await pushLog(code, { who:'Master', role:'gm', text: `🏁 Il Clash tra ${a?a.name:'?'} e ${b?b.name:'?'} è terminato.` });
        const resEl = document.getElementById('combat-clash-result');
        if(resEl) resEl.innerHTML = '';
        await persistAndRefresh();
      };
    }

    cardEl.querySelectorAll('[data-part-init]').forEach(inp=>{
      inp.onchange = async ()=>{
        const id = inp.getAttribute('data-part-init');
        const p = combat.participants.find(x=>x.id===id);
        if(p) p.initiative = Number(inp.value)||0;
        await saveCombat(code, combat);
      };
    });
    cardEl.querySelectorAll('[data-part-remove]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-part-remove');
        combat.participants = combat.participants.filter(x=>x.id!==id);
        await persistAndRefresh();
      };
    });
    cardEl.querySelectorAll('[data-action-use]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-action-use');
        const p = combat.participants.find(x=>x.id===id);
        const sel = cardEl.querySelector(`[data-action-select="${id}"]`);
        if(!p || !sel) return;
        const result = trySpendAction(p, sel.value);
        const statusEl = document.getElementById('combat-mgr-status');
        if(!result.ok){
          if(statusEl){ statusEl.style.color='var(--danger)'; statusEl.textContent = result.msg; }
          return;
        }
        await pushLog(code, { who: p.name, role:'gm', text: `${p.name} usa ${result.def.label} (${result.def.cost} Azione/i) — restano ${p.actions}/2 Azioni.` });
        await persistAndRefresh();
        refreshLiveParts();
      };
    });
    cardEl.querySelectorAll('[data-action-reset]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-action-reset');
        const p = combat.participants.find(x=>x.id===id);
        if(p){ p.actions = 2; p.attackedThisRound = false; }
        await persistAndRefresh();
      };
    });
    cardEl.querySelectorAll('[data-zone-move]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-zone-move');
        const p = combat.participants.find(x=>x.id===id);
        const sel = cardEl.querySelector(`[data-zone-select="${id}"]`);
        if(!p || !sel) return;
        const target = sel.value;
        if(target === (p.zone||'Medio')){ return; }
        const result = trySpendAction(p, 'move');
        const statusEl = document.getElementById('combat-mgr-status');
        if(!result.ok){
          if(statusEl){ statusEl.style.color='var(--danger)'; statusEl.textContent = result.msg; }
          return;
        }
        const from = p.zone||'Medio';
        p.zone = target;
        await pushLog(code, { who: p.name, role:'gm', text: `${p.name} si sposta da ${from} a ${target} raggio (1 Azione) — restano ${p.actions}/2 Azioni.` });
        await persistAndRefresh();
      };
    });
    cardEl.querySelectorAll('[data-effect-apply]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-effect-apply');
        const p = combat.participants.find(x=>x.id===id);
        if(!p) return;
        const key = cardEl.querySelector(`[data-effect-select="${id}"]`).value;
        const potency = Number(cardEl.querySelector(`[data-effect-potency="${id}"]`).value)||1;
        const duration = Math.min(3, Number(cardEl.querySelector(`[data-effect-duration="${id}"]`).value)||3);
        if(!p.effects) p.effects = [];
        p.effects.push({ key, potency, duration });
        const def = EFFECT_DEFS.find(d=>d.key===key);
        await pushLog(code, { who:'Master', role:'gm', text: `${p.name} riceve ${def?def.label:key} (Potenza ${potency}, Durata ${duration}).` });
        await persistAndRefresh();
      };
    });
    cardEl.querySelectorAll('[data-effect-remove]').forEach(btn=>{
      btn.onclick = async ()=>{
        const [id, idx] = btn.getAttribute('data-effect-remove').split('|');
        const p = combat.participants.find(x=>x.id===id);
        if(p && p.effects) p.effects.splice(Number(idx),1);
        await persistAndRefresh();
      };
    });

    document.getElementById('btn-combat-add-player').onclick = async ()=>{
      const username = document.getElementById('combat-add-player').value;
      if(!username) return;
      if(combat.participants.some(p=>p.username===username)) return;
      const member = cachedRoster.find(m=>m.username===username);
      const ram = member ? computeDerivedStats(member.digimon).ram : 0;
      combat.participants.push({ id:'p'+Date.now()+Math.random().toString(36).slice(2,6), name:username, side:'ally', ram, initiative:0, actions:2, attackedThisRound:false, effects:[], zone:'Medio', isPC:true, username });
      await persistAndRefresh();
    };
    const dexFillSelect = document.getElementById('combat-enemy-fromdex');
    if(dexFillSelect){
      dexFillSelect.onchange = ()=>{
        const entry = cachedDex.find(e=>String(e.id)===String(dexFillSelect.value));
        if(!entry) return;
        const bs = entry.base_stats || {};
        document.getElementById('combat-enemy-name').value = entry.name;
        document.getElementById('combat-enemy-acc').value = bs.baseAccuracy||0;
        document.getElementById('combat-enemy-dmg').value = bs.baseDamage||0;
        document.getElementById('combat-enemy-dodge').value = bs.baseDodge||0;
        document.getElementById('combat-enemy-arm').value = bs.baseArmor||0;
        document.getElementById('combat-enemy-hp').value = bs.baseHealth||1;
        document.getElementById('combat-enemy-ram').value = Math.max(0, Math.floor(Number(bs.baseDodge||0)/3));
      };
    }
    document.getElementById('btn-combat-add-enemy').onclick = async ()=>{
      const name = document.getElementById('combat-enemy-name').value.trim();
      if(!name) return;
      const ram = Number(document.getElementById('combat-enemy-ram').value)||0;
      const accuracy = Number(document.getElementById('combat-enemy-acc').value)||0;
      const damage = Number(document.getElementById('combat-enemy-dmg').value)||0;
      const dodge = Number(document.getElementById('combat-enemy-dodge').value)||0;
      const armor = Number(document.getElementById('combat-enemy-arm').value)||0;
      const maxWounds = Number(document.getElementById('combat-enemy-hp').value)||1;
      combat.participants.push({
        id:'p'+Date.now()+Math.random().toString(36).slice(2,6), name, side:'enemy', ram, initiative:0, actions:2, attackedThisRound:false, effects:[], zone:'Medio', isPC:false,
        accuracy, damage, dodge, armor, maxWounds, currentWounds: maxWounds
      });
      await persistAndRefresh();
    };
    document.getElementById('btn-combat-roll-all').onclick = async ()=>{
      combat.participants.forEach(p=>{
        const { dice, total } = rollSkillCheck(0, p.ram||0); // 3d6 + RAM (attrVal unused, pass 0)
        p.initiative = total;
      });
      await persistAndRefresh();
    };
    document.getElementById('btn-combat-calc-order').onclick = async ()=>{
      if(combat.participants.length===0) return;
      recalcCombatOrder(combat);
      await persistAndRefresh();
    };
    document.getElementById('btn-combat-next-turn').onclick = async ()=>{
      if(!combat.order || combat.order.length===0) return;
      const finishing = combat.participants.find(p=>p.id===combat.order[combat.currentIndex]);
      if(finishing){
        finishing.actions = 2;
        finishing.attackedThisRound = false;
        if(finishing.isPC){
          const fMember = cachedRoster.find(m=>m.username===finishing.username);
          if(fMember){
            if(!fMember.digimon.usedSigMoveThisTurn){
              fMember.digimon.battery = Math.min(batteryCap(fMember.digimon.stage), Number(fMember.digimon.battery||0)+1);
            }
            fMember.digimon.usedSigMoveThisTurn = false;
            await saveMember(code, fMember);
          }
        }
      }
      combat.currentIndex++;
      if(combat.currentIndex >= combat.order.length){
        combat.currentIndex = 0;
        combat.round++;
      }
      const starting = combat.participants.find(p=>p.id===combat.order[combat.currentIndex]);
      if(starting){
        const tickLogs = await tickEffectsForParticipant(code, combat, starting);
        for(const line of tickLogs){
          await pushLog(code, { who:'Sistema', role:'gm', text: line });
        }
        if(starting.isPC){
          const member = cachedRoster.find(m=>m.username===starting.username);
          if(member){
            if(member.digimon.forcedEvoRoundsLeft > 0){
              member.digimon.forcedEvoRoundsLeft -= 1;
              if(member.digimon.forcedEvoRoundsLeft <= 0){
                const revertIdx = Math.max(0, stageIndex(member.digimon.defaultStage)-1);
                const revertStage = STAGES[revertIdx];
                applyStageChange(member.digimon, member.digimon.stage, revertStage);
                await pushLog(code, { who:'Sistema', role:'gm', text: `${member.digimon.name||member.username} torna a ${member.digimon.stage} (fine Evoluzione Forzata) — Stat aggiornate.` });
              }
            }
            await saveMember(code, member);
          }
        }
      }
      await persistAndRefresh();
    };
    document.getElementById('btn-combat-end').onclick = async ()=>{
      if(!window.confirm('Terminare il combattimento e azzerare i partecipanti?')) return;
      cachedCombat = defaultCombat();
      await saveCombat(code, cachedCombat);
      renderCombatManager(code, players);
      const combatLive = document.getElementById('combat-live');
      if(combatLive) combatLive.innerHTML = combatDisplayHTML(cachedCombat);
    };
  }

  function rosterItemHTML(p, i){
    const online = p.last_seen && (Date.now() - new Date(p.last_seen).getTime()) < ONLINE_WINDOW_MS;
    return `
      <div class="roster-item">
        <div class="flex-between">
          <div style="display:flex;align-items:center;gap:8px;">
            ${portraitHTML(p.digimon.imageUrl, p.digimon.name, 'sm')}
            <div>
              <span class="brand-dot" style="width:7px;height:7px;display:inline-block;margin-right:4px;background:${online?'var(--cyan)':'var(--text-mute)'};box-shadow:${online?'0 0 6px var(--cyan)':'none'};animation:${online?'pulse 2s infinite':'none'};"></span>
              <span class="name">${escapeHTML(p.username)}</span>
              <span class="tag" style="margin-left:6px;">${escapeHTML(p.digimon.stage)}</span>
              <span class="tag" style="margin-left:6px;color:${online?'var(--cyan)':'var(--text-mute)'};border-color:${online?'var(--cyan-dim)':'var(--line)'};">${online?'online':'offline'}</span>
            </div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn ghost small" id="btn-manage-${i}">Gestisci Scheda</button>
            <button class="btn small" id="btn-suggest-${i}">Suggerisci Battuta</button>
            <button class="btn ghost small" id="btn-delete-${i}" style="color:var(--danger);border-color:rgba(255,93,93,0.4);">🗑</button>
          </div>
        </div>
        <div class="sub" style="margin-top:6px;">Digimon: ${escapeHTML(p.digimon.name || '(senza nome)')} — Ferite: ${p.digimon.currentWounds}/${p.digimon.maxWounds} — MP: ${p.digimon.currentMp}/${p.digimon.maxMp}</div>
        <div class="sub">AGI ${p.tamer.agility} · BODY ${p.tamer.body} · CAR ${p.tamer.charisma} · INT ${p.tamer.intelligence} · WILL ${p.tamer.willpower}</div>
        <div id="suggest-box-${i}" class="suggest-box" style="display:none;"></div>
        <div id="manage-panel-${i}" style="display:none;margin-top:10px;"></div>
      </div>
    `;
  }

  function sceneHTML(scene){
    if(!scene || (!scene.background && !scene.title)){
      return `<div class="scene-box"><div class="scene-empty">Nessuna scena impostata dal Master</div></div>` + encountersReadonlyHTML(scene);
    }
    return `
      <div class="scene-box">
        ${scene.background ? `<img class="bg" src="${escapeAttr(scene.background)}" onerror="this.style.display='none'" />` : ''}
        <div class="overlay"></div>
        ${scene.title ? `<div class="title">${escapeHTML(scene.title)}</div>` : ''}
      </div>
    ` + encountersReadonlyHTML(scene);
  }

  function encountersReadonlyHTML(scene){
    const enc = (scene && Array.isArray(scene.encounters)) ? scene.encounters : [];
    if(enc.length===0) return '';
    return `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">
      ${enc.map(name=>`<span class="tag">${escapeHTML(name)}</span>`).join('')}
    </div>`;
  }

  function isInDex(name){
    return cachedDex.some(e=>String(e.name).trim().toLowerCase()===String(name).trim().toLowerCase());
  }

  function encountersEditableHTML(list){
    if(!list || list.length===0) return '<div class="muted">Nessun Digimon ancora aggiunto a questa scena.</div>';
    return list.map((name,i)=>{
      const already = isInDex(name);
      return `
        <span class="tag" style="display:inline-flex;align-items:center;gap:6px;margin:2px 4px 2px 0;">
          ${escapeHTML(name)}
          ${already ? '' : `<button class="btn small" data-quickdex="${i}" style="padding:1px 6px;">+Dex</button>`}
          <button class="btn ghost small" data-rmenc="${i}" style="padding:1px 6px;">×</button>
        </span>
      `;
    }).join('');
  }

  function bindEncountersPanel(code, username){
    const addBtn = document.getElementById('btn-add-encounter');
    if(addBtn){
      addBtn.onclick = async ()=>{
        const input = document.getElementById('encounter-name');
        const name = input.value.trim();
        if(!name) return;
        cachedScene.encounters = cachedScene.encounters || [];
        cachedScene.encounters.push(name);
        await saveScene(code, cachedScene);
        input.value='';
        document.getElementById('encounters-live').innerHTML = encountersEditableHTML(cachedScene.encounters);
        bindEncountersInnerActions(code, username);
        refreshLiveParts();
      };
    }
    bindEncountersInnerActions(code, username);
  }

  function bindEncountersInnerActions(code, username){
    const live = document.getElementById('encounters-live');
    if(!live) return;
    live.querySelectorAll('[data-rmenc]').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-rmenc'));
        cachedScene.encounters.splice(idx,1);
        await saveScene(code, cachedScene);
        live.innerHTML = encountersEditableHTML(cachedScene.encounters);
        bindEncountersInnerActions(code, username);
        refreshLiveParts();
      };
    });
    live.querySelectorAll('[data-quickdex]').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-quickdex'));
        const name = cachedScene.encounters[idx];
        const d = await addDexEntry(code, { name, stage:'Rookie', description:'', imageUrl:'', addedBy: username, discovered: true });
        if(d && d.entry){
          cachedDex.push(d.entry);
          live.innerHTML = encountersEditableHTML(cachedScene.encounters);
          bindEncountersInnerActions(code, username);
          const dexLive = document.getElementById('dex-live');
          if(dexLive){ dexLive.innerHTML = dexListHTML(cachedDex, true); bindDexEditButtons(code); }
        }
      };
    });
  }

  function logHTML(log, canModerate){
    if(!log || log.length===0) return '<div class="muted">Il registro è vuoto. Le azioni appariranno qui.</div>';
    return log.map(l=>{
      let displayText = l.text;
      let fulfillBtn = '';
      if(l.role==='request' && l.text.includes('::REQ::')){
        const [shown, payload] = l.text.split('::REQ::');
        displayText = shown;
        const parts = payload.split('|');
        const target = parts[0], skillKey = parts[1], tn = parts[2]||'';
        if(session && session.role==='player' && session.username===target){
          fulfillBtn = `<button class="btn amber small" style="margin-top:6px;" data-fulfill-target="${escapeAttr(target)}" data-fulfill-skill="${escapeAttr(skillKey)}" data-fulfill-tn="${escapeAttr(tn)}">🎲 Tira ora</button>`;
        }
      }
      let diceHTML = '';
      if(l.meta && Array.isArray(l.meta.dice)){
        const alreadyAnimated = animatedLogIds.has(l.id);
        diceHTML = `<div style="margin:4px 0;">${l.meta.dice.map((d,i)=>alreadyAnimated
          ? `<span style="display:inline-block;font-size:22px;color:var(--cyan);margin-right:2px;">${DIE_FACES[d]||d}</span>`
          : `<span class="die3d" style="font-size:22px;margin-right:2px;animation-delay:${(i*0.08).toFixed(2)}s;">${DIE_FACES[d]||d}</span>`
        ).join('')}</div>`;
        animatedLogIds.add(l.id);
      }
      return `
      <div class="log-entry ${l.role}">
        <div class="flex-between">
          <div>${l.meta && l.meta.avatar ? `<img class="who-avatar" src="${escapeAttr(l.meta.avatar)}" onerror="this.style.display='none'" />` : ''}<span class="who mono" ${l.meta && l.meta.color ? `style="color:${escapeAttr(l.meta.color)};"` : ''}>${escapeHTML(l.who)}</span><span class="meta">${new Date(l.ts).toLocaleTimeString('it-IT')}</span></div>
          ${canModerate ? `<div><button class="btn ghost small" data-log-edit="${l.id}" style="padding:2px 6px;">✎</button><button class="btn ghost small" data-log-del="${l.id}" style="padding:2px 6px;">✕</button></div>` : ''}
        </div>
        <div class="txt">${escapeHTML(displayText)}</div>
        ${diceHTML}
        ${fulfillBtn}
      </div>
    `;
    }).join('');
  }

  function attachLogModeration(container, code, me){
    if(!container || container.dataset.modBound) return;
    container.dataset.modBound = '1';
    container.addEventListener('click', async (e)=>{
      const editBtn = e.target.closest('[data-log-edit]');
      const delBtn = e.target.closest('[data-log-del]');
      const fulfillBtn = e.target.closest('[data-fulfill-target]');
      if(editBtn){
        const id = editBtn.getAttribute('data-log-edit');
        const entry = cachedLog.find(l=>String(l.id)===String(id));
        const newText = window.prompt('Modifica messaggio:', entry ? entry.text : '');
        if(newText !== null && newText.trim()){
          await editLogEntry(code, id, newText.trim());
          refreshLiveParts();
        }
      }
      if(delBtn){
        const id = delBtn.getAttribute('data-log-del');
        if(window.confirm('Eliminare questo messaggio dal registro?')){
          await deleteLogEntry(code, id);
          refreshLiveParts();
        }
      }
      if(fulfillBtn && me){
        const skillKey = fulfillBtn.getAttribute('data-fulfill-skill');
        const tn = fulfillBtn.getAttribute('data-fulfill-tn');
        const poolKeys = ['baseAccuracy','baseDodge','baseHealth'];
        let text = null;
        let rollMeta = null;
        if(poolKeys.includes(skillKey)){
          const { dice, successes } = rollPool(me.digimon[skillKey]);
          const label = skillKey==='baseAccuracy'?'Accuracy':(skillKey==='baseDodge'?'Dodge':'Health');
          text = `tira Pool Check ${label} (${me.digimon[skillKey]}d6): [${dice.join(',')}] → ${successes} successi (richiesto dal Master)`;
          rollMeta = { dice, successes };
        } else {
          const def = SKILL_DEFS.find(d=>d.key===skillKey);
          if(def){
            const attr = def.attrs[0];
            const attrVal = me.tamer[attr];
            const skillVal = me.tamer.skills[def.key];
            const { dice, total } = rollSkillCheck(attrVal, skillVal);
            const verdict = evaluateVsTN(total, tn);
            text = `tira ${def.label} (${ATTR_ABBR[attr]}+Skill): 3d6[${dice.join(',')}] + ${attrVal} + ${skillVal} = ${total}` + (verdict?` vs TN ${tn} → ${verdict.label}`:'') + ' (richiesto dal Master)';
            rollMeta = { dice, total, verdict: verdict?verdict.label:null };
          }
        }
        if(text){
          await pushLog(code, { who: session.username, role:'roll', text, meta: rollMeta });
          refreshLiveParts();
        }
      }
    });
  }

  function escapeHTML(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s){ return escapeHTML(s); }

  // ---------- global dex filter delegation ----------
  document.addEventListener('click', function(e){
    const chip = e.target.closest('[data-filter-cat]');
    if(!chip) return;
    const cat = chip.getAttribute('data-filter-cat');
    if(cat === '__clear__'){
      dexActiveFilters = [];
    } else {
      const idx = dexActiveFilters.indexOf(cat);
      if(idx>=0) dexActiveFilters.splice(idx,1); else dexActiveFilters.push(cat);
    }
    const dexLive = document.getElementById('dex-live');
    if(dexLive){
      dexLive.innerHTML = dexListHTML(cachedDex, dexCanEditGlobal);
      if(dexCanEditGlobal && session) bindDexEditButtons(session.code);
    }
  });

  // ---------- boot ----------
  const restored = loadSession();
  if(restored && restored.code && restored.username){
    session = restored;
  }
  render();
})();
</script>
</body>
</html>
