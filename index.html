          const pMember = p.isPC ? cachedRoster.find(m=>m.username===p.username) : null;
          p.actions = (pMember && pMember.digimon.hybridMode) ? 3 : 2;
          p.attackedThisRound = false;
        }
        await persistAndRefresh();
      };
    });
    cardEl.querySelectorAll('[data-zone-move]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-zone-move');
        const p = combat.participants.find(x=>x.id===id);
        const sel = cardEl.querySelector(`[data-zone-select="${id}"]`);
        if(!p || !sel) return;
        const target = sel.value;
        if(target === (p.zone||'Medio')){ return; }
        const result = trySpendAction(p, 'move');
        const statusEl = document.getElementById('combat-mgr-status');
        if(!result.ok){
          if(statusEl){ statusEl.style.color='var(--danger)'; statusEl.textContent = result.msg; }
          return;
        }
        const from = p.zone||'Medio';
        p.zone = target;
        await pushLog(code, { who: p.name, role:'gm', text: `${p.name} si sposta da ${from} a ${target} raggio (1 Azione) — restano ${p.actions}/2 Azioni.` });
        await persistAndRefresh();
      };
    });
    cardEl.querySelectorAll('[data-order-use]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-order-use');
        const p = combat.participants.find(x=>x.id===id);
        const sel = cardEl.querySelector(`[data-order-select="${id}"]`);
        if(!p || !sel || !p.isPC) return;
        const member = cachedRoster.find(m=>m.username===p.username);
        if(!member) return;
        const orderKey = sel.value;
        const talent = TALENT_DEFS.find(t=>t.order===orderKey);
        if(!talent) return;
        if(!member.tamer.specialOrdersUsed) member.tamer.specialOrdersUsed = {};
        if(talent.once && member.tamer.specialOrdersUsed[orderKey]){
          const statusEl = document.getElementById('combat-mgr-status');
          if(statusEl){ statusEl.style.color='var(--danger)'; statusEl.textContent = `${talent.name} già usato — serve un Rest/nuovo combattimento.`; }
          return;
        }
        if(talent.cost>0){
          if((p.actions===undefined?2:p.actions) < talent.cost){
            const statusEl = document.getElementById('combat-mgr-status');
            if(statusEl){ statusEl.style.color='var(--danger)'; statusEl.textContent = 'Azioni insufficienti per questo Special Order.'; }
            return;
          }
          p.actions -= talent.cost;
        }
        let logText = `✦ ${p.name} usa Special Order "${talent.name}".`;
        if(orderKey==='strikeFast'){
          p.actions += 1;
          logText += ' Guadagna 1 Azione extra (da usare per Muovi).';
        } else if(orderKey==='energyBurst'){
          const heal = Number(member.digimon.tempWounds||0)>0 ? 2 : 1;
          member.digimon.currentWounds = Math.min(member.digimon.maxWounds, member.digimon.currentWounds+heal);
          logText += ` Recupera ${heal} Casella/e Ferita.`;
        } else if(orderKey==='overpower'){
          p.overpowerActive = true;
          logText += ' Il prossimo tiro Accuracy conta i 4 come Successi.';
        } else if(orderKey==='swagger'){
          const targetId = document.getElementById('combat-target').value;
          const tgt = combat.participants.find(x=>x.id===targetId);
          if(tgt){
            if(!tgt.effects) tgt.effects=[];
            tgt.effects.push({ key:'taunt', potency:1, duration:3 });
            logText += ` Applica [TAUNT] a ${tgt.name} per 3 round.`;
          } else {
            logText += ' (Scegli un Bersaglio nel menu Attaccante/Bersaglio prima di usarlo.)';
          }
        } else if(orderKey==='peakPerformance'){
          const targetId = document.getElementById('combat-target').value;
          const tgt = combat.participants.find(x=>x.id===targetId);
          if(tgt){
            if(!tgt.effects) tgt.effects=[];
            tgt.effects.push({ key:'bastion', potency:2, duration:1 });
            logText += ` ${tgt.name} guadagna [BASTION 2] fino al prossimo turno.`;
          } else {
            logText += ' (Scegli un Bersaglio alleato nel menu Attaccante/Bersaglio prima di usarlo.)';
          }
        } else if(orderKey==='revitalize'){
          const targetId = document.getElementById('combat-target').value;
          const tgt = combat.participants.find(x=>x.id===targetId);
          if(tgt){
            const w = getParticipantWounds(tgt);
            if(w.current<=0){
              await applyDamageToParticipant(code, combat, tgt, -1);
              logText += ` ${tgt.name} viene rianimato con 1 Casella Ferita.`;
            } else {
              logText += ` ${tgt.name} non è sconfitto — Revitalize richiede un Digimon a 0 Ferite.`;
            }
          } else {
            logText += ' (Scegli il Bersaglio sconfitto nel menu Attaccante/Bersaglio prima di usarlo.)';
          }
        } else if(orderKey==='signatureVersatility'){
          member.digimon.battery = Math.max(member.digimon.battery, 1);
          logText += ' Il prossimo Attacco può essere dichiarato come Signature Move anche a Battery bassa.';
        } else if(orderKey==='enemyScan'){
          const targetId = document.getElementById('combat-target').value;
          const tgt = combat.participants.find(x=>x.id===targetId);
          if(tgt){
            const tgtStage = tgt.isPC ? (cachedRoster.find(m=>m.username===tgt.username)?.digimon.stage) : null;
            const potency = tgtStage ? stageIndex(tgtStage)+1 : 2;
            if(!tgt.effects) tgt.effects=[];
            tgt.effects.push({ key:'debilitate', potency, duration:3 });
            logText += ` Applica [DEBILITATE ${potency}] a ${tgt.name} per 3 round.`;
          } else {
            logText += ' (Scegli il Bersaglio nemico nel menu Attaccante/Bersaglio prima di usarlo.)';
          }
        } else if(orderKey==='purifyPartner'){
          const msg = await applyInstantEffect(code, p, 'cleanse', 1);
          logText += ` ${msg}`;
        }
        member.tamer.specialOrdersUsed[orderKey] = true;
        await saveMember(code, member);
        await pushLog(code, { who: p.name, role:'gm', text: logText });
        await persistAndRefresh();
      };
    });
    cardEl.querySelectorAll('[data-effect-apply]').forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute('data-effect-apply');
        const p = combat.participants.find(x=>x.id===id);
        if(!p) return;
        const key = cardEl.querySelector(`[data-effect-select="${id}"]`).value;
        const potency = Number(cardEl.querySelector(`[data-effect-potency="${id}"]`).value)||1;
        const duration = Math.min(3, Number(cardEl.querySelector(`[data-effect-duration="${id}"]`).value)||3);
        const def = EFFECT_DEFS.find(d=>d.key===key);
        if(def && def.instant){
          const msg = await applyInstantEffect(code, p, key, potency);
          await pushLog(code, { who:'Master', role:'gm', text: `✨ ${msg}` });
        } else {
          if(!p.effects) p.effects = [];
          p.effects.push({ key, potency, duration });
          await pushLog(code, { who:'Master', role:'gm', text: `${p.name} riceve ${def?def.label:key} (Potenza ${potency}, Durata ${duration}).` });
        }
        await persistAndRefresh();
      };
    });
    cardEl.querySelectorAll('[data-effect-remove]').forEach(btn=>{
      btn.onclick = async ()=>{
        const [id, idx] = btn.getAttribute('data-effect-remove').split('|');
        const p = combat.participants.find(x=>x.id===id);
        if(p && p.effects) p.effects.splice(Number(idx),1);
        await persistAndRefresh();
      };
    });

    document.getElementById('btn-combat-add-player').onclick = async ()=>{
      const username = document.getElementById('combat-add-player').value;
      if(!username) return;
      if(combat.participants.some(p=>p.username===username)) return;
      const member = cachedRoster.find(m=>m.username===username);
      const ram = member ? computeDerivedStats(member.digimon).ram : 0;
      const startActions = (member && member.digimon.hybridMode) ? 3 : 2;
      combat.participants.push({ id:'p'+Date.now()+Math.random().toString(36).slice(2,6), name:username, side:'ally', ram, initiative:0, actions:startActions, attackedThisRound:false, effects:[], zone:'Medio', clashPinned:false, clashComebackBonus:0, isPC:true, username });
      await persistAndRefresh();
    };
    const dexFillSelect = document.getElementById('combat-enemy-fromdex');
    if(dexFillSelect){
      dexFillSelect.onchange = ()=>{
        const entry = cachedDex.find(e=>String(e.id)===String(dexFillSelect.value));
        if(!entry) return;
        const bs = entry.base_stats || {};
        document.getElementById('combat-enemy-name').value = entry.name;
        document.getElementById('combat-enemy-acc').value = bs.baseAccuracy||0;
        document.getElementById('combat-enemy-dmg').value = bs.baseDamage||0;
        document.getElementById('combat-enemy-dodge').value = bs.baseDodge||0;
        document.getElementById('combat-enemy-arm').value = bs.baseArmor||0;
        document.getElementById('combat-enemy-hp').value = bs.baseHealth||1;
        document.getElementById('combat-enemy-ram').value = Math.max(0, Math.floor(Number(bs.baseDodge||0)/3));
      };
    }
    document.getElementById('btn-combat-add-enemy').onclick = async ()=>{
      const name = document.getElementById('combat-enemy-name').value.trim();
      if(!name) return;
      const ram = Number(document.getElementById('combat-enemy-ram').value)||0;
      const accuracy = Number(document.getElementById('combat-enemy-acc').value)||0;
      const damage = Number(document.getElementById('combat-enemy-dmg').value)||0;
      const dodge = Number(document.getElementById('combat-enemy-dodge').value)||0;
      const armor = Number(document.getElementById('combat-enemy-arm').value)||0;
      const maxWounds = Number(document.getElementById('combat-enemy-hp').value)||1;
      const attribute = document.getElementById('combat-enemy-attribute').value;
      combat.participants.push({
        id:'p'+Date.now()+Math.random().toString(36).slice(2,6), name, side:'enemy', ram, initiative:0, actions:2, attackedThisRound:false, effects:[], zone:'Medio', clashPinned:false, clashComebackBonus:0, isPC:false,
        accuracy, damage, dodge, armor, maxWounds, currentWounds: maxWounds, attribute
      });
      await persistAndRefresh();
    };
    document.getElementById('btn-combat-roll-all').onclick = async ()=>{
      combat.participants.forEach(p=>{
        const { dice, total } = rollSkillCheck(0, p.ram||0); // 3d6 + RAM (attrVal unused, pass 0)
        p.initiative = total;
      });
      await persistAndRefresh();
    };
    document.getElementById('btn-combat-calc-order').onclick = async ()=>{
      if(combat.participants.length===0) return;
      recalcCombatOrder(combat);
      await persistAndRefresh();
    };
    document.getElementById('btn-combat-next-turn').onclick = async ()=>{
      if(!combat.order || combat.order.length===0) return;
      const finishing = combat.participants.find(p=>p.id===combat.order[combat.currentIndex]);
      if(finishing){
        const fMemberEarly = finishing.isPC ? cachedRoster.find(m=>m.username===finishing.username) : null;
        finishing.actions = (fMemberEarly && fMemberEarly.digimon.hybridMode) ? 3 : 2;
        finishing.attackedThisRound = false;
        if(finishing.isPC){
          const fMember = cachedRoster.find(m=>m.username===finishing.username);
          if(fMember){
            if(!fMember.digimon.usedSigMoveThisTurn){
              fMember.digimon.battery = Math.min(batteryCap(fMember.digimon.stage), Number(fMember.digimon.battery||0)+1);
            }
            fMember.digimon.usedSigMoveThisTurn = false;
            await saveMember(code, fMember);
          }
        }
      }
      combat.currentIndex++;
      if(combat.currentIndex >= combat.order.length){
        combat.currentIndex = 0;
        combat.round++;
      }
      const starting = combat.participants.find(p=>p.id===combat.order[combat.currentIndex]);
      if(starting){
        const tickLogs = await tickEffectsForParticipant(code, combat, starting);
        for(const line of tickLogs){
          await pushLog(code, { who:'Sistema', role:'gm', text: line });
        }
        if(starting.isPC){
          const member = cachedRoster.find(m=>m.username===starting.username);
          if(member){
            if(member.digimon.forcedEvoRoundsLeft > 0){
              member.digimon.forcedEvoRoundsLeft -= 1;
              if(member.digimon.forcedEvoRoundsLeft <= 0){
                const revertIdx = Math.max(0, stageIndex(member.digimon.defaultStage)-1);
                const revertStage = STAGES[revertIdx];
                applyStageChange(member.digimon, member.digimon.stage, revertStage);
                await pushLog(code, { who:'Sistema', role:'gm', text: `${member.digimon.name||member.username} torna a ${member.digimon.stage} (fine Evoluzione Forzata) — Stat aggiornate.` });
              }
            }
            await saveMember(code, member);
          }
        }
      }
      await persistAndRefresh();
    };
    document.getElementById('btn-combat-end').onclick = async ()=>{
      if(!window.confirm('Terminare il combattimento e azzerare i partecipanti?')) return;
      cachedCombat = defaultCombat();
      await saveCombat(code, cachedCombat);
      renderCombatManager(code, players);
      const combatLive = document.getElementById('combat-live');
      if(combatLive) combatLive.innerHTML = combatDisplayHTML(cachedCombat);
    };
  }

    el.querySelectorAll('[data-sector-image]').forEach(btn=>{
      btn.onclick = async ()=>{

        renderSectorMap(code);
        refreshLiveParts();

    el.querySelectorAll('[data-luogo-activate]').forEach(btn=>{
      btn.onclick = async ()=>{
        const liveMacro = liveActiveMacro();
        if(!liveMacro) return;
        const [sectorId, luogoId] = btn.getAttribute('data-luogo-activate').split(':');
        cachedScene.currentSectorId = sectorId;
        cachedScene.currentLuogoId = luogoId;

        const lg = s ? (s.luoghi||[]).find(x=>x.id===luogoId) : null;

        if(lg) lg.revealed = true;
        const ok = await saveScene(code, cachedScene);
        const statusEl = document.getElementById('sector-status');
        if(!ok){ if(statusEl) statusEl.textContent = '⚠ Errore: ' + (lastApiError || 'salvataggio non riuscito'); return; }

    el.querySelectorAll('[data-luogo-remove]').forEach(btn=>{

        await saveScene(code, cachedScene);
        renderSectorMap(code);
        refreshLiveParts();
      };
    });
    el.querySelectorAll('[data-luogo-image]').forEach(btn=>{
      btn.onclick = async ()=>{

        renderSectorMap(code);

        if(!liveMacro) return;
        const sectorId = btn.getAttribute('data-luogo-add');
        const input = el.querySelector(`.luogo-name-input[data-for-sector="${sectorId}"]`);
        const name = input ? input.value.trim() : '';
        if(!name) return;
        const s = (liveMacro.sectors||[]).find(x=>x.id===sectorId);
        if(!s) return;
        if(!s.luoghi) s.luoghi = [];
        s.luoghi.push({ id:'l'+Date.now()+Math.random().toString(36).slice(2,6), name, description:'', revealed:false });
        await saveScene(code, cachedScene);
        renderSectorMap(code);
        refreshLiveParts();
      };
    });
    const addBtn = document.getElementById('btn-add-sector');
    if(addBtn){
      addBtn.onclick = async ()=>{
        const liveMacro = liveActiveMacro();
        if(!liveMacro) return;
        const name = document.getElementById('sector-name').value.trim();
        const statusEl = document.getElementById('sector-status');
        if(!name){ statusEl.textContent = 'Inserisci un nome per il settore.'; return; }

        const description = document.getElementById('sector-desc').value.trim();
        const image = document.getElementById('sector-image').value.trim();
        const gridPosSel = document.getElementById('sector-gridpos').value;
        const gridPos = gridPosSel!=='' ? Number(gridPosSel) : null;
        const connections = Array.from(el.querySelectorAll('.sector-connect-chk:checked')).map(c=>c.value);
        const id = 's'+Date.now()+Math.random().toString(36).slice(2,6);
        if(!liveMacro.sectors) liveMacro.sectors = [];
        liveMacro.sectors.push({ id, name, description, terrain, connections, luoghi: [], image, gridPos, revealed:false });
        connections.forEach(cid=>{
          const other = liveMacro.sectors.find(s=>s.id===cid);
          if(other){ if(!other.connections) other.connections=[]; if(!other.connections.includes(id)) other.connections.push(id); }
        });
        sectorMapSelectedId = id;
        await saveScene(code, cachedScene);
        renderSectorMap(code);
        refreshLiveParts();
      };
    }
  }

  function sceneHTML(scene){
    const macroScenes = (scene && Array.isArray(scene.macroScenes)) ? scene.macroScenes : [];
    const activeMacro = scene && scene.currentMacroSceneId ? macroScenes.find(m=>m.id===scene.currentMacroSceneId) : null;
    const sectors = activeMacro ? (activeMacro.sectors||[]) : [];
    const current = scene && scene.currentSectorId ? sectors.find(s=>s.id===scene.currentSectorId) : null;
    const currentLuogo = current && scene.currentLuogoId ? (current.luoghi||[]).find(l=>l.id===scene.currentLuogoId) : null;
    const sectorBadge = current ? `<span class="tag">${current.terrain==='Dangerous'?'☠':(current.terrain==='Difficult'?'⚠':'')} ${escapeHTML(current.terrain)}</span>` : '';
    const breadcrumb = [activeMacro?activeMacro.name:null, current?current.name:null, currentLuogo?currentLuogo.name:null].filter(Boolean).map(escapeHTML).join(' → ');
    const sectorHTML = current ? `
      <div class="hud-frame card" style="margin-top:8px;padding:8px 10px;">
        <div class="flex-between"><span class="mono" style="color:var(--cyan);">📍 ${breadcrumb}</span>${sectorBadge}</div>
        ${currentLuogo && currentLuogo.description ? `<div class="sub" style="margin-top:4px;">${escapeHTML(currentLuogo.description)}</div>` : (current.description ? `<div class="sub" style="margin-top:4px;">${escapeHTML(current.description)}</div>` : '')}
        ${!currentLuogo && (current.luoghi||[]).length>0 ? `<div class="muted" style="margin-top:4px;font-size:11px;">Luoghi qui: ${(current.luoghi||[]).map(l=>escapeHTML(l.name)).join(', ')}</div>` : ''}
        <div class="muted" style="margin-top:4px;font-size:11px;">Puoi raggiungere: ${(current.connections||[]).map(cid=>{ const c=sectors.find(x=>x.id===cid); return c?escapeHTML(c.name):''; }).filter(Boolean).join(', ') || 'nessun altro settore collegato'}</div>
      </div>
    ` : '';
    const bgImage = (currentLuogo && currentLuogo.image) || (current && current.image) || (scene && scene.background) || '';
    if(!scene || (!bgImage && !scene.title)){
      return `<div class="scene-box"><div class="scene-empty">Nessuna scena impostata dal Master</div></div>` + sectorHTML + encountersReadonlyHTML(scene);
    }
    return `
      <div class="scene-box" ${bgImage?`data-scene-img-expand="${escapeAttr(bgImage)}"`:''}>
        ${bgImage ? `<img class="bg" src="${escapeAttr(bgImage)}" onerror="this.style.display='none'" />` : ''}
        <div class="overlay"></div>
        ${bgImage ? `<div class="scene-expand-hint">🔍</div>` : ''}
        ${scene.title ? `<div class="title">${escapeHTML(scene.title)}</div>` : ''}
      </div>
    ` + sectorHTML + encountersReadonlyHTML(scene);
  }

  function getEncImgLarge(){ try{ return localStorage.getItem('digivice_enc_img_large')==='1'; }catch(e){ return false; } }
  function setEncImgLarge(v){ try{ localStorage.setItem('digivice_enc_img_large', v?'1':'0'); }catch(e){} }

  function encountersReadonlyHTML(scene){
    const enc = (scene && Array.isArray(scene.encounters)) ? scene.encounters.map(normalizeEncounter) : [];
    const visible = enc.filter(e=>e.revealed!==false);
    if(visible.length===0) return '';
    // Group visually-identical entries (same name/stage/image) so duplicates show a ×N counter instead of repeating.
    const groups = [];
    visible.forEach(e=>{
      const key = e.name.trim().toLowerCase()+'|'+(e.stage||'')+'|'+(e.image||'');
      let g = groups.find(x=>x.key===key);
      if(!g){ g = { key, name:e.name, stage:e.stage, image:e.image, isBoss:false, count:0 }; groups.push(g); }
      g.count++;
      if(e.isBoss) g.isBoss = true;
    });
    const large = getEncImgLarge();
    const imgSize = large ? 56 : 30;
    return `
      <div style="margin-top:8px;">
        <button type="button" class="btn ghost small" data-toggle-enc-size style="margin-bottom:8px;">${large?'🔎 Immagini più piccole':'🔍 Immagini più grandi'}</button>
        <div style="display:flex;flex-wrap:wrap;gap:10px;">
          ${groups.map(g=>`
            <div data-enc-name="${escapeAttr(g.name)}" style="cursor:pointer;display:flex;flex-direction:column;align-items:center;width:${imgSize+18}px;padding:4px;border-radius:8px;border:2px solid ${g.isBoss?'var(--danger)':'transparent'};position:relative;" title="Clicca per i dettagli">
              ${g.count>1 ? `<span style="position:absolute;top:-4px;right:0px;background:var(--cyan);color:#04211c;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;">×${g.count}</span>` : ''}
              ${g.image ? `<img src="${escapeAttr(g.image)}" onerror="this.style.display='none'" style="width:${imgSize}px;height:${imgSize}px;object-fit:cover;border-radius:6px;" />` : `<div style="width:${imgSize}px;height:${imgSize}px;display:flex;align-items:center;justify-content:center;background:var(--panel-2);border-radius:6px;color:var(--text-mute);font-size:16px;">${escapeHTML((g.name||'?')[0]||'?')}</div>`}
              <div style="font-size:10px;text-align:center;margin-top:3px;line-height:1.2;">${escapeHTML(g.name)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function isInDex(name){
    return cachedDex.some(e=>String(e.name).trim().toLowerCase()===String(name).trim().toLowerCase());
  }

  function encountersEditableHTML(list){
    const items = (list||[]).map(normalizeEncounter);
    if(items.length===0) return '<div class="muted">Nessun Digimon ancora aggiunto a questa scena.</div>';
    return items.map((e,i)=>{
      const already = !!e.dexId || isInDex(e.name);
      const visible = e.revealed!==false;
      return `
        <div class="roster-item" style="padding:6px 8px;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;${e.isBoss?'border-color:var(--danger);':''}">
          ${e.image ? `<img src="${escapeAttr(e.image)}" onerror="this.style.display='none'" style="width:32px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0;" />` : ''}
          <div style="flex:1;min-width:120px;">
            <div><b>${escapeHTML(e.name)}</b> ${e.stage?`<span class="tag">${escapeHTML(e.stage)}</span>`:''}${e.isBoss?`<span class="tag" style="color:var(--danger);border-color:var(--danger);">👑 Boss</span>`:''}${(e.categories||[]).map(c=>`<span class="tag" style="font-size:9px;">${escapeHTML(c)}</span>`).join('')}</div>
            <div class="muted" style="font-size:11px;">${visible ? '👁️ Visibile ai giocatori' : '🙈 Nascosto — solo il Master lo vede'}</div>
          </div>
          <button class="btn ${e.isBoss?'':'ghost'} small" data-toggle-boss="${i}" style="padding:4px 8px;font-size:10px;">${e.isBoss?'👑 Rimuovi Boss':'👑 Segna Boss'}</button>
          <button class="btn ${visible?'ghost':''} small" data-toggle-reveal="${i}" style="padding:4px 8px;font-size:10px;">${visible?'🙈 Nascondi':'👁️ Mostra ai giocatori'}</button>
          <button class="btn ghost small" data-dupe-enc="${i}" style="padding:4px 8px;font-size:10px;" title="Aggiunge una copia identica">+1 copia</button>
          ${already ? '' : `<button class="btn small" data-quickdex="${i}" style="padding:4px 8px;font-size:10px;">+Dex</button>`}
          <button class="btn ghost small" data-rmenc="${i}" style="padding:4px 8px;font-size:10px;">×</button>
        </div>
      `;
    }).join('');
  }

  function bindEncounterDraftCard(code, username){
    const confirmBtn = document.getElementById('btn-confirm-encounter');
    if(confirmBtn) confirmBtn.onclick = async ()=>{
      const name = document.getElementById('draft-name').value.trim();
      if(!name) return;
      const attribute = document.getElementById('draft-attribute').value;
      const family = document.getElementById('draft-family').value.split(',').map(s=>s.trim()).filter(Boolean);
      const categories = [attribute, ...family].filter(Boolean);
      const image = document.getElementById('draft-image').value.trim();
      const description = document.getElementById('draft-desc').value.trim();
      const stage = document.getElementById('draft-stage').value;
      const isBoss = document.getElementById('draft-isboss').checked;
      const baseStats = {
        baseAccuracy: Number(document.getElementById('draft-acc').value)||0,
        baseDamage: Number(document.getElementById('draft-dmg').value)||0,
        baseDodge: Number(document.getElementById('draft-dodge').value)||0,
        baseArmor: Number(document.getElementById('draft-arm').value)||0,
        baseHealth: Number(document.getElementById('draft-hp').value)||0
      };
      const finalEncounter = { id: encounterDraft.id, name, dexId: encounterDraft.dexId, stage, categories, image, description, baseStats, revealed:false, isBoss };
      cachedScene.encounters = cachedScene.encounters || [];
      cachedScene.encounters.push(finalEncounter);
      encounterDraft = null;
      await saveScene(code, cachedScene);
      const searchInput = document.getElementById('encounter-search');
      if(searchInput) searchInput.value='';
      document.getElementById('encounters-live').innerHTML = encountersEditableHTML(cachedScene.encounters);
      bindEncountersInnerActions(code, username);
      renderEncounterDraftCard();
      refreshLiveParts();
    };
    const cancelBtn = document.getElementById('btn-cancel-encounter');
    if(cancelBtn) cancelBtn.onclick = ()=>{ encounterDraft = null; renderEncounterDraftCard(); };
  }

  function bindEncountersPanel(code, username){
    const prepBtn = document.getElementById('btn-prepare-encounter');
    if(prepBtn){
      prepBtn.onclick = ()=>{
        const input = document.getElementById('encounter-search');
        const name = input.value.trim();
        if(!name) return;
        const dexMatch = cachedDex.find(e=>String(e.name).trim().toLowerCase()===name.toLowerCase());
        encounterDraft = dexMatch ? {
          id:'enc'+Date.now()+Math.random().toString(36).slice(2,6),
          name: dexMatch.name,
          dexId: dexMatch.id,
          stage: dexMatch.stage || 'Rookie',
          categories: (dexMatch.categories||[]).slice(),
          image: dexMatch.image_url || '',
          description: dexMatch.description || '',
          baseStats: Object.assign({baseAccuracy:0,baseDamage:0,baseDodge:0,baseArmor:0,baseHealth:0}, dexMatch.base_stats||{}),
          revealed:false, isBoss:false
        } : {
          id:'enc'+Date.now()+Math.random().toString(36).slice(2,6),
          name, dexId:null, stage:'Rookie', categories:[], image:'', description:'',
          baseStats:{baseAccuracy:0,baseDamage:0,baseDodge:0,baseArmor:0,baseHealth:0}, revealed:false, isBoss:false
        };
        renderEncounterDraftCard();
        bindEncounterDraftCard(code, username);
      };
    }
    bindEncountersInnerActions(code, username);
  }

  function bindEncountersInnerActions(code, username){
    const live = document.getElementById('encounters-live');
    if(!live) return;
    live.querySelectorAll('[data-rmenc]').forEach(btn=>{
      btn.onclick = async ()=>{

        bindEncountersInnerActions(code, username);
        refreshLiveParts();
      };

    live.querySelectorAll('[data-toggle-reveal]').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-toggle-reveal'));
        const e = cachedScene.encounters[idx];
        if(!e) return;
        const isVisible = e.revealed!==false;
        e.revealed = !isVisible;
        await saveScene(code, cachedScene);
        live.innerHTML = encountersEditableHTML(cachedScene.encounters);
        bindEncountersInnerActions(code, username);
        refreshLiveParts();
      };
    });
    live.querySelectorAll('[data-toggle-boss]').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-toggle-boss'));
        const e = cachedScene.encounters[idx];
        if(!e) return;
        e.isBoss = !e.isBoss;
        await saveScene(code, cachedScene);
        live.innerHTML = encountersEditableHTML(cachedScene.encounters);
        bindEncountersInnerActions(code, username);
        refreshLiveParts();
      };
    });
    live.querySelectorAll('[data-dupe-enc]').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-dupe-enc'));
        const e = cachedScene.encounters[idx];
        if(!e) return;
        const copy = Object.assign({}, e, { id:'enc'+Date.now()+Math.random().toString(36).slice(2,6) });
        cachedScene.encounters.splice(idx+1, 0, copy);
        await saveScene(code, cachedScene);
        live.innerHTML = encountersEditableHTML(cachedScene.encounters);
        bindEncountersInnerActions(code, username);
        refreshLiveParts();
      };
    });
    live.querySelectorAll('[data-quickdex]').forEach(btn=>{
      btn.onclick = async ()=>{
        const idx = Number(btn.getAttribute('data-quickdex'));
        const e = cachedScene.encounters[idx];
        const name = encName(e);
        const d = await addDexEntry(code, {
          name,
          stage: (e && e.stage) || 'Rookie',
          description: (e && e.description) || '',
          imageUrl: (e && e.image) || '',
          addedBy: username,
          categories: (e && e.categories) || [],
          baseStats: (e && e.baseStats) || {},
          discovered: true
        });
        if(d && d.entry){
          cachedDex.push(d.entry);
          if(e && typeof e === 'object') e.dexId = d.entry.id;
          live.innerHTML = encountersEditableHTML(cachedScene.encounters);
          bindEncountersInnerActions(code, username);
          const dexLive = document.getElementById('dex-live');
          if(dexLive){ dexLive.innerHTML = dexListHTML(cachedDex, true); bindDexEditButtons(code); }
        }
      };
    });
  }

  function logHTML(log, canModerate){
    if(!log || log.length===0) return '<div class="muted">Il registro è vuoto. Le azioni appariranno qui.</div>';
    return log.map(l=>{
      let displayText = l.text;
      let fulfillBtn = '';
      if(l.role==='request' && l.text.includes('::REQ::')){
        const [shown, payload] = l.text.split('::REQ::');
        displayText = shown;
        const parts = payload.split('|');
        const target = parts[0], skillKey = parts[1], tn = parts[2]||'';
        if(session && session.role==='player' && session.username===target){
          fulfillBtn = `<button class="btn amber small" style="margin-top:6px;" data-fulfill-target="${escapeAttr(target)}" data-fulfill-skill="${escapeAttr(skillKey)}" data-fulfill-tn="${escapeAttr(tn)}">🎲 Tira ora</button>`;
        }
      }
      let diceHTML = '';
      if(l.meta && Array.isArray(l.meta.dice)){
        const alreadyAnimated = animatedLogIds.has(l.id);
        diceHTML = `<div style="margin:4px 0;">${l.meta.dice.map((d,i)=>alreadyAnimated
          ? `<span style="display:inline-block;font-size:22px;color:var(--cyan);margin-right:2px;">${DIE_FACES[d]||d}</span>`
          : `<span class="die3d" style="font-size:22px;margin-right:2px;animation-delay:${(i*0.08).toFixed(2)}s;">${DIE_FACES[d]||d}</span>`
        ).join('')}</div>`;
        animatedLogIds.add(l.id);
      }
      return `
      <div class="log-entry ${l.role}">
        <div class="flex-between">
          <div>${l.meta && l.meta.avatar ? `<img class="who-avatar" src="${escapeAttr(l.meta.avatar)}" onerror="this.style.display='none'" />` : ''}<span class="who mono" ${l.meta && l.meta.color ? `style="color:${escapeAttr(l.meta.color)};"` : ''}>${escapeHTML(l.who)}</span><span class="meta">${new Date(l.ts).toLocaleTimeString('it-IT')}</span></div>
          ${canModerate ? `<div><button class="btn ghost small" data-log-edit="${l.id}" style="padding:2px 6px;">✎</button><button class="btn ghost small" data-log-del="${l.id}" style="padding:2px 6px;">✕</button></div>` : ''}
        </div>
        <div class="txt${l.meta && l.meta.digimoji ? ' digimoji-text' : ''}" ${l.meta && l.meta.digimoji ? `title="${escapeAttr(displayText)}"` : ''}>${escapeHTML(displayText)}</div>
        ${l.meta && l.meta.digimoji ? `<div class="muted" style="font-size:10px;margin-top:2px;">(scritto in Digimoji — passa il mouse per leggere in chiaro)</div>` : ''}
        ${diceHTML}
        ${fulfillBtn}
      </div>
    `;
    }).join('');
  }

  function attachLogModeration(container, code, me){
    if(!container || container.dataset.modBound) return;
    container.dataset.modBound = '1';
    container.addEventListener('click', async (e)=>{
      const editBtn = e.target.closest('[data-log-edit]');
      const delBtn = e.target.closest('[data-log-del]');
      const fulfillBtn = e.target.closest('[data-fulfill-target]');
      if(editBtn){
        const id = editBtn.getAttribute('data-log-edit');
        const entry = cachedLog.find(l=>String(l.id)===String(id));
        const newText = window.prompt('Modifica messaggio:', entry ? entry.text : '');
        if(newText !== null && newText.trim()){
          await editLogEntry(code, id, newText.trim());
          refreshLiveParts();
        }
      }
      if(delBtn){
        const id = delBtn.getAttribute('data-log-del');
        if(window.confirm('Eliminare questo messaggio dal registro?')){
          await deleteLogEntry(code, id);
          refreshLiveParts();
        }
      }
      if(fulfillBtn && me){
        const skillKey = fulfillBtn.getAttribute('data-fulfill-skill');
        const tn = fulfillBtn.getAttribute('data-fulfill-tn');
        const poolKeys = ['baseAccuracy','baseDodge','baseHealth'];
        let text = null;
        let rollMeta = null;
        if(poolKeys.includes(skillKey)){
          const { dice, successes } = rollPool(me.digimon[skillKey]);
          const label = skillKey==='baseAccuracy'?'Accuracy':(skillKey==='baseDodge'?'Dodge':'Health');
          text = `tira Pool Check ${label} (${me.digimon[skillKey]}d6): [${dice.join(',')}] → ${successes} successi (richiesto dal Master)`;
          rollMeta = { dice, successes };
        } else {
          const def = SKILL_DEFS.find(d=>d.key===skillKey);
          if(def){
            const attr = def.attrs[0];
            const attrVal = me.tamer[attr];
            const skillVal = me.tamer.skills[def.key];
            const { dice, total: baseTotal } = rollSkillCheck(attrVal, skillVal);
            let total = baseTotal;
            let aspectNote = '';
            const majorLeft = me.tamer.majorAspect ? (me.tamer.majorAspect.usesLeft||0) : 0;
            const minorLeft = me.tamer.minorAspect ? (me.tamer.minorAspect.usesLeft||0) : 0;
            if(majorLeft>0 || minorLeft>0){
              const choice = window.prompt(`Usare un Aspect? Scrivi "major" (+4, ${majorLeft} usi), "minor" (+2, ${minorLeft} usi), o lascia vuoto per nessuno.`, '');
              if(choice && choice.trim().toLowerCase().startsWith('major') && majorLeft>0){
                total += 4; me.tamer.majorAspect.usesLeft -= 1;
                aspectNote = ` +4 Major Aspect (${me.tamer.majorAspect.text})`;
                await saveMember(session.code, me);
              } else if(choice && choice.trim().toLowerCase().startsWith('minor') && minorLeft>0){
                total += 2; me.tamer.minorAspect.usesLeft -= 1;
                aspectNote = ` +2 Minor Aspect (${me.tamer.minorAspect.text})`;
                await saveMember(session.code, me);
              }
            }
            const verdict = evaluateVsTN(total, tn, dice);
            text = `tira ${def.label} (${ATTR_ABBR[attr]}+Skill): 3d6[${dice.join(',')}] + ${attrVal} + ${skillVal}${aspectNote} = ${total}` + (verdict?` vs TN ${tn} → ${verdict.label}`:'') + ' (richiesto dal Master)';
            rollMeta = { dice, total, verdict: verdict?verdict.label:null };
          }
        }
        if(text){
          await pushLog(code, { who: session.username, role:'roll', text, meta: rollMeta });
          refreshLiveParts();
        }
      }
    });
  }

      return { id:'enc'+Date.now()+Math.random().toString(36).slice(2,6), name:e, dexId:null, stage:'', categories:[], image:'', description:'', baseStats:{baseAccuracy:0,baseDamage:0,baseDodge:0,baseArmor:0,baseHealth:0}, revealed:true, isBoss:false };

  function findCurrentSector(){
    if(!cachedScene.currentSectorId) return null;
    for(const m of (cachedScene.macroScenes||[])){
      const s = (m.sectors||[]).find(x=>x.id===cachedScene.currentSectorId);
      if(s) return s;
    }
    return null;
  }

  async function openEncounterDetail(name, code, username){
    const e = (cachedScene.encounters||[]).map(normalizeEncounter).find(x=>x.revealed!==false && x.name.trim().toLowerCase()===String(name).trim().toLowerCase());
    if(!e) return;
    // Auto-register in the Digidex the moment someone looks this Digimon up, since they've now "met" it.
    let dexMatch = cachedDex.find(d=>String(d.name).trim().toLowerCase()===e.name.trim().toLowerCase());
    try{
      if(!dexMatch){
        const d = await addDexEntry(code, {
          name: e.name, stage: e.stage||'Rookie', description: e.description||'', imageUrl: e.image||'',
          categories: e.categories||[], baseStats: e.baseStats||{}, addedBy: username, discovered: true
        });
        if(d && d.entry){ cachedDex.push(d.entry); dexMatch = d.entry; }
      } else if(!dexMatch.discovered){
        const ok = await updateDexEntry(code, dexMatch.id, {
          name: dexMatch.name, stage: dexMatch.stage, description: dexMatch.description,
          imageUrl: dexMatch.image_url, categories: dexMatch.categories||[], baseStats: dexMatch.base_stats||{},
          evolutions: dexMatch.evolutions||[], qualities: dexMatch.qualities||[], dpTotal: dexMatch.dp_total||0,
          discovered: true
        });
        if(ok) dexMatch.discovered = true;
      }
      const dexLive = document.getElementById('dex-live');
      if(dexLive) dexLive.innerHTML = dexListHTML(cachedDex, session && session.role==='master');
    }catch(err){ /* non-blocking: still show the detail card even if auto-registration fails */ }

    const evolutions = (dexMatch && Array.isArray(dexMatch.evolutions)) ? dexMatch.evolutions : [];
    // Pre-evolutions: any Dex entry that lists this name among ITS evolutions.
    const preEvolutions = cachedDex
      .filter(d => Array.isArray(d.evolutions) && d.evolutions.some(ev => String(ev.name).trim().toLowerCase() === e.name.trim().toLowerCase()))
      .map(d => ({ name: d.name, imageUrl: d.image_url }));
    const description = e.description || (dexMatch && dexMatch.description) || '';
    const categories = (dexMatch && dexMatch.categories && dexMatch.categories.length) ? dexMatch.categories : (e.categories||[]);
    const { attribute, family } = splitCategoriesAttribute(categories);
    const oldModal = document.getElementById('enc-detail-modal');
    if(oldModal) oldModal.remove();
    const modal = document.createElement('div');
    modal.id = 'enc-detail-modal';
    modal.className = 'enc-modal-backdrop';
    modal.innerHTML = `
      <div class="enc-modal-card hud-frame">
        <button class="btn ghost small" id="enc-modal-close" style="position:absolute;top:8px;right:8px;">✕</button>
        ${e.image ? `<div class="enc-modal-img-wrap"><img src="${escapeAttr(e.image)}" onerror="this.style.display='none'" class="enc-modal-img" /></div>` : ''}
        <div class="flex-between" style="margin-top:10px;">
          <b style="font-size:16px;">${escapeHTML(e.name)}</b>
          <span>${e.stage?`<span class="tag">${escapeHTML(e.stage)}</span>`:''}${e.isBoss?`<span class="tag" style="color:var(--danger);border-color:var(--danger);">👑 Boss</span>`:''}</span>
        </div>
        ${(attribute || family.length) ? `<div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px;">${attributeBadgeHTML(attribute)}${family.map(c=>`<span class="tag" style="font-size:9px;">${escapeHTML(c)}</span>`).join('')}</div>` : ''}
        ${description ? `<div class="sub" style="margin-top:8px;">${escapeHTML(description)}</div>` : '<div class="muted" style="margin-top:8px;">Nessuna descrizione disponibile.</div>'}
        ${preEvolutions.length ? `
          <div class="muted" style="margin-top:14px;margin-bottom:4px;">Pre-Evoluzioni</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">${preEvolutions.map(ev=>evoUnlockedHTML(ev)).join('')}</div>
        ` : ''}
        ${evolutions.length ? `

  // ---------- DIGIMOJI: conversione fonetica italiana -> Hiragana ----------
  // Regole pensate per l'ortografia italiana (ca/co/cu = k, che/chi = k, ci = "chi",
  // ga/go/gu = g, ghe/ghi = g, gi = "ji", sci = "shi"), più le varianti standard
  // (romaji "wapuro": ti/tu/si/hu/zi come alternative a chi/tsu/shi/fu/ji).
  const HIRA3 = {chi:'き',che:'け',ghi:'ぎ',ghe:'げ',sci:'し',tsu:'つ',shi:'し'};
  const HIRA2 = {
    ka:'か',ki:'き',ku:'く',ke:'け',ko:'こ',
    ca:'か',co:'こ',cu:'く',ci:'ち',
    sa:'さ',si:'し',su:'す',se:'せ',so:'そ',
    ta:'た',ti:'ち',te:'て',to:'と',tu:'つ',
    na:'な',ni:'に',nu:'ぬ',ne:'ね',no:'の',
    ha:'は',hi:'ひ',hu:'ふ',fu:'ふ',he:'へ',ho:'ほ',
    ma:'ま',mi:'み',mu:'む',me:'め',mo:'も',
    ya:'や',yu:'ゆ',yo:'よ',
    ra:'ら',ri:'り',ru:'る',re:'れ',ro:'ろ',
    wa:'わ',wo:'を',
    ga:'が',gu:'ぐ',go:'ご',gi:'じ',
    za:'ざ',zu:'ず',ze:'ぜ',zo:'ぞ',zi:'じ',
    da:'だ',de:'で',do:'ど',di:'ぢ',du:'づ',
    ba:'ば',bi:'び',bu:'ぶ',be:'べ',bo:'ぼ',
    pa:'ぱ',pi:'ぴ',pu:'ぷ',pe:'ぺ',po:'ぽ',
  };
  const HIRA1 = {a:'あ',i:'い',u:'う',e:'え',o:'お',n:'ん'};

  function italianToHiragana(text){
    let out = '';
    const lower = String(text||'').toLowerCase();
    let i = 0;
    while(i < lower.length){
      const c3 = lower.substr(i,3);
      const c2 = lower.substr(i,2);
      const c1 = lower.substr(i,1);
      if(c3.length===3 && HIRA3[c3]){ out += HIRA3[c3]; i+=3; continue; }
      if(c2.length===2 && HIRA2[c2]){ out += HIRA2[c2]; i+=2; continue; }
      if(HIRA1[c1]){ out += HIRA1[c1]; i+=1; continue; }
      out += text[i]; i+=1;
    }
    return out;
  }

  // Collega la conversione live a una textarea + checkbox "Digimoji".
  // Converte una parola non appena viene completata (spazio/punteggiatura/a capo),
  // evitando l'ambiguità della "n" (es. "montana" convertita lettera per lettera
  // rischierebbe di leggere "n" come ん prima di sapere se segue una vocale).
  function attachDigimojiInput(taId, chkId){
    const ta = document.getElementById(taId);
    const chk = document.getElementById(chkId);
    if(!ta || !chk) return;
    function convertWordBeforeBoundary(){
      const val = ta.value;
      const pos = ta.selectionStart == null ? val.length : ta.selectionStart;
      if(pos===0) return;
      const justTyped = val[pos-1];
      if(/[a-zA-Z]/.test(justTyped)) return; // parola non ancora conclusa
      let start = pos-2;
      while(start>=0 && /[a-zA-Z]/.test(val[start])) start--;
      start++;
      const wordEnd = pos-1;
      if(start>=wordEnd) return;
      const word = val.slice(start, wordEnd);
      const converted = italianToHiragana(word);
      if(converted===word) return;
      ta.value = val.slice(0,start) + converted + val.slice(wordEnd);
      const newPos = start + converted.length + (pos - wordEnd);
      try{ ta.setSelectionRange(newPos, newPos); }catch(e){}
    }
    function convertAllNow(){
      if(!chk.checked) return;
      const pos = ta.selectionStart == null ? ta.value.length : ta.selectionStart;
      const convertedBefore = italianToHiragana(ta.value.slice(0,pos));
      ta.value = italianToHiragana(ta.value);
      const newPos = convertedBefore.length;
      try{ ta.setSelectionRange(newPos, newPos); }catch(e){}
    }
    ta.addEventListener('input', ()=>{ if(chk.checked) convertWordBeforeBoundary(); });
    ta.addEventListener('blur', convertAllNow);
    chk.addEventListener('change', ()=>{ if(chk.checked) convertAllNow(); });
    // Passata di sicurezza: converte per intero (anche l'ultima parola rimasta
    // a metà) subito prima dell'invio effettivo del messaggio.
    ta.dataset.digimojiFinalize = 'true';
  }


  // ---------- global dex filter delegation ----------
  document.addEventListener('click', function(e){
    const chip = e.target.closest('[data-filter-cat]');
    if(!chip) return;
    const cat = chip.getAttribute('data-filter-cat');
    if(cat === '__clear__'){
      dexActiveFilters = [];
    } else {
      const idx = dexActiveFilters.indexOf(cat);
      if(idx>=0) dexActiveFilters.splice(idx,1); else dexActiveFilters.push(cat);
    }
    const dexLive = document.getElementById('dex-live');
    if(dexLive){
      dexLive.innerHTML = dexListHTML(cachedDex, dexCanEditGlobal);
      if(dexCanEditGlobal && session) bindDexEditButtons(session.code);
    }
  });

  // ---------- boot ----------
  const restored = loadSession();
  if(restored && restored.code && restored.username){
    session = restored;
  }
  render();
})();
</script>

</html>
