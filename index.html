  const STAGES = ['Fresh','Baby','Rookie','Champion','Ultimate','Mega'];
  const DEX_ATTRIBUTES = ['Vaccine','Data','Virus','Free','Variable'];
  const DEX_ATTRIBUTE_COLOR = { Vaccine:'#5aa8ff', Data:'#3ddc84', Virus:'#ff5d5d', Free:'#b8b8b8', Variable:'#ff8a3d' };
  // A Dex entry's "categories" array holds both Attribute and Family/Field tags together (no separate
  // backend column for them). We treat any value matching a known Attribute as *the* Attribute, and
  // everything else as Family tags, so we can show/edit them as distinct fields without any schema change.
  function splitCategoriesAttribute(categories){
    const cats = Array.isArray(categories) ? categories : [];
    const attribute = cats.find(c=>DEX_ATTRIBUTES.includes(c)) || '';
    const family = cats.filter(c=>!DEX_ATTRIBUTES.includes(c));
    return { attribute, family };
  }
  function attributeBadgeHTML(attribute){
    if(!attribute) return '';
    const color = DEX_ATTRIBUTE_COLOR[attribute] || 'var(--text-mute)';
    return `<span class="tag" style="color:${color};border-color:${color};">${escapeHTML(attribute)}</span>`;
  }
  function stageIndex(s){ const i = STAGES.indexOf(s); return i<0?0:i; }
  function batteryCap(stage){ return stageIndex(stage)+1; }
  function evolutionCost(d, targetStage){
    const comfortableMax = stageIndex(d.defaultStage) + Number(d.defaultRange||0);
    return Math.max(0, stageIndex(targetStage) - comfortableMax);
  }

  function snapshotCurrentStatsToStage(d, stage){
    if(!d.stageStats) d.stageStats = {};
    d.stageStats[stage] = {
      baseAccuracy: d.baseAccuracy, baseDamage: d.baseDamage, baseDodge: d.baseDodge,
      baseArmor: d.baseArmor, baseHealth: d.baseHealth, maxWounds: d.maxWounds, maxMp: d.maxMp, size: d.size
    };
  }

  function applyStageChange(d, oldStage, newStage){
    if(oldStage === newStage) return;
    snapshotCurrentStatsToStage(d, oldStage);
    if(!d.stageStats) d.stageStats = {};
    const saved = d.stageStats[newStage];
    if(saved){
      d.baseAccuracy = saved.baseAccuracy; d.baseDamage = saved.baseDamage; d.baseDodge = saved.baseDodge;
      d.baseArmor = saved.baseArmor; d.baseHealth = saved.baseHealth;
      d.maxWounds = saved.maxWounds; d.maxMp = saved.maxMp;
      d.size = saved.size || allowedSizes(newStage)[0] || 'Medium';
    } else {
      const cfg = STAGE_CREATION[newStage] || { startStat:1 };
      d.baseAccuracy = cfg.startStat; d.baseDamage = cfg.startStat; d.baseDodge = cfg.startStat;
      d.baseArmor = cfg.startStat; d.baseHealth = cfg.startStat;
      d.maxWounds = stageIndex(newStage) + cfg.startStat*2;
      d.size = allowedSizes(newStage)[0] || 'Medium';
    }
    d.stage = newStage;
    if(d.currentWounds > d.maxWounds) d.currentWounds = d.maxWounds;
    if(d.currentMp > d.maxMp) d.currentMp = d.maxMp;
    if(!allowedSizes(newStage).includes(d.size)) d.size = allowedSizes(newStage)[0] || 'Medium';
  }

  function attackTagsPlain(a){
    const tags = [`[${a.shape.toUpperCase()}${a.shape==='Range'?' '+(a.reach||1):''}]`, `[${a.type.toUpperCase()}]`];
    if(a.areaAttack) tags.push('[AREA]');
    if(a.type==='Support' && a.effectKey){
      const def = EFFECT_DEFS.find(d=>d.key===a.effectKey);
      if(def) tags.push(`[${def.label.toUpperCase()}]`);
    }
    if(a.extraTags) tags.push(a.extraTags);
    return tags.join(' ');
  }
  function attackTagsHTML(a){
    const shapeColor = a.shape==='Melee' ? 'var(--amber)' : 'var(--cyan)';
    const typeColor = a.type==='Damage' ? 'var(--danger)' : '#c896ff';
    let html = `<span class="tag" style="color:${shapeColor};border-color:${shapeColor};margin-right:3px;">${a.shape==='Melee'?'🗡️':'🏹'} ${a.shape}${a.shape==='Range'?' ('+(a.reach||1)+' zone)':''}</span><span class="tag" style="color:${typeColor};border-color:${typeColor};margin-right:3px;">${a.type==='Damage'?'💥':'✨'} ${a.type}</span>`;
    if(a.areaAttack) html += `<span class="tag" style="color:var(--amber);border-color:var(--amber);margin-right:3px;">🌪 Area</span>`;
    if(a.type==='Support' && a.effectKey){
      const def = EFFECT_DEFS.find(d=>d.key===a.effectKey);
      if(def) html += `<span class="tag" style="margin-right:3px;">${def.label}</span>`;
    }
    if(a.extraTags) html += `<span class="tag">${escapeHTML(a.extraTags)}</span>`;
    return html;
  }

  function computeDpSpent(qualities){
    return (qualities||[]).reduce((sum,q)=>sum+(Number(q.cost)||0),0);
  }

  function qualitiesReadonlyHTML(qualities){
    if(!qualities || qualities.length===0) return '<div class="muted">Nessuna Quality registrata.</div>';

      <div class="roster-item" style="padding:6px 8px;margin-bottom:4px;">

        </div>
        ${q.description ? `<div class="sub" style="margin-top:2px;">${escapeHTML(q.description)}</div>` : ''}
      </div>
    `).join('');
  }

    { name:'Ammo', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'ammo', desc:'Un Attacco ignora la regola "una volta a round" — utilizzabile più volte per combattimento, fino a un numero di volte pari allo Stage.' },
    { name:'Combat Monster', category:'Static', dpPerRank:2, maxRank:3, mechanic:'combatMonster', desc:'Guadagna Resolve pari al danno subito (max Stage+2). Quando colpisce con un Attacco, tutto il Resolve si aggiunge al Danno e si azzera.' },
    { name:'Charge Attack', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'Un Attacco [MELEE] permette di Muoversi prima o dopo, nella stessa Azione (richiede Movimento non gestito dal sito).' },
    { name:'Heavy Recoil', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'Un Attacco [RANGE] ignora la penalità di Melee-adiacenza, ma ha un contraccolpo (dettagli a discrezione del Master).' },
    { name:'Substitute', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'Se il Dodge fallisce, puoi tentare un Check RAM (TN 10+BIT dell\'Attaccante) per annullare il colpo, perdendo Caselle Ferita pari a Stage+1.' },
    { name:'Bullet Proof', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Attacchi ripetuti dello stesso Nemico nello stesso round subiscono una penalità crescente pari al tuo Stage.' },
    { name:'Point Blank', category:'Clash', dpPerRank:1, maxRank:1, mechanic:'', desc:'Puoi usare Attacchi [RANGE] come se fossero [MELEE] durante un Clash.' },
    { name:'Reach', category:'Clash', dpPerRank:1, maxRank:1, mechanic:'', desc:'Puoi Clashare da più lontano del normale (dettagli a discrezione del Master).' },
    { name:'Monster Strength', category:'Clash', dpPerRank:1, maxRank:1, mechanic:'monsterStrength', desc:'Puoi Lanciare o Muovere in Clash un avversario 2+ Size più grande di te.' },
    { name:'Titan Power', category:'Clash', dpPerRank:1, maxRank:1, mechanic:'', desc:'Puoi Lanciare avversari ancora più grandi rispetto a Monster Strength.' },
    { name:'Armor Piercing', category:'Attack', dpPerRank:2, maxRank:2, mechanic:'', desc:'L\'Attacco infligge Danno Unalterable extra (ignora Armor) pari ai Successi in eccesso, fino ai Ranks.' },
    { name:'Second Wind', category:'Trigger', dpPerRank:2, maxRank:3, mechanic:'', desc:'Rank max = Stage (fino a 3). Quando si tira l\'Iniziativa, ottieni usi pari ai Ranks. Ogni uso: Recovery Check come 1 Azione (max 1 volta a turno, non puoi Attaccare lo stesso turno). Gli usi non spesi si perdono a fine Combattimento, ma ogni uso non speso dà Caselle Ferita extra al Recovery Check di fine Combattimento. Tracciare gli usi a mano.' },
    { name:'Pack Master', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'Se il Digimon è bersaglio di un Attacco, un Alleato adiacente può Intercedere come Azione Libera, una volta a round.' },
    { name:'Vital Energy', category:'Trigger', dpPerRank:1, maxRank:2, mechanic:'', desc:'Richiesta per Illness. Rank 1: una volta a round, ritira gli 1 usciti in un Check di Health. Rank 2: ritira anche i 2 sullo stesso tiro.' },
    { name:'System Boost', category:'Static', dpPerRank:2, maxRank:4, mechanic:'', desc:'Rank max = Stage (fino a 4). Per Rank, scegli una Stat Derivata diversa (RAM/CPU/BIT/DOS): +1 a quella Stat. Sconto di 1 DP al primo acquisto.' },
    { name:'Teleport', category:'Static', dpPerRank:3, maxRank:1, mechanic:'', desc:'Richiesta per Transporter. Teletrasporto istantaneo pari a Stage+2 spazi (serve linea di vista; +Ranks di Instinct, +1 con Data Optimization: Speedster — non gestito dal sito). Una volta a combattimento, come Azione Interrupt, può far fallire un Attacco nemico teletrasportandosi via (non attiva Contrattacchi), oppure come Azione di Clash per fuggire automaticamente dal Clash.' },
    { name:'Glamor', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'Incompatibile con Illusionary Overlay. Come 2 Azioni, applica un\'illusione d\'aspetto a bersagli entro metà BIT spazi con un Check BIT (Performance), penalità pari al numero di bersagli oltre il primo. Chi dubita può opporre un Check BIT pari al risultato per smascherarla. Dura finché non ne crei una nuova, sei portato a 0 Ferite, o perdi la Quality.' },
    { name:'Illusionary Overlay', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'Come 2 Azioni entro range BIT, Check BIT (Manipulate) TN 8+Nemici in Combattimento, crea uno Shroud illusorio (con Naturewalk associato: chi non ce l\'ha è Accecato dentro, chi è fuori vede Oscurati i bersagli dentro) o Barriere illusorie (bloccano movimento/attacco finché non vengono scoperte). Un bersaglio può opporre un Check DOS (Awareness) TN pari ai Successi per smascherarla. TN sale di 3 a ogni uso successivo nello stesso Combattimento.' },
    { name:'Technician', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiesta per Firewall, Trojan, Data Scan. +3 ai Check per riparare/decifrare codice o macchinari, capire l\'ambiente digitale (incluso se corrotto), ricostruire strutture/macchinari nel Mondo Digitale.' },
    { name:'Firewall', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede Technician. Il bonus di Technician sale a +6 (ulteriori +3) e si applica anche a: scovare intrusi che hackerano un\'area, proteggere/rinforzare codice che stai riparando, mantenere una Domain Control, resistere a effetti che alterano il proprio codice (es. Suppression).' },
    { name:'Trojan', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede Technician. Il bonus di Technician sale a +6 (ulteriori +3) e si applica anche a: manipolare il codice per accedere ad aree protette, danneggiare/corrompere codice o macchinari (limiti decisi dal Master).' },
    { name:'Hide in Plain Sight', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiesta per Shade Cloak, Sneak Attack. Check Stealth come 1 Azione invece di 2 per Nascondersi (anche in vista di chi ti cerca), una volta a turno. Resti Nascosto finché non interagisci con un altro partecipante (es. attacchi).' },
    { name:'Shade Cloak', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede Hide in Plain Sight. Quando fai il Check Stealth, con 1 Azione extra estendi lo stesso risultato/beneficio agli Alleati scelti entro RAM spazi, finché restano a quella distanza. Se un Alleato beneficiato interferisce con un altro Digimon, il beneficio finisce per tutti.' },
    { name:'Sneak Attack', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede Hide in Plain Sight. Applica il Tag [SNEAK] a un Attacco (su [RANGE] richiede 1 Azione extra). Se attacchi un bersaglio da cui sei Nascosto e non ti ha rilevato, +RAM Accuracy su quell\'Attacco.' },
    { name:'Simplified Strike', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'Applica il Tag [SIMPLE] a un Attacco: quell\'Attacco costa 1 Azione in meno (minimo 1), incluso per costi extra come Called Shot o [T:DRAIN] potenziato. Non riduce il costo di Azione degli Effetti d\'Attacco.' },
    { name:'Watchful Hunter', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'Una volta a round, Check DOS (Awareness) come Azione Libera nel proprio turno; ignora le penalità da Oscurato (non da Accecato). Come Azione Libera (o 2 Azioni) puoi mirare un Nemico con Check DOS (Awareness) TN 12+RAM bersaglio: su Successo +2 Accuracy su [MELEE] contro quel bersaglio fino al tuo prossimo turno (trattato come non Oscurato); su Successo Critico il bonus vale anche per [RANGE]; su Fallimento Critico consideri il bersaglio Oscurato fino al tuo prossimo turno.' },
    { name:'Giant Hijacker', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'Solo contro Nemici di Size maggiore di almeno 1. Come 1 Azione da adiacente, Check CPU (Athletics) TN 10+RAM bersaglio-CPU proprio. Successo: ti aggrappi e ti muovi con lui (non è un Clash, entrambi mantengono le proprie Azioni). Successo Critico: la TN per scrollarti di dosso sale di 3. Fallimento Critico: subisci [SLOW 2] fino al tuo prossimo turno. Il bersaglio usa 1 Azione con Check CPU TN 10+tuo RAM per scrollarti via; tu puoi staccarti in ogni momento come Azione Libera.' },
    { name:'Horde Duelist', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'Incompatibile con Aggressive Flank. Solo se sei adiacente esclusivamente a Nemici: come 1 Azione, Check BIT (Survival) TN 10+Stage più alto tra i Nemici adiacenti+numero di Nemici adiacenti (i Minion non contano). Successo: +BIT Accuracy sugli Attacchi contro Nemici adiacenti privi di Alleati adiacenti a loro volta, fino al tuo prossimo turno (finisce prima se un Alleato si avvicina). Successo Critico: riottieni l\'Azione spesa. Fallimento Critico: non puoi riusarla fino a fine Combattimento.' },
    { name:'Exposing Hold', category:'Clash', dpPerRank:2, maxRank:1, mechanic:'', desc:'Quando vinci un Check per controllare un Clash, puoi scegliere di attivare questa Quality fino al tuo prossimo tentativo di controllo: non puoi usare l\'Azione Pin, ma l\'Avversario riduce il Danno subito da Attacchi esterni solo di metà del proprio CPU (non della somma dei CPU) — stessa logica per [SUPPORT] con RAM.' },
    { name:'Slippery', category:'Clash', dpPerRank:1, maxRank:1, mechanic:'', desc:'Quando un Nemico tenta di iniziare un Clash con te, o tu tenti di Fuggire da un Clash, puoi tirare RAMx2 invece del Check CPU+RAM. Se il tuo risultato supera quello dell\'iniziatore, il tentativo di Clash finisce subito e l\'iniziatore non può ritentare fino al round successivo. Se è inferiore, l\'iniziatore controlla subito il Clash.' },
    { name:'Fastball', category:'Clash', dpPerRank:1, maxRank:1, mechanic:'', desc:'Come 1 Azione, lancia un Alleato volontario di Size inferiore alla tua (nessun limite di Size con Monster Strength) entro la tua portata di Clash. Se l\'Alleato ha un Attacco [CHARGE] e viene lanciato su un Nemico, può fare quell\'Attacco come Azione Interrupt senza muoversi tu. Con 2 Azioni invece di 1, l\'Alleato riceve 1 Azione extra (l\'Interrupt può diventare gratuito) o puoi usare [T:PASS] per colpire più bersagli nel lancio.' },
    { name:'Counterattack', category:'Trigger', dpPerRank:1, maxRank:2, mechanic:'', desc:'Richiesta per Counterblow, Cross Counter, Return Fire, Instant Counter. Se un Nemico manca un Attacco contro di te, puoi usare un\'Azione Interrupt per attaccarlo (Attacco da 1 Azione a scelta); il bersaglio subisce una penalità a Dodge pari al tuo Stage. Utilizzabile un numero di volte a Combattimento pari ai Ranks. Non puoi contrattaccare come Area Attack.' },
    { name:'Aggressive Flank', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiesta per Coordinated Assault. Incompatibile con Horde Duelist. +RAM (o Stage se maggiore) Accuracy quando sei adiacente a un Alleato, o quando tu e un Alleato siete entrambi adiacenti allo stesso Nemico bersaglio.' },
    { name:'Basic Effect: Fear', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [FEAR] su un Attacco [SUPPORT]. Senza questa Quality (o senza pagare il suo DP), il Master può vietare la selezione dell\'Effetto sull\'Attacco.' },
    { name:'Basic Effect: Slow', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [SLOW] su un Attacco [SUPPORT].' },
    { name:'Basic Effect: Keen', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [KEEN] su un Attacco [SUPPORT].' },
    { name:'Basic Effect: Swift', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [SWIFT] su un Attacco [SUPPORT].' },
    { name:'Basic Effect: Cleanse', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [CLEANSE] su un Attacco [SUPPORT] (riduce la Durata degli Effetti sul bersaglio).' },
    { name:'Basic Effect: Root', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [ROOT] su un Attacco [SUPPORT].' },
    { name:'Basic Effect: Taunt', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [TAUNT] su un Attacco [SUPPORT].' },
    { name:'Basic Effect: Push', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [PUSH] su un Attacco [SUPPORT].' },
    { name:'Basic Effect: Pull', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [PULL] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Confuse', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [CONFUSE] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Distract', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [DISTRACT] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Dull', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [DULL] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Frail', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [FRAIL] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Sturdy', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [STURDY] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Sharpen', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [SHARPEN] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Nimble', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [NIMBLE] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Exploit', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [EXPLOIT] su un Attacco [SUPPORT].' },
    { name:'Advanced Effect: Burn', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [BURN] (Danno) su un Attacco [DAMAGE][SUPPORT].' },
    { name:'Advanced Effect: Poison', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [POISON] (Danno) su un Attacco [DAMAGE][SUPPORT].' },
    { name:'Advanced Effect: Shield', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [SHIELD] su un Attacco [SUPPORT] (garantisce Caselle Ferita Temporanee).' },
    { name:'Master Effect: Fury', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [FURY] su un Attacco [SUPPORT] (Accuracy e Damage insieme).' },
    { name:'Master Effect: Pacify', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [PACIFY] su un Attacco [SUPPORT] (Accuracy e Damage insieme).' },
    { name:'Master Effect: Debilitate', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [DEBILITATE] su un Attacco [SUPPORT] (riduce tutte le Stat tranne Health).' },
    { name:'Master Effect: Bastion', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [BASTION] su un Attacco [SUPPORT] (le 4 Stat di combattimento insieme; è anche l\'Effetto dato da Battle Cry).' },
    { name:'Master Effect: Daring', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [DARING] su un Attacco [SUPPORT] (Accuracy e Armor insieme).' },
    { name:'Huge Power', category:'Trigger', dpPerRank:1, maxRank:2, mechanic:'', desc:'Rank 1: una volta a round, ritira gli 1 usciti in un tiro di Accuracy. Rank 2: ritira anche i 2 sullo stesso tiro. Non si applica ai dadi Bonus da Azioni del Tamer.' },
    { name:'Combat Awareness', category:'Static', dpPerRank:1, maxRank:3, mechanic:'', desc:'Rank 1: Check Awareness come 1 Azione invece di 2; +Ranks a Iniziativa; +Ranks ad Accuracy e Dodge nel primo Round di Combattimento. Rank 2: +Ranks anche a Movimento nel primo Round (non gestito dal sito). Rank 3 (variante): puoi scambiare la tua Iniziativa con quella di un Alleato consenziente quando viene tirata.' },
    { name:'Battle Cry', category:'Trigger', dpPerRank:3, maxRank:1, mechanic:'', desc:'Come 1 Azione, Check DOS (Bravery) TN 10+somma degli Stage dei nemici in combattimento (min 1 a nemico, il Master può aumentarla per i Boss). Tu e gli Alleati entro DOS spazi ottenete [BASTION] (bonus ad Accuracy/Damage/Dodge/Armor) per 1 round: Potenza 1 su Fallimento, pari al tuo Stage su Successo. Su Successo Critico riottieni l\'Azione spesa. Ogni uso successivo nello stesso Combattimento alza la TN di 6.' },
    { name:'Resistance', category:'Static', dpPerRank:2, maxRank:3, mechanic:'resistance', desc:'Riduce la Potenza degli Effetti negativi subiti pari ai Ranks (min. 1).' },
    { name:'Algorithm', category:'Static', dpPerRank:1, maxRank:2, mechanic:'', desc:'STAGE 2+ — Ignora l\'incompatibilità tra Weapon e Instinct: puoi comprare Ranks in entrambi, limitati dai Ranks di questa Quality (Rank 1 → 1 Rank in ciascuno; Rank 2, solo da Stage 3+ → 2 Ranks in ciascuno). Richiesta per Pure Digizoid Weaponry e Pure Overwrite. Incompatibile con 3 Ranks di Weapon, 3 Ranks di Instinct, altri Digizoid Weaponry o Gain Force.' },
    { name:'Sprint', category:'Static', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Il Digimon aggiunge il proprio RAM al Movimento (non gestito dal sito, applicare a discrezione del Master).' },
    { name:'Data Specialization: Fistful of Force', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Close Combat. 1 Rank gratuito in Area Attack. Gli Attacchi Area [MELEE] usano la Dimensione Massima e i bersagli nella Dimensione Base di un\'Area [DAMAGE][MELEE] non dimezzano il Danno dopo l\'Armor.' },
    { name:'Data Specialization: Flurry', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Close Combat. Un\'Azione al proprio turno può produrre un ulteriore Attacco [MELEE][DAMAGE], ignorando la regola "un Attacco a round" (senza altri Tag extra).' },
    { name:'Data Specialization: Mobile Artillery', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Ranged Striker. 1 Rank gratuito in Area Attack. I bersagli nella Dimensione Base di un\'Area [RANGE] non dimezzano il Danno dopo l\'Armor (non si applica se ha anche un Tag Effetto). Con 1 Rank di Naturewalk, può spendere 1 Azione extra per rendere l\'area Terreno Difficile dell\'Elemento scelto fino al proprio prossimo turno.' },
    { name:'Data Specialization: Sniper', category:'Static', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Ranged Striker. +3 Range e Limite Effettivo. Può usare l\'Azione Called Shot (opzione Sharpshooter) illimitatamente a combattimento, con penalità ad Accuracy dimezzata. Ignora il bonus di Uncatchable Target avversario (non quello di Data Optimization: Speedster).' },
    { name:'Data Specialization: Try Something', category:'Static', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Warden. 1 Rank gratuito in Counterattack. Un Attacco fuori dal proprio turno con Azione Interrupt (non Hold Action) ignora la regola "un Attacco a round".' },
    { name:'Data Specialization: True Guardian', category:'Static', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Warden. Quando Intercede, guadagna Armor pari alla distanza percorsa per Intercedere. Se l\'Attacco intercettato aveva Tag Area, gli Alleati dietro il Digimon riducono il Danno subito del proprio CPU (min 1) e negano i Tag Effetto. Se ha speso 2 Azioni per Intercedere prima del proprio turno, guadagna 1 Azione quel turno.' },
    { name:'Data Specialization: Power Throw', category:'Clash', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Brawler. Fastball gratuita. Quando lancia un bersaglio (Alleato o Nemico) in Clash, sceglie: distanza raddoppiata, +CPU ad Accuracy se lancia su un Nemico, o +metà CPU a Danno se non lancia su un Nemico. Un Alleato lanciato non subisce Danno dal lancio.' },
    { name:'Data Specialization: Wrestlemania', category:'Clash', dpPerRank:2, maxRank:1, mechanic:'wrestlemania', desc:'STAGE 4+ — Richiede Data Optimization: Brawler. In Clash, sblocca l\'Azione Finisher: dopo un Attacco riuscito, tira CPU o BIT (TN 10+Stage) per danno bonus, poi il Clash finisce.' },
    { name:'Data Specialization: Hit and Run', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Speedster. Charge Attack o Heavy Recoil gratuita. Con Tag [CHARGE]/[RECOIL] non è vincolato a muoversi in linea retta; muovendosi almeno 2 spazi prima dell\'Attacco, aggiunge RAM al Danno. Non può essere colpito con Punishing Strike mentre lo usa.' },
    { name:'Data Specialization: Uncatchable Target', category:'Static', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Speedster. +3 Dodge, nessuna penalità crescente se attaccato più volte nello stesso round (Coordinated Assault e Sniper avversari ignorano questo bonus). Incompatibile con Absolute Evasion.' },
    { name:'Data Specialization: Status Warlord', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Effect Warrior. Sconto una tantum di 1 DP su un Effetto d\'Attacco. Se fa un Attacco [DAMAGE] senza Tag Effetto nel proprio turno, può fare anche un Attacco [SUPPORT] lo stesso turno ignorando la regola "un Attacco a round" (e viceversa). Incompatibile con Zoner: Friendly Fire, Dark Emblem, Holy Ward.' },
    { name:'Data Specialization: Code Wizard', category:'Static', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Effect Warrior. La Durata massima di tutti gli Effetti creati aumenta di 1. Può usare Called Shot (opzione Focused) illimitatamente a combattimento con penalità dimezzata. Ignora il requisito del Tag [DAMAGE] per alcuni Effetti (es. [BURN]).' },
    { name:'Data Specialization: Tactical Adaptation', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization: Variable. Guadagna una Stance Quality gratis, oppure 2 Ranks gratuiti di Mode Change. All\'inizio dell\'Iniziativa può fare Change Stance come Azione Libera; sul proprio turno può farlo come Azione Libera (o Mode Change se disponibile).' },
    { name:'Data Specialization: Supreme Code', category:'Static', dpPerRank:2, maxRank:1, mechanic:'supremeCode', desc:'STAGE 4+ — Richiede Data Optimization: Variable. +1 automatico ad Accuracy, Damage, Dodge e Armor. +1 anche a Health, da applicare manualmente a Ferite Massime.' },
    { name:'Prodigious Skill', category:'Static', dpPerRank:1, maxRank:4, mechanic:'', desc:'Rank max = Stage (fino a 4). Scegli una Skill del Tamer (es. Feats of Strength, Stealth, Awareness): +1+2×Stat Derivata associata (CPU per Skill di Corpo, RAM per Agilità, BIT per Intelligenza/Carisma, DOS per Volontà) sui Check di quella Skill, invece della sola Stat Derivata.' },
    { name:'Mighty Blow', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 2+ — Applica [MIGHTY] a un Attacco [MELEE][DAMAGE]. Se infligge almeno 2 Danno dopo Armor (no Unalterable), Check CPU (Feats of Strength) TN 10+CPU bersaglio: Successo → [STUN] al bersaglio; Successo Critico → anche +2 Danno extra; Fallimento Critico → -1 Danno (min 1). La TN sale di 3 a ogni uso successivo (salvo Signature Move). Compatibile con altri Effetti tranne quelli di Danno.' },
    { name:'Precise Focus', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Applica [FOCUS] a un Attacco [RANGE]: ogni punto di Danno toglie 2 Caselle Ferita Temporanee invece di 1. Se usato con 1 Azione extra (Bolster, Called Shot, ecc.), Check RAM (Precision) TN 12+RAM bersaglio: Successo +3 Accuracy, Successo Critico +5 Accuracy, Fallimento Critico nessun bonus. Nessun beneficio su Area Attack.' },
    { name:'Feint Attack', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Applica [T:FEINT] a un Attacco [MELEE]. Attivabile alla dichiarazione: l\'Attacco subisce una penalità a Danno pari al tuo Stage, poi Check BIT (Manipulate) TN 6+BIT bersaglio; su Successo dimezzi il Dodge (o l\'Armor) del bersaglio per quell\'Attacco. Incompatibile con Counterattack.' },
    { name:'Counterblow', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede 1 Rank di Counterattack. Incompatibile con Cross Counter, Return Fire. Applica [COUNTER] a un Attacco [MELEE], usabile solo con Counterattack. Quando attivi Counterattack, scegli: dimezzare il Dodge del bersaglio, dimezzare il suo Armor, oppure spendere 2 usi di Counterattack per entrambi.' },
    { name:'Cross Counter', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede 1 Rank di Counterattack. Incompatibile con Counterblow, Combat Monster, Return Fire, Instant Counter. Applica [COUNTER] a un Attacco [MELEE], usabile solo con Counterattack. Puoi attivare Counterattack anche se il Nemico colpisce (non solo se manca), quando subisci almeno Stage+1 Danno dopo Armor da un suo [MELEE]. Se attivato durante un\'Intercede, il bersaglio non dimezza il Dodge.' },
    { name:'Return Fire', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede 1 Rank di Counterattack. Incompatibile con Counterblow, Cross Counter. Applica [COUNTER] a un Attacco [RANGE], usabile solo con Counterattack. Se Counterattack scatta da un Attacco [RANGE], ignori le penalità per attaccare entro il Limite Effettivo.' },
    { name:'Instant Counter', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede 1 Rank di Counterattack. Incompatibile con Cross Counter. Puoi usare l\'Azione Interrupt di Counterattack come Azione Libera, una volta a Combattimento.' },
    { name:'Lifesteal', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Applica [T:DRAIN] a un Attacco (non su Attacchi con Tag Effetto). Cura Caselle Ferita pari al Danno inflitto, fino a un massimo di DOS (+Stage extra spendendo 1 Azione in più). Su Area Attack usa il Danno complessivo per calcolare la cura.' },
    { name:'Reload', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede Ammo. Come 2 Azioni, Check BIT (Precision) TN 18-RAM per riottenere l\'uso dell\'Attacco [AMMO]: Successo lo riottieni, Successo Critico riottieni anche 1 Azione, Fallimento Critico non puoi più riprovare in questo Combattimento. La TN sale di 3 a ogni uso riuscito successivo.' },
    { name:'Brace', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Quando subisci Danno da un Attacco, Azione Interrupt per Check CPU (Endurance) TN 10+Danno dopo Armor: Successo dimezza ulteriormente il Danno, Successo Critico porta a 0 se scenderebbe a 1, Fallimento Critico +1 Danno. Non incide sul Danno Unalterable. La TN sale di 3 a ogni uso (e ancora +3 se usato su un Attacco da cui hai Interceduto).' },
    { name:'Savagery', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede Combat Monster. Una volta a round, quando dichiari un Attacco puoi attivarla: Check CPU (Endurance) TN 15-DOS (dettagli su successo/fallimento a discrezione del Master in base al testo completo della Quality).' },
    { name:'Assured Destruction', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede Combat Monster. Quando attacchi un Nemico, puoi convertire qualsiasi quantità di Resolve in dadi extra sulla Pool di Accuracy invece che in Danno bonus, solo per quell\'Attacco.' },
    { name:'Focused Resistance', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiesta per Immunity. Quando subiresti un Effetto da un Attacco, Azione Interrupt per raddoppiare la tua Resistenza contro quell\'Effetto in arrivo.' },
    { name:'Immunity', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede Focused Resistance. La tua Resistenza può ridurre la Potenza di un Effetto in arrivo sotto 2; se scenderebbe a 0, l\'Effetto è negato del tutto. L\'Azione Resist conta come se stessi usando un\'Azione extra.' },
    { name:'Element Master', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede 1 Rank di Naturewalk. Richiesta per Domain Control, Elemental Myriad, Adaptive/Altered Element. Puoi manipolare liberamente fonti naturali del tuo Elemento e produrre effetti unici non di combattimento (a discrezione del Master, eventuale Check DOS Fortitude per usi difficili). Ignora del tutto gli Attacchi Elemental Force dello stesso Elemento e dimezza il Danno Unalterable da Terreno Pericoloso dello stesso Elemento.' },
    { name:'Domain Control', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede Element Master. Incompatibile con Elemental Myriad. Come 2 Azioni (serve una fonte dell\'Elemento, o Check DOS Fortitude TN 10+2×Stage con Conjurer), crea una Domain con Durata ed effetto raggio pari a Stage+1 che ti segue; applica un effetto legato all\'Elemento scelto (vedi tabella Domini nel manuale) a Nemici o Alleati nell\'area a ogni tuo turno. Un Digimon con lo stesso Naturewalk può ignorare l\'effetto.' },
    { name:'Inspiring Guidance', category:'Attack', dpPerRank:1, maxRank:3, mechanic:'', desc:'Richiede 1 Rank di Basic/Advanced/Master Effect. Applica [GUIDING] a un Attacco [SUPPORT] con Effetto positivo (Ranks max = DP speso sull\'Effetto collegato). Se l\'Effetto positivo va a segno, Check BIT (Persuasion) TN 10+Stage: su Successo il bersaglio ottiene una riserva di dadi "Guiding" (pari ai Ranks, +1 su Successo Critico) da aggiungere a qualsiasi Pool Check finché durano o finché dura l\'Effetto. Solo un Digimon alla volta può beneficiarne.' },
    { name:'Overclock', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'Devi anche comprare un Effetto positivo che usa una Stat Derivata del lanciatore (pagandolo normalmente); quell\'Effetto si applica a questa Quality invece che a un Attacco, e non puoi più comprarlo separatamente. Come 1 Azione, Check con la Stat Derivata associata TN 10+Stage: Successo → ti applichi l\'Effetto (con la tua Potenza) fino al tuo prossimo turno; Successo Critico → dura 3 round.' },
    { name:'Overdrive', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Come Azione Libera una volta a round, Check CPU (Athletics) TN 15-RAM: Successo → [HASTE] per quel turno, ma -2 Dodge per 1 round a fine turno (per la fatica); Successo Critico → nessuna penalità. La TN sale di 6 a ogni uso successivo nello stesso Combattimento.' },
    { name:'Data Scan', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiede Technician. Come 1 Azione su un Nemico visibile, Check BIT (Knowledge) TN 10+DOS bersaglio: su Successo scopri una delle seguenti informazioni a scelta (Ferite attuali/max, Stat Core dopo le Qualities, Stat Derivate, Movimento/Range, elenco Core Qualities, o un Attacco con tutti i Tag — puoi ripetere la scelta più volte pagando di nuovo); Successo Critico ne scopri una in più. Fallimento Critico non puoi riprovare fino a fine Combattimento.' },
    { name:'Adaptive Element', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede Element Master. Incompatibile con Elemental Myriad, Altered Element. Quando prendi Domain Control, invece di un solo Dominio puoi scegliere entrambi i Domini del tuo Elemento e attivare quello che preferisci ogni volta (solo uno alla volta).' },
    { name:'Altered Element', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede Element Master. Incompatibile con Elemental Myriad, Adaptive Element. Quando prendi Domain Control, puoi scegliere qualsiasi opzione di Dominio invece di essere limitato al tuo Elemento di Naturewalk (resta comunque considerato il tuo Elemento).' },
    { name:'Elemental Myriad', category:'Static', dpPerRank:1, maxRank:4, mechanic:'', desc:'Richiede Element Master. Incompatibile con Domain Control, Adaptive/Altered Element. Rank max per Stage (0-1:0, 2:1, 3:2, 4+:4). Per ogni Rank qui, puoi comprare 2 Ranks extra di Naturewalk (li paghi comunque normalmente), ma il bonus di Naturewalk a una singola Stat non supera +3 in totale.' },
    { name:'Conjurer', category:'Trigger', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 2+ — Richiesta per Evoker. Incompatibile con Summoner, Combat Monster, Positive Reinforcement. Risorsa "Creation Limit" = BIT+Stage. Con l\'Azione Conjure Objects (2 Azioni) crei oggetti/strutture (1 spazio cubico ciascuno, decisi alla presa della Quality) entro il tuo Range, fino al Creation Limit; non tirano Dodge, vengono distrutti da un Attacco che infligge Danno, e il costo torna disponibile quando distrutti. Non puoi riusare l\'Azione per 1 round dopo averla usata.' },
    { name:'Summoner', category:'Trigger', dpPerRank:1, maxRank:3, mechanic:'', desc:'STAGE 2+ — Richiesta per Evoker. Incompatibile con Conjurer, Combat Monster, Positive Reinforcement, Showstopper. Risorsa "Mastery" = BIT+2×Ranks (+ Ranks di Conjurer se presente). Scegli un Tipo di Minion (Infantry/Protector/Recon/Volatile, ognuno con costo Mastery, Size e bonus propri — vedi manuale 5.06/6.0x per la tabella completa). Azione Summon (1 o 2 Azioni per metà/piena Mastery) crea Minion con Accuracy/Damage/Movimento basati sul tuo BIT e Ferite pari a DOS×2, senza Armor/Dodge, solo Attacchi [MELEE]. Azione Command Minion (1-2 Azioni) li fa Muovere/Attaccare/Aiutare.' },
    { name:'Evoker', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede Conjurer o Summoner. Puoi usare le Azioni Conjure e Summon con le stesse Azioni (Creation Limit/Mastery condivisi tra Oggetti e Minion).' },
    { name:'Hybrid Drive', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 4+ — Richiede Data Optimization. Puoi comprare una Data Specialization aggiuntiva a scelta libera, indipendentemente dalla tua Data Optimization.' },
    { name:'Coordinated Assault', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 3+ — Richiede Aggressive Flank. Come 1 Azione, Check BIT (Precision) TN 10+RAM bersaglio per applicare "Marchiato" a un singolo bersaglio (Successo Critico: anche -1 Dodge immediato). Il bersaglio Marchiato subisce una penalità Dodge pari al tuo Stage (invece di -1) per ogni Attacco oltre il primo che lo colpisce nel round. Un solo bersaglio attivo alla volta; se muore, puoi ri-marchiare come Azione Interrupt gratuita. Incide su Uncatchable Target/Absolute Evasione avversari, non su Speedster.' },
    { name:'Berserker', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 3+ — Richiede Combat Monster. Richiesta per Boiling Blood. Il tetto massimo di Resolve diventa Stage×2 (invece di Stage+2).' },
    { name:'Boiling Blood', category:'Static', dpPerRank:1, maxRank:3, mechanic:'', desc:'STAGE 3+ — Richiede Berserker. Inizi il Combattimento con Resolve pari ai Ranks. A ogni tuo turno, se sei sotto le Ferite Massime generi Resolve pari ai Ranks (doppio se sei sotto metà); se raggiungi il tetto di Resolve a inizio turno, Check CPU (Endurance) TN 15-DOS: su Fallimento subisci Danno Unalterable pari al doppio dei Ranks.' },
    { name:'Sentry Aim', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 3+ — Sblocca Sentry Stance. Attivandola, piazzi una Sentry Zone (come [T:BLAST]); chi entra/esce dalla zona può essere colpito con un Attacco [RANGE][DAMAGE] gratuito (Azione Interrupt, ignora "un Attacco a round", nessun Tag extra — un bersaglio non può essere colpito due volte così nello stesso round). Nessuna penalità Accuracy sui [RANGE] in questa Stance, ma -2 Dodge contro [MELEE] e non puoi bersagliare nemici entro 2 spazi; tratti tutto il terreno come Difficile.' },
    { name:'Martial Strikes', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 3+ — Richiede 1 Rank di Weapon. Sblocca Martial Stance. Una volta a round come Azione Libera, Check BIT (Decipher Intent) TN 10+DOS bersaglio: su Successo i tuoi 6 su Accuracy contano come 2 Successi contro quel bersaglio fino al tuo prossimo turno con Attacchi [WEAPON] (Successo Critico: raddoppia anche il bonus di Weapon). Penalità a Dodge pari al tuo Stage contro Nemici non bersagliati.' },
    { name:'Anticipate Assault', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 3+ — Richiede 1 Rank di Instinct. Sblocca Anticipate Stance. Una volta a round come Azione Libera, Check RAM (Evasion) TN 10+DOS bersaglio: su Successo i tuoi 6 su Dodge contro quel bersaglio contano come 2 Successi fino al tuo prossimo turno (Successo Critico: raddoppia il bonus di Instinct e i suoi Attacchi non riducono il tuo Dodge Pool, salvo Sniper/Coordinated Assault). Penalità ad Armor pari al tuo Stage contro Nemici non bersagliati.' },
    { name:'Transporter', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 3+ — Richiede Teleport. Puoi teletrasportare anche Alleati adiacenti insieme a te (anche in reazione a un Attacco); ognuno perde 1 Azione al turno successivo (come se avesse Interceduto). +1 alla distanza di Teleport.' },
    { name:'Holy Ward', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 3+/ULTIMATE — Richiede 1 Rank di Basic/Advanced/Master Effect con un Effetto positivo. Incompatibile con Dark Emblem, Status Warlord. Richiesta per Chaotic Balance. Quando colpisci con un Attacco con Effetto positivo (o [HASTE]/[IMMUNE]/[SHIELD]), tira BIT come Pool Check: ogni Successo cura 1 Casella Ferita a un bersaglio dell\'Attacco a scelta. Max 1 volta a round.' },
    { name:'Dark Emblem', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 3+/ULTIMATE — Richiede 1 Rank di Basic/Advanced/Master Effect con un Effetto negativo. Incompatibile con Holy Ward, Status Warlord. Richiesta per Chaotic Balance. Quando colpisci con un Attacco con Effetto negativo (o [FEAR]/[DOOM]/[STUN]/[BLIND]/[DOT]), tira BIT come Pool Check: ogni Successo infligge 1 Danno Unalterable a un bersaglio dell\'Attacco a scelta. Max 1 volta a round.' },
    { name:'Chaotic Balance', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede Holy Ward o Dark Emblem (permette di comprare entrambe). Non puoi attivarle nello stesso round, e se ne usi una non puoi riusarla il turno dopo — ma se ne hai usata una nel round precedente, l\'altra ottiene +1 Successo (cura o Danno Unalterable) quando la usi.' },
    { name:'Distant Force', category:'Clash', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 3+/ULTIMATE — Come 1 Azione, bersaglia un Digimon entro il tuo Range. Se non consenziente, Check contrapposto (tu BIT+DOS, lui il suo Clash — conta come Check di Clash per Brawler/Slippery). Se vinci (o è consenziente), applichi [PUSH] o [PULL] usando BIT o DOS a scelta per la distanza.' },
    { name:'Basic Effect: Lag', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [LAG] su un Attacco [SUPPORT] (riduce la posizione in Iniziativa del bersaglio, gestione manuale dell\'ordine).' },
    { name:'Basic Effect: Lead', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [LEAD] su un Attacco [SUPPORT] (aumenta la posizione in Iniziativa del bersaglio, gestione manuale dell\'ordine).' },
    { name:'Basic Effect: Tailwind', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [TAILWIND] su un Attacco [SUPPORT] (aumenta il Movimento, non gestito dal sito).' },
    { name:'Basic Effect: Vague', category:'Attack', dpPerRank:1, maxRank:1, mechanic:'', desc:'CAP. 4.08 — Sblocca l\'uso del Tag [VAGUE] su un Attacco [SUPPORT] (riduce Accuracy).' },
    { name:'Advanced Effect: Heavy', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [HEAVY] su un Attacco [SUPPORT] (rimuove opzioni di Movimento extra, non gestito dal sito).' },
    { name:'Advanced Effect: Freeze', category:'Attack', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 2+ — Sblocca l\'uso del Tag [FREEZE] (Danno) su un Attacco [DAMAGE][SUPPORT] (Danno se il bersaglio non si muove).' },
    { name:'Master Effect: Paralyze', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [PARALYZE] su un Attacco [SUPPORT] (riduce Dodge e mobilità).' },
    { name:'Master Effect: Rattled', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [RATTLED] su un Attacco [SUPPORT] (Damage e Dodge insieme).' },
    { name:'Master Effect: Shaken', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [SHAKEN] su un Attacco [SUPPORT] (Accuracy e Armor insieme).' },
    { name:'Master Effect: Weak', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [WEAK] su un Attacco [SUPPORT] (Damage e Armor insieme).' },
    { name:'Master Effect: Strength', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [STRENGTH] su un Attacco [SUPPORT] (Damage e Armor insieme, positivo).' },
    { name:'Master Effect: Vigil', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [VIGIL] su un Attacco [SUPPORT] (Dodge e Armor insieme).' },
    { name:'Master Effect: Vigor', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [VIGOR] su un Attacco [SUPPORT] (Dodge e Movimento, quest\'ultimo non gestito dal sito).' },
    { name:'Master Effect: Steady', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [STEADY] su un Attacco [SUPPORT] (Damage e Dodge insieme).' },
    { name:'Master Effect: Regen', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [REGEN] su un Attacco [SUPPORT] (cura il bersaglio e permette di sopravvivere a un colpo fatale — applicare a mano).' },
    { name:'Master Effect: Ruin', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [RUIN] su un Attacco [DAMAGE][SUPPORT] (Danno basato sul BIT del lanciatore).' },
    { name:'Master Effect: Doom', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [DOOM] su un Attacco [SUPPORT] (nega la cura oltre una certa soglia — applicare a mano).' },
    { name:'Master Effect: Blind', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [BLIND] su un Attacco [SUPPORT] (il bersaglio è accecato per la Durata — applicare a mano).' },
    { name:'Master Effect: Dot', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [DOT] su un Attacco [DAMAGE][SUPPORT] (trasforma il bersaglio in Sprite: perde i benefici d\'Attacco ma guadagna Dodge — applicare a mano, max 1 volta a Combattimento per bersaglio).' },
    { name:'Master Effect: Stun', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [STUN] su un Attacco [SUPPORT] (rimuove un\'Azione al bersaglio — applicare a mano).' },
    { name:'Master Effect: Immune', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [IMMUNE] su un Attacco [SUPPORT] (riduce la Potenza degli Effetti negativi in arrivo sul bersaglio — applicare a mano).' },
    { name:'Master Effect: Deny', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [DENY] su un Attacco [SUPPORT] (nega il primo Effetto che il bersaglio subirebbe — applicare a mano).' },
    { name:'Master Effect: Haste', category:'Attack', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+/ULTIMATE — Sblocca l\'uso del Tag [HASTE] su un Attacco [SUPPORT] (concede un\'Azione extra al bersaglio — applicare a mano).' },
    { name:'Mode Change', category:'Trigger', dpPerRank:1, maxRank:3, mechanic:'', desc:'STAGE 3+ — Richiesta per Superior Mode. Rank 1: come 1 Azione, scambia Armor↔Damage OPPURE Accuracy↔Dodge (Stat Base). Rank 2: scambia una coppia qualsiasi di Stat Base (tranne Health). Rank 3: scambia liberamente tutte le Stat Base tranne Health. Non tocca le Stat Derivate né i bonus da Qualities/Stance/Direct.' },
    { name:'Superior Mode', category:'Trigger', dpPerRank:1, maxRank:1, mechanic:'', desc:'Richiede 3 Ranks di Mode Change. Scegli Qualities già possedute per un totale di DP ≤ Stage×3 (ignora sconti; ogni prerequisito collegato va incluso), poi scegli altrettante Qualities diverse (mai già possedute) dello stesso costo totale: sono le tue "Mode Change Qualities". Quando usi Mode Change, puoi anche scambiare il set di Qualities attuale con quello Mode, e cambiare Size (se ne hai scelta una diversa), fino a fine Combattimento o a un nuovo uso di Mode Change per tornare indietro.' },
    { name:'Chrome Digizoid Armor', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 3+ (Ultimate) — Incompatibile con altri Digizoid Armor. +1 Armor, +1 Health (applicare a mano a Ferite Massime).' },
    { name:'Cursed Digizoid Armor', category:'Static', dpPerRank:1, maxRank:1, mechanic:'', desc:'STAGE 4+ (Mega) — Incompatibile con altri Digizoid Armor. +1 Health. +2 Armor mentre subisci un Effetto negativo (applicare a mano quando rilevante).' },
    { name:'Adaptive Digizoid Armor', category:'Trigger', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ (Mega) — Incompatibile con altri Digizoid Armor. A inizio round, 4 punti da distribuire tra bonus a Dodge e Armor come preferisci (es. +3 Dodge e +1 Armor).' },
    { name:'Sharp Digizoid Armor', category:'Static', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ (Mega) — Incompatibile con altri Digizoid Armor. +2 Armor, +1 Health. Quando subisci un Attacco [DAMAGE], infliggi 1 Danno Unalterable all\'Attaccante.' },
    { name:'Heavy Digizoid Armor', category:'Static', dpPerRank:2, maxRank:1, mechanic:'', desc:'STAGE 4+ (Mega) — Incompatibile con altri Digizoid Armor. +4 Armor. -1 Movimento (non gestito dal sito), +1 CPU.' },
    { name:'Flexible Digizoid Armor', category:'Trigger', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+ (Mega) — Incompatibile con altri Digizoid Armor. +2 Armor, +3 Dodge, +1 RAM. Sei considerato 1 Size più piccolo mentre ti muovi (puoi passare per gli spazi di Digimon più grandi senza fermarti lì).' },
    { name:'Light Digizoid Armor', category:'Static', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+ (Mega) — Incompatibile con altri Digizoid Armor. +3 Dodge, +1 Health. +1 Movimento (non gestito dal sito) e 1 Successo automatico garantito su ogni tiro di Dodge (si somma ad Absolute Evasion, non riduce la Pool).' },
    { name:'Shining Digizoid Armor', category:'Trigger', dpPerRank:3, maxRank:1, mechanic:'', desc:'STAGE 4+ (Mega) — Incompatibile con altri Digizoid Armor. +2 Armor, +3 Health. Riduci di 1 (min 1) la Potenza degli Effetti negativi in arrivo. Contro Danno Unalterable da un Nemico, Pool Check di tanti d6 quanto il Danno: -1 Danno per Successo.' },

  function computeQualityMechanics(qualities){
    const m = { certainStrike:0, weapon:0, ammoRank:0, combatMonster:0, monsterStrength:false, wrestlemania:false, resistance:0,
      instinctDodge:0, wardenArmor:0, brawlerClash:0, supremeCode:0, absoluteEvasion:0, naturewalk:{ accuracy:0, damage:0, dodge:0, armor:0, health:0 } };
    (qualities||[]).forEach(q=>{
      if(q.mechanic==='certainStrike') m.certainStrike += Number(q.rank||1);
      if(q.mechanic==='weapon') m.weapon += Number(q.rank||1);
      if(q.mechanic==='ammo') m.ammoRank = Math.max(m.ammoRank, Number(q.rank||1));
      if(q.mechanic==='combatMonster') m.combatMonster = Math.max(m.combatMonster, Number(q.rank||1));
      if(q.mechanic==='monsterStrength') m.monsterStrength = true;
      if(q.mechanic==='wrestlemania') m.wrestlemania = true;
      if(q.mechanic==='resistance') m.resistance += Number(q.rank||1);
      if(q.mechanic==='instinct') m.instinctDodge += Number(q.rank||1);
      if(q.mechanic==='dataOptWarden') m.wardenArmor += Number(q.rank||1);
      if(q.mechanic==='dataOptBrawler') m.brawlerClash += Number(q.rank||1);
      if(q.mechanic==='supremeCode') m.supremeCode += Number(q.rank||1);
      if(q.mechanic==='absoluteEvasion') m.absoluteEvasion += Number(q.rank||1);
      if(q.mechanic==='naturewalk'){
        const target = q.statTarget || 'accuracy';
        m.naturewalk[target] = (m.naturewalk[target]||0) + Number(q.rank||1);
      }
    });
    return m;
  }

  function qualitiesEditableHTML(qualities){
    if(!qualities || qualities.length===0) return '<div class="muted" style="margin-bottom:6px;">Nessuna Quality aggiunta.</div>';
    return qualities.map((q,i)=>`
      <div class="flex-between" style="margin-bottom:4px;">
        <span>${escapeHTML(q.name)} <span class="muted">(${q.cost} DP)</span></span>
        <button class="btn ghost small" data-rmquality="${i}">Rimuovi</button>
      </div>
    `).join('');
  }

        sel.value='';
        drawArmorQualDraft();
      };
      document.getElementById('btn-armor-add-'+containerId).onclick = ()=>{
        const name = document.getElementById('armor-name-'+containerId).value.trim();
        const digimentalName = document.getElementById('armor-digimental-'+containerId).value.trim();
        const stage = document.getElementById('armor-stage-'+containerId).value;
        if(!name || !digimentalName) return;
        if(!d.armorForms) d.armorForms = [];
        d.armorForms.push({ name, digimentalName, stage, qualities: armorDraftQualities, usedThisRest:false });
        armorDraftQualities = [];
        document.getElementById('armor-name-'+containerId).value='';
        document.getElementById('armor-digimental-'+containerId).value='';
        drawArmorQualDraft();
        renderArmorList();
      };
      const bindQualRemove = ()=>{
        document.querySelectorAll(`#qual-list-${containerId} [data-rmquality]`).forEach(b=>{
          b.onclick = ()=>{
            d.qualities.splice(Number(b.getAttribute('data-rmquality')),1);
            document.getElementById('qual-list-'+containerId).innerHTML = qualitiesEditableHTML(d.qualities);
            bindQualRemove();
          };

        let name, cost, category, description, mechanic='';

          description = q.desc;
          mechanic = q.mechanic;
          if(!d.qualities) d.qualities = [];
          const qualityEntry = { name, cost, category, description, mechanic, rank: clampedRank };
          if(q.mechanic==='naturewalk') qualityEntry.statTarget = statTarget;
          d.qualities.push(qualityEntry);
        } else {
          name = document.getElementById('e-d-qual-name-'+containerId).value.trim();
          if(!name) return;

        document.getElementById('e-d-qual-cost-'+containerId).value='1';
        document.getElementById('e-d-qual-cat-'+containerId).value='';
        document.getElementById('e-d-qual-desc-'+containerId).value='';
        document.getElementById('e-d-qual-rank-'+containerId).value='1';
        document.getElementById('qual-list-'+containerId).innerHTML = qualitiesEditableHTML(d.qualities);
        bindQualRemove();

      document.getElementById('btn-cancel-digimon-'+containerId).onclick = ()=>{ editingDigimon = false; renderDigimonCard(me, containerId); };
      document.getElementById('btn-save-digimon-'+containerId).onclick = async ()=>{

        me.digimon.stance = document.getElementById('e-d-stance-'+containerId).value;
        me.digimon.chatColor = document.getElementById('e-d-color-'+containerId).value;
        me.digimon.baseAccuracy = Number(document.getElementById('e-d-acc-'+containerId).value)||0;
        me.digimon.baseDamage = Number(document.getElementById('e-d-dmg-'+containerId).value)||0;
        me.digimon.baseDodge = Number(document.getElementById('e-d-dodge-'+containerId).value)||0;
        me.digimon.baseArmor = Number(document.getElementById('e-d-arm-'+containerId).value)||0;
        me.digimon.baseHealth = Number(document.getElementById('e-d-hp-'+containerId).value)||0;

        me.digimon.attribute = document.getElementById('e-d-attribute-'+containerId).value;

        if(me.digimon.currentMp > me.digimon.maxMp) me.digimon.currentMp = me.digimon.maxMp;
        const ok = await saveMember(session.code, me);

  function openSkillRollPanel(me, skillKey, containerId){
    const def = SKILL_DEFS.find(d=>d.key===skillKey);
    if(!def) return;
    const panel = document.getElementById('skill-roll-panel-'+containerId);
    if(!panel) return;
    let chosenAttr = def.attrs[0];
    const majorLeft = me.tamer.majorAspect ? (me.tamer.majorAspect.usesLeft||0) : 0;
    const minorLeft = me.tamer.minorAspect ? (me.tamer.minorAspect.usesLeft||0) : 0;
    const hasMiracle = computeUnlockedTalents(me.tamer).some(t=>t.order==='miracle');
    const ipAvailable = Number(me.tamer.inspirationPoints||0);
    const teamworkBonus = Number(me.tamer.teamworkBonus||0);
    const draw = ()=>{
      panel.innerHTML = `
        <div class="hud-frame" style="padding:10px;">
          <div class="section-title" style="margin:0 0 8px;border:none;padding:0;">Tira ${escapeHTML(def.label)}</div>
          ${def.attrs.length>1 ? `
            <div class="row" style="margin-bottom:8px;">
              ${def.attrs.map(a=>`<button class="btn small ${a===chosenAttr?'active':''}" data-pick-attr="${a}" style="flex:1;${a===chosenAttr?'background:rgba(53,232,201,0.15);border-color:var(--cyan);color:var(--cyan);':''}">${ATTR_ABBR[a]}</button>`).join('')}
            </div>
          ` : ''}
          <div class="field"><label>TN (opzionale, la decide il Master)</label><input type="number" id="roll-tn-${containerId}" placeholder="es. 15" /></div>
          <div class="muted" style="margin-bottom:6px;">Stunt (bonus del Master per un'azione descritta con stile)</div>
          <div class="row" style="margin-bottom:8px;">
            <div class="field" style="margin-bottom:0;"><label>Bonus (+0/+3)</label><input type="number" id="roll-stunt-bonus-${containerId}" value="0" min="0" max="3" /></div>
            <div class="field" style="margin-bottom:0;"><label>Dadi Extra (0-5)</label><input type="number" id="roll-stunt-dice-${containerId}" value="0" min="0" max="5" /></div>
          </div>
          ${teamworkBonus!==0 ? `<div class="muted" style="margin-bottom:8px;color:var(--cyan);">🤝 Bonus Teamwork attivo: ${teamworkBonus>0?'+':''}${teamworkBonus} (si applica automaticamente e si consuma con questo tiro)</div>` : ''}
          ${majorLeft>0 || minorLeft>0 ? `
            <div class="muted" style="margin-bottom:6px;">Aspects (applica bonus al tiro)</div>
            <div class="row" style="margin-bottom:8px;">
              ${majorLeft>0 ? `<label style="display:flex;align-items:center;gap:4px;font-size:11px;flex:1;"><input type="checkbox" id="roll-aspect-major-${containerId}" /> Major (+4, ${majorLeft} usi)</label>` : ''}
              ${minorLeft>0 ? `<label style="display:flex;align-items:center;gap:4px;font-size:11px;flex:1;"><input type="checkbox" id="roll-aspect-minor-${containerId}" /> Minor (+2, ${minorLeft} usi)</label>` : ''}
            </div>
          ` : ''}
          ${hasMiracle && ipAvailable>=7 ? `
            <label style="display:flex;align-items:center;gap:4px;font-size:11px;margin-bottom:8px;"><input type="checkbox" id="roll-miracle-${containerId}" /> Miracle: +Willpower+5 (costa 7 IP, hai ${ipAvailable})</label>
          ` : ''}
          <button class="btn solid" id="roll-confirm-${containerId}" style="width:100%;">Tira 3d6</button>
          <div id="roll-result-${containerId}" style="margin-top:10px;"></div>
        </div>
      `;
      if(def.attrs.length>1){
        panel.querySelectorAll('[data-pick-attr]').forEach(b=>{
          b.onclick = ()=>{ chosenAttr = b.getAttribute('data-pick-attr'); draw(); };
        });
      }
      document.getElementById('roll-confirm-'+containerId).onclick = async ()=>{
        const tnVal = document.getElementById('roll-tn-'+containerId).value;
        const attrVal = me.tamer[chosenAttr];
        const skillVal = me.tamer.skills[skillKey];
        const stuntBonus = Math.max(0, Math.min(3, Number(document.getElementById('roll-stunt-bonus-'+containerId).value)||0));
        const stuntDice = Math.max(0, Math.min(5, Number(document.getElementById('roll-stunt-dice-'+containerId).value)||0));
        const { dice, total: baseTotal } = rollSkillCheck(attrVal, skillVal, stuntDice);
        let total = baseTotal + stuntBonus;
        let aspectNote = '';
        if(stuntDice>0) aspectNote += ` +Stunt (${stuntDice} dadi extra, tenuti i 3 migliori)`;
        if(stuntBonus>0) aspectNote += ` +${stuntBonus} Stunt`;
        if(teamworkBonus!==0){
          total += teamworkBonus;
          aspectNote += ` ${teamworkBonus>0?'+':''}${teamworkBonus} Teamwork`;
          me.tamer.teamworkBonus = 0;
        }
        const majorBox = document.getElementById('roll-aspect-major-'+containerId);
        const minorBox = document.getElementById('roll-aspect-minor-'+containerId);
        const miracleBox = document.getElementById('roll-miracle-'+containerId);
        if(majorBox && majorBox.checked){
          total += 4;
          me.tamer.majorAspect.usesLeft = Math.max(0,(me.tamer.majorAspect.usesLeft||0)-1);
          aspectNote += ` +4 Major Aspect (${me.tamer.majorAspect.text})`;
        }
        if(minorBox && minorBox.checked){
          total += 2;
          me.tamer.minorAspect.usesLeft = Math.max(0,(me.tamer.minorAspect.usesLeft||0)-1);
          aspectNote += ` +2 Minor Aspect (${me.tamer.minorAspect.text})`;
        }
        if(miracleBox && miracleBox.checked && Number(me.tamer.inspirationPoints||0)>=7){
          const bonus = me.tamer.willpower + 5;
          total += bonus;
          me.tamer.inspirationPoints -= 7;
          aspectNote += ` +${bonus} Miracle (-7 IP)`;
        }
        await saveMember(session.code, me);
        const verdict = evaluateVsTN(total, tnVal, dice);
        const resEl = document.getElementById('roll-result-'+containerId);
        resEl.innerHTML = `${diceRowHTML(dice)}<span class="roll-total">${total}</span>${verdict?`<span class="roll-verdict ${verdict.cls}">${verdict.label}</span>`:''}`;
        const logText = `tira ${def.label} (${ATTR_ABBR[chosenAttr]}+Skill): 3d6[${dice.join(',')}] + ${attrVal} + ${skillVal}${aspectNote} = ${total}` + (verdict ? ` vs TN ${tnVal} → ${verdict.label}` : '');
        await pushLog(session.code, { who: session.username, role:'roll', text: logText, meta: { dice, total, verdict: verdict?verdict.label:null } });
        refreshLiveParts();
      };
    };
    draw();
  }

  async function tryParseRollShortcut(raw, me){
    const m = raw.match(/^\/(tira|r)\s+(.+)$/i);
    if(!m) return null;
    let rest = m[2].trim();
    let tn = null;
    let aspectWanted = null;
    let parts = rest.split(/\s+/);
    let lastWord = parts[parts.length-1].toLowerCase();
    if(['major','maggiore'].includes(lastWord)){ aspectWanted='major'; parts = parts.slice(0,-1); lastWord = parts[parts.length-1]||''; }
    else if(['minor','minore'].includes(lastWord)){ aspectWanted='minor'; parts = parts.slice(0,-1); lastWord = parts[parts.length-1]||''; }
    if(/^\d+$/.test(lastWord)){
      tn = Number(lastWord);
      parts = parts.slice(0,-1);
    }
    rest = parts.join(' ');
    const query = rest.trim().toLowerCase();
    if(!query) return { text: `⚠ comando non riconosciuto: "${rest}". Usa /tira <NomeSkill|Accuracy|Dodge|Health> [TN] [major|minor]`, dice:null };

    const poolMap = { 'accuracy':'baseAccuracy', 'acc':'baseAccuracy', 'dodge':'baseDodge', 'schivata':'baseDodge', 'health':'baseHealth', 'hp':'baseHealth', 'salute':'baseHealth' };
    if(poolMap[query]){
      const statKey = poolMap[query];
      const { dice, successes } = rollPool(me.digimon[statKey]);
      return {
        dice, isPool:true, resultLabel: `${successes} successi`, verdict:null,
        text: `tira Pool Check ${query.toUpperCase()} (${me.digimon[statKey]}d6): [${dice.join(',')}] → ${successes} successi`
      };
    }

    const def = SKILL_DEFS.find(d=>d.label.toLowerCase()===query || d.label.toLowerCase().startsWith(query) || query.startsWith(d.label.toLowerCase()));
    if(def){
      const attr = def.attrs[0];
      const attrVal = me.tamer[attr];
      const skillVal = me.tamer.skills[def.key];
      const { dice, total: baseTotal } = rollSkillCheck(attrVal, skillVal);
      let total = baseTotal;
      let aspectNote = '';
      if(aspectWanted==='major' && me.tamer.majorAspect && (me.tamer.majorAspect.usesLeft||0)>0){
        total += 4;
        me.tamer.majorAspect.usesLeft -= 1;
        aspectNote = ` +4 Major Aspect (${me.tamer.majorAspect.text})`;
        await saveMember(session.code, me);
      } else if(aspectWanted==='minor' && me.tamer.minorAspect && (me.tamer.minorAspect.usesLeft||0)>0){
        total += 2;
        me.tamer.minorAspect.usesLeft -= 1;
        aspectNote = ` +2 Minor Aspect (${me.tamer.minorAspect.text})`;
        await saveMember(session.code, me);
      } else if(aspectWanted){
        aspectNote = ` (nessun uso di Aspect ${aspectWanted} disponibile, ignorato)`;
      }
      const verdict = evaluateVsTN(total, tn, dice);
      return {
        dice, isPool:false, resultLabel: String(total), verdict,
        text: `tira ${def.label} (${ATTR_ABBR[attr]}+Skill): 3d6[${dice.join(',')}] + ${attrVal} + ${skillVal}${aspectNote} = ${total}` + (verdict ? ` vs TN ${tn} → ${verdict.label}` : '')
      };
    }
    return { text: `⚠ comando non riconosciuto: "${rest}". Usa /tira <NomeSkill|Accuracy|Dodge|Health> [TN] [major|minor]`, dice:null };
  }

  function getParticipantClashStats(p){
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      if(member){
        const stats = computeDerivedStats(member.digimon);
        const qMech = computeQualityMechanics(member.digimon.qualities);
        stats.clashBonus = qMech.brawlerClash || 0;
        return stats;
      }
      return { cpu:0, ram:0, clashBonus:0 };
    }
    return { cpu: Math.max(0, Math.floor(Number(p.armor||0)/3)), ram: Number(p.ram||0), clashBonus:0 };
  }

  function getParticipantWounds(p){
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      if(member) return { current: member.digimon.currentWounds, max: member.digimon.maxWounds, temp: Number(member.digimon.tempWounds||0) };
    }
    return { current: p.currentWounds||0, max: p.maxWounds||1, temp: Number(p.tempWounds||0) };
  }

  function hasAttributeAdvantage(atkAttr, defAttr){
    if(!atkAttr || !defAttr) return false;
    if(atkAttr==='Free' || defAttr==='Free' || atkAttr==='Variable' || defAttr==='Variable') return false;
    const table = { Vaccine:'Virus', Virus:'Data', Data:'Vaccine' };
    return table[atkAttr] === defAttr;
  }
  function getParticipantAttribute(p){
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      return member ? (member.digimon.attribute||'Free') : 'Free';
    }
    return p.attribute || 'Free';
  }
  function hasEffectQuality(d, effectKey){
    const required = EFFECT_QUALITY_MAP[effectKey];
    if(!required) return true; // no known requirement (e.g. custom/unlisted effect) — allow
    return (d.qualities||[]).some(q=>q.name===required);
  }

  async function applyInstantEffect(code, target, key, potency){
    const def = EFFECT_DEFS.find(d=>d.key===key);
    if(!def || !def.instant) return null;
    if(def.instant==='pull'){
      const from = target.zone||'Medio';
      const zi = Math.max(0, zoneIndex(from)-Math.max(1,potency));
      target.zone = ZONES[zi];
      return `${target.name} viene attirato da ${from} a ${target.zone}.`;
    }
    if(def.instant==='push'){
      const from = target.zone||'Medio';
      const zi = Math.min(2, zoneIndex(from)+Math.max(1,potency));
      target.zone = ZONES[zi];
      return `${target.name} viene respinto da ${from} a ${target.zone}.`;
    }
    if(def.instant==='cleanse'){
      let removedCount = 0;
      target.effects = (target.effects||[]).filter(e=>{
        const d = EFFECT_DEFS.find(x=>x.key===e.key);
        if(d && d.type==='negative' && removedCount<potency){ removedCount++; return false; }
        return true;
      });
      return `${target.name} viene purificato: rimossi ${removedCount} Effetti negativi.`;
    }
    if(def.instant==='shield'){
      if(target.isPC){
        const member = cachedRoster.find(m=>m.username===target.username);
        if(member){ member.digimon.tempWounds = Number(member.digimon.tempWounds||0)+potency; await saveMember(code, member); }
      } else {
        target.tempWounds = Number(target.tempWounds||0)+potency;
      }
      return `${target.name} guadagna ${potency} Caselle Ferita Temporanee.`;
    }
    return null;
  }

  function computeEffectModifiers(p){
    const mod = { accuracy:0, damage:0, dodge:0, armor:0 };
    let resistance = 0;
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      if(member) resistance = computeQualityMechanics(member.digimon.qualities).resistance;
    }
    (p.effects||[]).forEach(e=>{
      const def = EFFECT_DEFS.find(d=>d.key===e.key);
      if(!def) return;
      let potency = Number(e.potency||1);
      if(def.type==='negative' && resistance>0) potency = Math.max(1, potency - resistance);
      Object.keys(def.mods||{}).forEach(stat=>{
        mod[stat] += def.mods[stat] * potency;
      });
    });
    return mod;
  }

  function effectTagsHTML(p){
    if(!p.effects || p.effects.length===0) return '';
    return p.effects.map(e=>{
      const def = EFFECT_DEFS.find(d=>d.key===e.key);
      return `<span class="tag" style="margin-left:4px;color:${def&&def.type==='positive'?'var(--cyan)':'var(--danger)'};border-color:${def&&def.type==='positive'?'var(--cyan-dim)':'rgba(255,93,93,0.4)'};">${def?def.label:e.key} ${e.potency}(${e.duration})</span>`;
    }).join('');
  }

  async function tickEffectsForParticipant(code, combat, p){
    if(!p.effects || p.effects.length===0) return [];
    const logs = [];
    let resistance = 0;
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      if(member) resistance = computeQualityMechanics(member.digimon.qualities).resistance;
    }
    p.effects.forEach(e=>{
      const def = EFFECT_DEFS.find(d=>d.key===e.key);
      if(def && def.tick){
        const dmg = Math.max(1, Number(e.potency||1) - resistance);
        logs.push(`${p.name} subisce ${dmg} danno da ${def.label}${resistance>0?` (Resistance -${resistance})`:''}.`);
        applyDamageToParticipantSync(p, dmg);
      }
    });
    p.effects.forEach(e=>{ e.duration = Number(e.duration||1) - 1; });
    const expired = p.effects.filter(e=>e.duration<=0);
    expired.forEach(e=>{
      const def = EFFECT_DEFS.find(d=>d.key===e.key);
      logs.push(`${def?def.label:e.key} su ${p.name} è terminato.`);
    });
    p.effects = p.effects.filter(e=>e.duration>0);
    return logs;
  }

  function applyDamageToParticipantSync(p, amount){
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      if(member) member.digimon.currentWounds = Math.max(0, member.digimon.currentWounds - amount);
    } else {
      p.currentWounds = Math.max(0, (p.currentWounds||0) - amount);
    }
  }

  function getParticipantCombatStats(p){
    let base;
    let stanceMod = { accuracy:0, dodge:0, damage:0, armor:0 };
    let qMech = { certainStrike:0, weapon:0, ammoRank:0, combatMonster:0, monsterStrength:false };
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      base = member ? { accuracy: member.digimon.baseAccuracy, damage: member.digimon.baseDamage, dodge: member.digimon.baseDodge, armor: member.digimon.baseArmor } : { accuracy:0, damage:0, dodge:0, armor:0 };
      if(member){ stanceMod = stanceModifiers(member.digimon); qMech = computeQualityMechanics(member.digimon.qualities); }
    } else {
      base = { accuracy: p.accuracy||0, damage: p.damage||0, dodge: p.dodge||0, armor: p.armor||0 };
    }
    const mod = computeEffectModifiers(p);
    const nw = qMech.naturewalk || { accuracy:0, damage:0, dodge:0, armor:0 };
    const sc = qMech.supremeCode || 0;
    return {
      accuracy: Math.max(0, base.accuracy + mod.accuracy + stanceMod.accuracy + qMech.weapon + nw.accuracy + sc),
      damage: Math.max(0, base.damage + mod.damage + stanceMod.damage + qMech.weapon + nw.damage + sc),
      dodge: Math.max(0, base.dodge + mod.dodge + stanceMod.dodge + (qMech.instinctDodge||0) + nw.dodge + sc),
      armor: Math.max(0, base.armor + mod.armor + stanceMod.armor + (qMech.wardenArmor||0) + nw.armor + sc),
      certainStrike: qMech.certainStrike,
      combatMonsterRank: qMech.combatMonster,
      monsterStrength: qMech.monsterStrength,
      absoluteEvasion: qMech.absoluteEvasion||0
    };
  }

  function getParticipantResistance(p){
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      if(member) return computeQualityMechanics(member.digimon.qualities).resistance;

    return 0;
  }

  function getParticipantSizeIndex(p){
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      if(member) return SIZES.indexOf(member.digimon.size) >=0 ? SIZES.indexOf(member.digimon.size) : 1;

    return 1; // Medium default for enemies (Size not tracked for them)
  }

  async function applyDamageToParticipant(code, combat, p, amount){
    if(p.isPC){
      const member = cachedRoster.find(m=>m.username===p.username);
      if(member){
        let remaining = amount;
        const shield = Number(member.digimon.tempWounds||0);
        if(shield>0 && remaining>0){
          const absorbed = Math.min(shield, remaining);
          member.digimon.tempWounds = shield - absorbed;
          remaining -= absorbed;
        }
        member.digimon.currentWounds = Math.max(0, member.digimon.currentWounds - remaining);
        const qMech = computeQualityMechanics(member.digimon.qualities);
        if(qMech.combatMonster>0 && amount>0){
          member.digimon.resolveCurrent = Math.min(Number(member.digimon.resolveMax||0), Number(member.digimon.resolveCurrent||0)+amount);
        }
        await saveMember(code, member);
      }
    } else {
      let remaining = amount;
      const shield = Number(p.tempWounds||0);
      if(shield>0 && remaining>0){
        const absorbed = Math.min(shield, remaining);
        p.tempWounds = shield - absorbed;
        remaining -= absorbed;
      }
      p.currentWounds = Math.max(0, (p.currentWounds||0) - remaining);
      await saveCombat(code, combat);
    }
  }

      }
      const controller = a.clashController ? a : (b.clashController ? b : null);
      const opponent = controller ? (controller===a ? b : a) : null;
      if(!controller){ panel.innerHTML = '<div class="muted">Nessun Controller determinato — usa "Inizia/Contesa".</div>'; return; }
      let hasWrestlemania = false;
      if(controller.isPC){

            const excess = accRoll.successes-dodgeRoll.successes;
            dealt = Math.max(0, excess+cStats.damage-oStats.armor);
            const cMember = cachedRoster.find(m=>m.username===controller.username);

        const aPinned = wasClashPair && a.clashPinned && !a.clashController;
        const bPinned = wasClashPair && b.clashPinned && !b.clashController;
        let winner, loser, aRoll, bRoll, autoWin=false;
        if(aPinned || bPinned){
          winner = aPinned ? b : a; loser = aPinned ? a : b;
          autoWin = true;
        } else {
          const aBonus = (a.clashComebackBonus||0) + (aStats.clashBonus||0);
          const bBonus = (b.clashComebackBonus||0) + (bStats.clashBonus||0);
          aRoll = rollSkillCheck(aStats.cpu, aStats.ram); aRoll.total += aBonus;
          bRoll = rollSkillCheck(bStats.cpu, bStats.ram); bRoll.total += bBonus;
          if(aRoll.total > bRoll.total){ winner=a; loser=b; }
          else if(bRoll.total > aRoll.total){ winner=b; loser=a; }
          else if(aStats.cpu !== bStats.cpu){ winner = aStats.cpu>bStats.cpu ? a : b; loser = winner===a?b:a; }
          else { winner = a; loser = b; }
        }
        a.clashComebackBonus = 0; b.clashComebackBonus = 0;
        a.clashPinned = false; b.clashPinned = false;
        a.clashWith = b.id; b.clashWith = a.id;
        a.clashController = (winner.id===a.id); b.clashController = (winner.id===b.id);
